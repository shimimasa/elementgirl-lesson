<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script>
'use strict';
/* =====================================================
   おなかのなか探検隊 — 食べ物の消化体験（小6理科・協力型・1ファイル）
   口→食道→胃→小腸→大腸／消化・吸収・消化管の長さ約9m
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  kuchi: ruby('口', 'くち'),
  shokudo: ruby('食道', 'しょくどう'),
  i: ruby('胃', 'い'),
  shocho: ruby('小腸', 'しょうちょう'),
  daicho: ruby('大腸', 'だいちょう'),
  shoka: ruby('消化', 'しょうか'),
  daeki: ruby('だ液', 'だえき'),
  ieki: ruby('胃液', 'いえき'),
  yobun: ruby('養分', 'ようぶん'),
  kyushu: ruby('吸収', 'きゅうしゅう'),
  jikken: ruby('実験', 'じっけん'),
  amai: ruby('甘', 'あま') + 'い',
  chikara: ruby('力', 'ちから'),
};

// ---------- 消化管ステーション ----------
const STATIONS = [
  { key: 'mouth',   name: '口',   kana: 'くち',       emoji: '👄' },
  { key: 'shokudo', name: '食道', kana: 'しょくどう', emoji: '↧' },
  { key: 'stomach', name: '胃',   kana: 'い',         emoji: '🫃' },
  { key: 'small',   name: '小腸', kana: 'しょうちょう', emoji: '🌀' },
  { key: 'large',   name: '大腸', kana: 'だいちょう', emoji: '➰' },
];
const stationIndex = key => STATIONS.findIndex(s => s.key === key);

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  loc: 'mouth',          // いま探検隊がいる場所
  foodX: 0.5, foodY: 0,  // おにぎり（食べ物）の進行 0..1 の縦位置
  chew: 0,               // かんだ回数
  digest: 0,             // その臓器での消化の進み 0..1
  absorb: 0,             // 吸収の進み 0..1
  sound: true,
  phase: '',
  votePicked: new Set(),
  badges: new Set(),
  particles2: [],        // スコープ内の粒
  scopeMode: 'starch',   // starch / broken / absorb / water
  wiggle: 0,
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sChew = () => { tone(200 + Math.random() * 60, 0, 0.1, 'square', 0.05); };
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));
const sHmm = () => { tone(392, 0, 0.18, 'sine', 0.07); tone(349, 0.16, 0.3, 'sine', 0.07); };
const sFanfare = () => [523, 587, 659, 784, 880, 1046, 1318, 1568].forEach((f, i) => tone(f, i * 0.08, 0.45, 'triangle', 0.1));
const sSquish = () => { tone(160, 0, 0.2, 'sine', 0.08); tone(120, 0.12, 0.25, 'sine', 0.06); };
const sShimmer = () => [880, 1174, 1568].forEach((f, i) => tone(f, i * 0.05, 0.28, 'sine', 0.05));

// ---------- キャンバス ----------
const stageCv = $('stage'), scopeCv = $('scope'), fxCv = $('fx');
const gctx = stageCv.getContext('2d'), sctx = scopeCv.getContext('2d'), fctx = fxCv.getContext('2d');
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}

// ---------- 体の中の地図（消化管）描画 ----------
// 論理座標で消化管の道を定義（縦長の体）
const PAD_T = 54, PAD_B = 62, PAD_X = 24;
// 各臓器のガイド位置（0..1 の相対、体の絵の中で）
const ORGAN_POS = {
  mouth:   { x: 0.5,  y: 0.09 },
  shokudo: { x: 0.5,  y: 0.24 },
  stomach: { x: 0.38, y: 0.42 },
  small:   { x: 0.56, y: 0.66 },
  large:   { x: 0.5,  y: 0.86 },
};
let ambient = null;
function drawStage(t) {
  const { w, h, dpr } = fitCanvas(stageCv);
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gctx.clearRect(0, 0, w, h);
  const top = PAD_T, bot = h - PAD_B, H = bot - top;
  const cx = w / 2;
  const X = rx => PAD_X + rx * (w - PAD_X * 2);
  const Y = ry => top + ry * H;

  // ふわふわ粒（体液のイメージ）
  if (!ambient) ambient = Array.from({ length: 22 }, () => ({ x: Math.random(), y: Math.random(), r: 1 + Math.random() * 2, p: Math.random() * TAU, sp: .4 + Math.random() }));
  ambient.forEach(s => {
    gctx.globalAlpha = 0.12 + 0.16 * (0.5 + 0.5 * Math.sin(t * s.sp + s.p));
    gctx.fillStyle = '#fff';
    gctx.beginPath(); gctx.arc(s.x * w, top + s.y * H, s.r, 0, TAU); gctx.fill();
  });
  gctx.globalAlpha = 1;

  // 消化管の道（太いパイプ）
  const path = [
    [0.5, 0.06], [0.5, 0.20],                    // 口→食道
    [0.5, 0.30], [0.38, 0.38], [0.38, 0.50],     // 胃
    [0.48, 0.56], [0.62, 0.60],                  // 小腸へ
    [0.60, 0.72], [0.44, 0.74],                  // 小腸うねうね
    [0.5, 0.80], [0.5, 0.94],                    // 大腸
  ];
  // パイプ背景
  gctx.lineCap = 'round'; gctx.lineJoin = 'round';
  gctx.strokeStyle = '#f3a892'; gctx.lineWidth = Math.min(w, H) * 0.11;
  gctx.beginPath();
  path.forEach((p, i) => i === 0 ? gctx.moveTo(X(p[0]), Y(p[1])) : gctx.lineTo(X(p[0]), Y(p[1])));
  gctx.stroke();
  gctx.strokeStyle = '#ffd9c9'; gctx.lineWidth = Math.min(w, H) * 0.075;
  gctx.beginPath();
  path.forEach((p, i) => i === 0 ? gctx.moveTo(X(p[0]), Y(p[1])) : gctx.lineTo(X(p[0]), Y(p[1])));
  gctx.stroke();

  // 各臓器のふくらみ＋ラベル
  const organs = [
    { key: 'mouth', rx: 0.5, ry: 0.06, w: 0.12, h: 0.05, label: '口', kana: 'くち' },
    { key: 'shokudo', rx: 0.5, ry: 0.20, w: 0.05, h: 0.12, label: '食道', kana: 'しょくどう' },
    { key: 'stomach', rx: 0.36, ry: 0.42, w: 0.20, h: 0.15, label: '胃', kana: 'い' },
    { key: 'small', rx: 0.55, ry: 0.66, w: 0.22, h: 0.14, label: '小腸', kana: 'しょうちょう' },
    { key: 'large', rx: 0.5, ry: 0.87, w: 0.30, h: 0.09, label: '大腸', kana: 'だいちょう' },
  ];
  organs.forEach(o => {
    const isHere = S.loc === o.key;
    const ox = X(o.rx), oy = Y(o.ry), ow = o.w * (w - PAD_X * 2), oh = o.h * H;
    gctx.save();
    if (o.key === 'stomach') {
      // 胃：まがった袋
      gctx.fillStyle = isHere ? '#ff9a7a' : '#f7b39e';
      gctx.strokeStyle = '#d87a5e'; gctx.lineWidth = 3;
      gctx.beginPath();
      gctx.ellipse(ox, oy, ow * 0.7, oh, 0.3, 0, TAU);
      gctx.fill(); gctx.stroke();
    } else if (o.key === 'small') {
      // 小腸：うねうね
      gctx.strokeStyle = isHere ? '#ff9a7a' : '#f7b39e'; gctx.lineWidth = oh * 0.5;
      gctx.lineCap = 'round';
      gctx.beginPath();
      for (let i = 0; i <= 30; i++) {
        const a = i / 30;
        const xx = ox + Math.sin(a * TAU * 2.2) * ow * 0.5;
        const yy = oy - oh + a * oh * 2;
        i === 0 ? gctx.moveTo(xx, yy) : gctx.lineTo(xx, yy);
      }
      gctx.stroke();
    } else if (o.key === 'large') {
      // 大腸：太い門型
      gctx.strokeStyle = isHere ? '#ff9a7a' : '#f0a98e'; gctx.lineWidth = oh * 0.8;
      gctx.lineCap = 'round';
      gctx.beginPath();
      gctx.moveTo(ox - ow * 0.5, oy + oh); gctx.lineTo(ox - ow * 0.5, oy - oh * 0.5);
      gctx.lineTo(ox + ow * 0.5, oy - oh * 0.5); gctx.lineTo(ox + ow * 0.5, oy + oh);
      gctx.stroke();
    } else if (o.key === 'mouth') {
      gctx.fillStyle = isHere ? '#ff9a7a' : '#f7b39e';
      gctx.strokeStyle = '#d87a5e'; gctx.lineWidth = 3;
      gctx.beginPath(); gctx.ellipse(ox, oy, ow, oh, 0, 0, TAU); gctx.fill(); gctx.stroke();
    }
    if (isHere) {
      gctx.strokeStyle = `rgba(216,82,60,${0.5 + 0.4 * Math.sin(t * 5)})`;
      gctx.lineWidth = 4; gctx.setLineDash([8, 6]);
      gctx.beginPath(); gctx.ellipse(ox, oy, ow * 0.95 + 12, oh + 12, 0, 0, TAU); gctx.stroke();
      gctx.setLineDash([]);
    }
    gctx.restore();
    // ラベル
    gctx.fillStyle = isHere ? '#b5261a' : '#a5533f';
    gctx.font = `700 ${Math.max(15, Math.min(w, H) * 0.036)}px sans-serif`;
    gctx.textAlign = 'left'; gctx.textBaseline = 'middle';
    const lx = o.key === 'stomach' ? ox - ow - 46 : ox + ow * 0.7 + 12;
    gctx.fillText(o.label, ox + ow * 0.7 + 14, oy);
  });

  // 食べ物（おにぎり）— 現在地の臓器のところに置く
  const here = organs.find(o => o.key === S.loc);
  if (here) {
    const fx = X(here.rx), fyBase = Y(here.ry);
    const shrink = 1 - S.digest * 0.55 - S.absorb * 0.35;   // 消化・吸収で小さく
    const fr = Math.min(w, H) * 0.05 * clamp(shrink, 0.25, 1);
    gctx.save();
    gctx.translate(fx, fyBase + Math.sin(t * 3) * 3);
    if (S.loc === 'stomach') gctx.rotate(Math.sin(t * 6) * 0.15 * (S.phase === 'churn' ? 1 : 0.2));
    // おにぎり
    gctx.fillStyle = '#fff'; gctx.strokeStyle = '#e0b48a'; gctx.lineWidth = 2;
    gctx.beginPath();
    gctx.moveTo(0, -fr); gctx.lineTo(fr * 0.9, fr * 0.7); gctx.lineTo(-fr * 0.9, fr * 0.7); gctx.closePath();
    gctx.fill(); gctx.stroke();
    gctx.fillStyle = '#3a7a3a';
    gctx.fillRect(-fr * 0.5, fr * 0.05, fr, fr * 0.6);   // のり
    // 消化がすすむと色がドロっと
    if (S.digest > 0.3) {
      gctx.globalAlpha = clamp((S.digest - 0.3) * 1.2, 0, 0.7);
      gctx.fillStyle = '#d8a15e';
      gctx.beginPath(); gctx.arc(0, 0, fr * 0.95, 0, TAU); gctx.fill();
      gctx.globalAlpha = 1;
    }
    gctx.restore();
  }

  // 方位ならぬ「入口→出口」ガイド
  gctx.fillStyle = '#c96b52'; gctx.font = `${Math.max(12, Math.min(w, H) * 0.028)}px sans-serif`;
  gctx.textAlign = 'center';
  gctx.fillText('▲ たべものが 入る（口）', cx, top - 20);
}

// ---------- たんけんスコープ（粒の世界） ----------
let scopeParticles = [];
function drawScope(t, dt) {
  const { w, h, dpr } = fitCanvas(scopeCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);
  const R = w / 2;

  let grd = sctx.createRadialGradient(R, R, 0, R, R, R);
  grd.addColorStop(0, '#ffe6d8'); grd.addColorStop(1, '#f3c3ae');
  sctx.fillStyle = grd; sctx.fillRect(0, 0, w, h);

  const mode = S.scopeMode;
  // モードに応じた粒
  if (mode === 'starch') {
    // でんぷんの大きな粒（かたまり）
    ensure(scopeParticles, 6, () => ({ x: rnd(w), y: rnd(h), r: 15 + Math.random() * 8, vx: 0, vy: 0 }));
    trim(scopeParticles, 6);
    moveDots(scopeParticles, w, h, R, 6, dt);
    scopeParticles.forEach(d => grain(d.x, d.y, d.r, '#f0c674', '#d89a3a'));
    label('でんぷんの つぶ');
  } else if (mode === 'broken') {
    // だ液で小さく分かれた粒
    ensure(scopeParticles, 40, () => ({ x: rnd(w), y: rnd(h), r: 3.5 + Math.random() * 2, vx: 0, vy: 0 }));
    trim(scopeParticles, 40);
    moveDots(scopeParticles, w, h, R, 40, dt);
    scopeParticles.forEach(d => grain(d.x, d.y, d.r, '#ffd98a', '#e0a94a'));
    label('小さく 分かれた！');
  } else if (mode === 'absorb') {
    // 養分の粒がじゅう毛（壁）に吸い込まれる
    // 壁（じゅう毛）
    sctx.strokeStyle = '#e88f74'; sctx.lineWidth = 5;
    for (let i = 0; i < 7; i++) {
      const x = (i + 0.5) * w / 7;
      sctx.beginPath();
      sctx.moveTo(x, h);
      sctx.quadraticCurveTo(x + Math.sin(t * 2 + i) * 6, h * 0.55, x, h * 0.42);
      sctx.stroke();
    }
    ensure(scopeParticles, 22, () => ({ x: rnd(w), y: R * (0.2 + Math.random() * 0.5), r: 4, vx: 0, vy: 0, suck: Math.random() * 3 }));
    trim(scopeParticles, 22);
    scopeParticles.forEach(d => {
      d.suck -= dt;
      if (d.suck < 0) { d.y += 40 * dt; if (d.y > h - 6) { d.y = R * 0.2; d.x = rnd(w); d.suck = 1 + Math.random() * 2; } }
      else { d.x += Math.sin(t * 3 + d.x) * 6 * dt; }
      grain(d.x, d.y, d.r, '#ffd98a', '#e0a94a');
    });
    if (Math.random() < dt * 2) sShimmer();
    label('養分を すいこむ！');
  } else if (mode === 'water') {
    // 水が吸われて、残りが固まる
    ensure(scopeParticles, 30, () => ({ x: rnd(w), y: rnd(h), r: 3, vx: 0, vy: 0, water: Math.random() < 0.6 }));
    trim(scopeParticles, 30);
    moveDots(scopeParticles, w, h, R, 30, dt);
    scopeParticles.forEach(d => {
      if (d.water) grain(d.x, d.y, 2.5, '#9fd0ff', '#5fa8e0');
      else grain(d.x, d.y, 4, '#b78a5a', '#8a6238');
    });
    label('水を すいとる');
  }

  function grain(x, y, r, fill, stroke) {
    sctx.save(); sctx.translate(x, y);
    sctx.fillStyle = fill; sctx.strokeStyle = stroke; sctx.lineWidth = 1.5;
    sctx.shadowColor = fill; sctx.shadowBlur = 4;
    sctx.beginPath(); sctx.arc(0, 0, r, 0, TAU); sctx.fill(); sctx.stroke();
    sctx.restore();
  }
  function label(txt) {
    sctx.font = `700 ${R * 0.1}px sans-serif`;
    sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
    const ly = h - R * 0.24;
    const tw = sctx.measureText(txt).width;
    sctx.fillStyle = 'rgba(255,246,238,.82)';
    sctx.beginPath();
    sctx.roundRect(R - tw / 2 - 8, ly - R * 0.09, tw + 16, R * 0.18, R * 0.09);
    sctx.fill();
    sctx.fillStyle = '#a5533f';
    sctx.fillText(txt, R, ly);
  }
}
function rnd(m) { return Math.random() * m; }
function ensure(arr, n, gen) { while (arr.length < n) arr.push(gen()); }
function trim(arr, n) { if (arr.length > n) arr.length = n; }
function moveDots(arr, w, h, R, n, dt) {
  arr.forEach(d => {
    d.vx = (d.vx || 0) + (Math.random() - 0.5) * 40 * dt * 8;
    d.vy = (d.vy || 0) + (Math.random() - 0.5) * 40 * dt * 8;
    d.vx = clamp(d.vx, -30, 30); d.vy = clamp(d.vy, -30, 30);
    d.x += d.vx * dt; d.y += d.vy * dt;
    const ddx = d.x - R, ddy = d.y - R, dist = Math.hypot(ddx, ddy);
    const lim = R - (d.r || 4) - 4;
    if (dist > lim) { d.x = R + ddx / dist * lim; d.y = R + ddy / dist * lim; d.vx *= -0.5; d.vy *= -0.5; }
  });
}

// ---------- キラキラ ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 70); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#e8654b', '#f0a53b', '#8fd06a', '#ffd98a'][Math.floor(Math.random() * 4)],
    });
  }
}
function scopeBurst() {
  const r = $('scopeWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  const step = STEPS[FLOW[S.stepIndex]];
  if (step.tick) step.tick(dt);
  drawStage(t);
  drawScope(t, dt);
  drawFx(dt);
  requestAnimationFrame(loop);
}

// ---------- UIヘルパー ----------

}
function award(id) {

const overlayEl = $('overlay'), panelEl = $('panelBody');

}

// ---------- ステップ ----------
const FLOW = ['intro', 'vote', 'm_mouth', 'm_stomach', 'm_small', 'm_large', 'hakase', 'ending', 'free'];

function gotoStep(i) {
  S.stepIndex = clamp(i, 0, FLOW.length - 1);
  S.phase = ''; S.digest = 0; S.absorb = 0; S.chew = 0;
  hideOverlay(); hideWish();
  setControls([]);
  STEPS[FLOW[S.stepIndex]].enter();
  updateLoc();
}
const nextStep = () => gotoStep(S.stepIndex + 1);

      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`「${['Ａ かわらない', `Ｂ ${W.amai}くなる`, 'Ｃ にがくなる'][n]}」だね。<br>それじゃあ、みんなで <b>30回 かんで</b> たしかめよう！ 🦷ボタンを おしてね。`);
      S.phase = 'chew';
      setControls([{ label: '🦷 かむ！', id: 'chewBtn', cb: () => this.chew() }]);
      setButtons([]);
    },
    chew() {
      S.chew++; sChew();
      S.digest = clamp(S.chew / 30, 0, 1);
      S.wiggle = 1;
      if (S.chew >= 12 && S.scopeMode === 'starch') S.scopeMode = 'broken';   // 途中で粒が分かれ始める
      $('locChip').textContent = `かんだ かず：${S.chew}回`;
      if (S.chew >= 30 && S.phase === 'chew') {
        S.phase = 'done';
        setControls([]);
        sYes(); scopeBurst(); award('m_mouth');
        say(`✨ ${W.amai}くなった！ こたえは <b>Ｂ</b>！ ✨<br><br>💡 <b>たいせつポイント</b><br>${W.daeki}には、でんぷんを <b>小さな つぶ（${W.amai}いもの）に かえる</b> ${W.chikara}が ある。これが 消化の はじまり！ よく かむほど 消化を てつだえるよ。`);
        setButtons([{ label: 'ゴクン！ つぎへ（食道→胃）', cb: nextStep }]);
        updateLoc();
      }
    },
  },

  // --- 胃：胃液でドロドロ ---
  m_stomach: {
    enter() {
      S.loc = 'stomach'; S.digest = 0.3; S.scopeMode = 'broken'; S.phase = 'predict';
      updateLoc();
      setWish('🫃', `おにぎりは 食道を とおって <b>胃</b>に とうちゃく！<br>胃は これから どんな しごとを すると ${ruby('思', 'おも')}う？`);
      say(`ゴクン……食道を すべって、<b>胃</b>に ついたよ。<br>よそう：胃は おにぎりを どうする？ シートに 〇を つけてね。`);
      setButtons([
        { label: 'Ａ ためておくだけ', cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ 胃液とまぜて ドロドロにする', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ すぐ 養分を すいとる', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`なるほど「${['Ａ ためるだけ', 'Ｂ ドロドロにする', 'Ｃ すいとる'][n]}」だね。<br><b>🌀 胃を うごかす</b>ボタンで、胃の しごとを 見てみよう！`);
      S.phase = 'churn';
      setControls([{ label: '🌀 胃を うごかす', id: 'churnBtn', cb: () => { S.churnT = 3.2; sSquish(); } }]);
      setButtons([]);
    },
    tick(dt) {
      if (S.phase === 'churn') {
        if (S.churnT > 0) { S.churnT -= dt; S.digest = clamp(S.digest + dt * 0.28, 0, 1); }
        if (S.digest >= 0.99 && !S.stomachDone) {
          S.stomachDone = true; S.phase = 'done';
          setControls([]);
          sYes(); scopeBurst(); award('m_stomach');
          say(`✨ おにぎりが ドロドロの おかゆみたいに！ こたえは <b>Ｂ</b>！ ✨<br><br>💡 <b>たいせつポイント</b><br>胃は のびちぢみして、<b>${W.ieki}</b>と まぜながら たべ物を どろどろに 消化する。でも <b>${W.yobun}を とりこむのは まだ</b>。つぎの ばしょが 本番だよ！`);
          setButtons([{ label: 'つぎへ（小腸）', cb: nextStep }]);
          updateLoc();
        }
      }
    },
  },

  // --- 小腸：養分の吸収 ---
  m_small: {
    enter() {
      S.loc = 'small'; S.digest = 1; S.absorb = 0; S.scopeMode = 'absorb'; S.phase = 'predict';
      S.stomachDone = false;
      updateLoc();
      setWish('🌀', `ドロドロに なった たべ物が <b>小腸</b>へ。<br>ここは 全部で やく <b>6〜7m</b>も ある、体で いちばん 長い 消化管！`);
      say(`さあ <b>小腸</b>。ここが 今日の 主役かも。<br>よそう：たべ物の <b>${W.yobun}（体の${W.chikara}になるもの）</b>は、おもに どこで 体に とりこまれる？ シートに 〇！`);
      setButtons([
        { label: 'Ａ 胃', cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ 小腸', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ 大腸', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`「${['Ａ 胃', 'Ｂ 小腸', 'Ｃ 大腸'][n]}」だね。<br><b>✨ 養分を とりこむ</b>ボタンで、小腸の かべ（じゅう毛）の しごとを 見よう！`);
      S.phase = 'absorb';
      setControls([{ label: '✨ 養分を とりこむ', id: 'absBtn', cb: () => { S.absT = 3.5; } }]);
      setButtons([]);
    },
    tick(dt) {
      if (S.phase === 'absorb') {
        if (S.absT > 0) { S.absT -= dt; S.absorb = clamp(S.absorb + dt * 0.28, 0, 1); }
        if (S.absorb >= 0.99 && !S.smallDone) {
          S.smallDone = true; S.phase = 'done';
          setControls([]);
          sYes(); scopeBurst(); award('m_small');
          say(`✨ ${W.yobun}が 小腸の かべから すいこまれた！ こたえは <b>Ｂ 小腸</b>！ ✨<br><br>💡 <b>たいせつポイント</b><br>小腸の 内がわは <b>じゅう毛</b>という 小さな ヒダで びっしり。だから ${W.yobun}を たくさん ${W.kyushu}できる。ここで とりこまれた ${W.yobun}は 血に のって 体じゅうへ！`);
          setButtons([{ label: 'つぎへ（大腸）', cb: nextStep }]);
          updateLoc();
        }
      }
    },
  },

  // --- 大腸：水の吸収 ---
  m_large: {
    enter() {
      S.loc = 'large'; S.absorb = 1; S.scopeMode = 'water'; S.phase = 'predict';
      S.smallDone = false;
      updateLoc();
      setWish('➰', `${W.yobun}を とられた のこりが <b>大腸</b>へ。<br>大腸は さいごに 何を すると ${ruby('思', 'おも')}う？`);
      say(`さいごの 消化管、<b>大腸</b>。<br>よそう：養分の のこりから、大腸は おもに 何を すいとる？ シートに 〇！`);
      setButtons([
        { label: 'Ａ 水', cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ あぶら', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ 空気', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`「${['Ａ 水', 'Ｂ あぶら', 'Ｃ 空気'][n]}」だね。<br><b>💧 水を すいとる</b>ボタンで たしかめよう！`);
      S.phase = 'water';
      setControls([{ label: '💧 水を すいとる', id: 'waterBtn', cb: () => { S.waterT = 3; } }]);
      setButtons([]);
    },
    tick(dt) {
      if (S.phase === 'water') {
        if (S.waterT > 0) { S.waterT -= dt; S.digest = clamp(S.digest + dt * 0.3, 0, 1); }
        if (S.digest >= 0.99 && !S.largeDone) {
          S.largeDone = true; S.phase = 'done';
          setControls([]);
          sYes(); scopeBurst(); award('m_large');
          say(`✨ こたえは <b>Ａ 水</b>！ ✨<br><br>💡 <b>たいせつポイント</b><br>大腸は のこりから <b>水を ${W.kyushu}</b>する。水を とられた のこりは、体の外へ 出ていく（うんち）。ここまでが たべ物の <b>長い たび</b>だったんだね！`);
          setButtons([{ label: 'はかせチャレンジへ！', cb: nextStep }]);
          updateLoc();
        }
      }
    },
  },

  // --- はかせチャレンジ：消化管の長さ ---
  hakase: {
    enter() {
      S.loc = 'large'; S.scopeMode = 'water'; S.phase = 'ask';
      hideWish();
      say(`さいごは <b>はかせチャレンジ</b>！<br>口から 大腸の 出口まで、たべ物の 通り道（消化管）を ぜんぶ のばすと、<b>どれくらい 長い</b>と ${ruby('思', 'おも')}う？ シートに 〇！`);
      setButtons([
        { label: `Ａ やく 1m（せの ${ruby('半分', 'はんぶん')}）`, cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ やく 3m（きょうしつの よこ）', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ やく 9m（バス1台ぶん！）', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      S.pickH = n;
      say(`「${['やく1m', 'やく3m', 'やく9m'][n]}」だね。せーの……こたえ、はっぴょう！`);
      setButtons([{ label: '🎉 こたえを 見る！', cb: () => this.reveal() }]);
    },
    reveal() {
      S.phase = 'done';
      award('hakase'); scopeBurst();
      const hit = S.pickH === 2 ? 'よそう どおり、すごい！' : 'びっくりだね！';
      sYes();
      say(`こたえは <b>Ｃ やく 9m</b>！ ${hit}<br><br>💡 <b>たいせつポイント</b><br>大人の 消化管は ぜんぶで <b>やく9m</b>。とくに 小腸が 6〜7mと 長い。こんなに 長い 道を とおる あいだに、たべ物は 少しずつ 消化・${W.kyushu}されるんだ。きみの おなかの中に、そんな 長い たびが かくれているんだね！`);
      setButtons([{ label: 'まとめへ すすむ', cb: nextStep }]);
    },
  },

  ending: {
    enter() {
      S.loc = 'small';
      showOverlay(`
        <h2>⭐ みならい<ruby>探検隊<rt>たんけんたい</rt></ruby> にんてい！ ⭐</h2>
        <div class="phasesStrip">${'★'.repeat(S.badges.size)}${'☆'.repeat(Math.max(0, 5 - S.badges.size))}</div>
        <p class="talk" id="blankArea">きょうの <b>たびの ひみつ</b>、いえるかな？（タッチで こたえ）<br>
        ① たべ物を 体に とりこめる <b>小さな つぶ</b>に かえることを（<span class="blankWord" data-a="消化">？？？</span>）という。<br>
        ② ${W.yobun}を おもに とりこむ（${W.kyushu}する）のは（<span class="blankWord" data-a="小腸">？？？</span>）。<br>
        ③ 口→食道→胃→小腸→大腸と つづく 道を（<span class="blankWord" data-a="消化管">？？？</span>）といい、やく（<span class="blankWord" data-a="9">？</span>）mも ある！</p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>②「小さな つぶに かわって、体に とりこまれる」</b>でした！ たべ物は きえるんじゃなくて、きみの 体の 一部に なるんだね。</p>
        <p class="talk">🏠 <b>おうちミッション</b><br>ごはんを ひとくち、口の中で <b>30回 かんで</b>みて。だんだん <b>${W.amai}く</b> なってくるよ！ それが きょう 見た「口の 消化」——きみの 体で じっさいに おきている しょうこ。たんけんノートに かんそうを かこう！</p>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで たんけん</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(scopeBurst, 200);
      panelEl.querySelectorAll('.blankWord').forEach(sp => {
        sp.onclick = function () {
          this.textContent = this.dataset.a;
          this.style.color = '#3a9a4a'; sYes(); scopeBurst();
        };
      });
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  free: {
    enter() {
      S.phase = 'free';
      say(`<b>じゆうモード</b>！ 5つの ばしょを タッチで めぐって、${ruby('友', 'とも')}だちと クイズを 出しあおう。<br>れい：「養分を とるのは どこ？」「だ液は 何を 消化する？」「消化管は 何m？」`);
      const btns = STATIONS.map(st => ({
        label: `${st.emoji} ${st.name}`, cls: 'sub',
        cb: () => { S.loc = st.key; updateLoc(); setScopeForLoc(); sTap(); },
      }));
      btns.push({ label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) });
      setButtons(btns);
      setControls([]);
    },
  },
};

function setScopeForLoc() {
  S.scopeMode = ({ mouth: 'broken', shokudo: 'broken', stomach: 'broken', small: 'absorb', large: 'water' })[S.loc] || 'starch';
  S.digest = S.loc === 'mouth' ? 0.5 : 1;
  S.absorb = (S.loc === 'small' || S.loc === 'large') ? 1 : 0;
}

// ---------- 先生バー ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

// ---------- 開始 ----------
// （URLの後ろに ?step=m_stomach などで途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
