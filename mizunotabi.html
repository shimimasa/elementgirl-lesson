<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script>
'use strict';
/* =====================================================
   みずの旅 だいぼうけん — 水はどこから（小4社会・協力型・1ファイル）
   雨→森・ダム→浄水場（沈でん→ろ過→消毒）→配水池→じゃ口→（下水→川→海→雨）
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  mizu: ruby('水', 'みず'),
  ame: ruby('雨', 'あめ'),
  mori: ruby('森', 'もり'),
  kawa: ruby('川', 'かわ'),
  josui: ruby('浄水場', 'じょうすいじょう'),
  chinden: 'ちんでん' + ruby('池', 'いけ'),
  roka: 'ろか' + ruby('池', 'いけ'),
  shodoku: ruby('消毒', 'しょうどく'),
  haisui: ruby('配水池', 'はいすいち'),
  jaguchi: 'じゃ' + ruby('口', 'ぐち'),
  kin: ruby('菌', 'きん'),
  gesui: ruby('下水処理場', 'げすいしょりじょう'),
  umi: ruby('海', 'うみ'),
};

// ---------- 旅のステーション ----------
const LOCS = {
  yama:    { name: '山・ダム', kana: 'やま・だむ', x: 250, y: 330 },
  chinden: { name: 'ちんでん池', kana: 'ちんでんいけ', x: 512, y: 470 },
  roka:    { name: 'ろか池', kana: 'ろかいけ', x: 637, y: 470 },
  shodoku: { name: '消毒', kana: 'しょうどく', x: 745, y: 470 },
  tap:     { name: 'じゃ口', kana: 'じゃぐち', x: 916, y: 508 },
};

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  loc: 'yama',
  rainT: 0,            // 雨のこり時間
  reservoir: 0.25,     // ダムの水位 0..1
  gateOpen: false,
  chindenProg: 0,      // 沈でんの進み 0..1
  rokaProg: 0,         // ろ過の進み
  germs: true,         // 菌がいるか
  shodokuProg: 0,
  towerFill: 0,        // 配水池の水
  tapOn: false,
  cupFill: 0,
  scopeMode: 'rain',   // rain / dirty / settled / filtered / clean
  phase: '', pick: -1,
  sound: true,
  votePicked: new Set(),
  badges: new Set(),
  anim: {},
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));
const sHmm = () => { tone(392, 0, 0.18, 'sine', 0.07); tone(349, 0.16, 0.3, 'sine', 0.07); };
const sFanfare = () => [523, 587, 659, 784, 880, 1046, 1318, 1568].forEach((f, i) => tone(f, i * 0.08, 0.45, 'triangle', 0.1));
const sDrip = () => { tone(880, 0, 0.08, 'sine', 0.06); tone(1174, 0.07, 0.1, 'sine', 0.05); };
const sFlow = () => { tone(300, 0, 0.25, 'sine', 0.05); tone(360, 0.1, 0.25, 'sine', 0.05); };

// ---------- キャンバス ----------
const stageCv = $('stage'), scopeCv = $('scope'), fxCv = $('fx');
const gctx = stageCv.getContext('2d'), sctx = scopeCv.getContext('2d'), fctx = fxCv.getContext('2d');
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}

// ---------- 旅マップの描画 ----------
const PAD_T = 54, PAD_B = 60, PAD_X = 10;
const MAPW = 1000, MAPH = 620;
function mapTransform(w, h) {
  const sc = Math.min((w - PAD_X * 2) / MAPW, (h - PAD_T - PAD_B) / MAPH);
  const ox = PAD_X + (w - PAD_X * 2 - MAPW * sc) / 2;
  const oy = PAD_T + (h - PAD_T - PAD_B - MAPH * sc) / 2;
  return { sc, ox, oy };
}
let rainDrops = [];
function drawStage(t, dt) {
  const { w, h, dpr } = fitCanvas(stageCv);
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gctx.clearRect(0, 0, w, h);
  const { sc, ox, oy } = mapTransform(w, h);
  const X = x => ox + x * sc, Y = y => oy + y * sc;
  const GROUND = 500;

  // たいよう
  gctx.fillStyle = 'rgba(255,220,120,.9)';
  gctx.beginPath(); gctx.arc(X(940), Y(60), 26 * sc, 0, TAU); gctx.fill();
  gctx.strokeStyle = 'rgba(255,220,120,.6)'; gctx.lineWidth = 2.5 * sc;
  for (let i = 0; i < 8; i++) {
    const a = i * TAU / 8 + t * 0.15;
    gctx.beginPath();
    gctx.moveTo(X(940) + Math.cos(a) * 34 * sc, Y(60) + Math.sin(a) * 34 * sc);
    gctx.lineTo(X(940) + Math.cos(a) * 44 * sc, Y(60) + Math.sin(a) * 44 * sc);
    gctx.stroke();
  }

  // じめん
  gctx.fillStyle = '#a8d48a';
  gctx.fillRect(0, Y(GROUND), w, h - Y(GROUND));
  gctx.fillStyle = '#8fc470';
  gctx.fillRect(0, Y(GROUND), w, 5 * sc);

  // 山（森）
  const mt = (px, py, wdt, hgt, col) => {
    gctx.fillStyle = col;
    gctx.beginPath();
    gctx.moveTo(X(px - wdt / 2), Y(GROUND));
    gctx.lineTo(X(px), Y(py));
    gctx.lineTo(X(px + wdt / 2), Y(GROUND));
    gctx.closePath(); gctx.fill();
  };
  mt(120, 130, 330, 0, '#5f9e58');
  mt(240, 200, 300, 0, '#74b168');
  // 木
  gctx.fillStyle = '#3f7a3c';
  [[70, 330], [110, 260], [150, 350], [190, 300], [230, 360], [260, 300]].forEach(([tx, ty]) => {
    gctx.beginPath();
    gctx.moveTo(X(tx), Y(ty - 26)); gctx.lineTo(X(tx + 11), Y(ty)); gctx.lineTo(X(tx - 11), Y(ty));
    gctx.closePath(); gctx.fill();
  });

  // 雨雲と雨
  gctx.fillStyle = S.rainT > 0 ? '#8aa8ba' : '#e8f2f8';
  gctx.strokeStyle = '#9cc4da'; gctx.lineWidth = 2;
  [[150, 80, 30], [185, 72, 24], [120, 74, 22]].forEach(([cx2, cy2, cr]) => {
    gctx.beginPath(); gctx.arc(X(cx2), Y(cy2), cr * sc, 0, TAU); gctx.fill();
  });
  if (S.rainT > 0) {
    if (Math.random() < dt * 40) rainDrops.push({ x: 90 + Math.random() * 140, y: 100 });
    gctx.strokeStyle = 'rgba(80,150,200,.7)'; gctx.lineWidth = 2 * sc;
    rainDrops.forEach(d => {
      d.y += 300 * dt;
      gctx.beginPath();
      gctx.moveTo(X(d.x), Y(d.y)); gctx.lineTo(X(d.x - 2), Y(d.y + 12));
      gctx.stroke();
    });
    rainDrops = rainDrops.filter(d => d.y < 330);
  } else rainDrops = [];

  // ダムのみずうみ（水位）
  const resTop = 430 - S.reservoir * 70;
  gctx.fillStyle = '#5fa8d4';
  gctx.fillRect(X(240), Y(resTop), (355 - 240) * sc, (470 - resTop) * sc);
  gctx.strokeStyle = 'rgba(255,255,255,.5)'; gctx.lineWidth = 2;
  gctx.beginPath();
  for (let x = 240; x <= 355; x += 10) {
    const yy = resTop + Math.sin(t * 2 + x * 0.08) * 1.5;
    x === 240 ? gctx.moveTo(X(x), Y(yy)) : gctx.lineTo(X(x), Y(yy));
  }
  gctx.stroke();
  // ダムのかべ
  gctx.fillStyle = '#b8bfc4';
  gctx.beginPath();
  gctx.moveTo(X(355), Y(360)); gctx.lineTo(X(385), Y(360));
  gctx.lineTo(X(400), Y(GROUND)); gctx.lineTo(X(355), Y(GROUND));
  gctx.closePath(); gctx.fill();
  gctx.strokeStyle = '#8a949c'; gctx.lineWidth = 2; gctx.stroke();
  // 水門
  gctx.fillStyle = S.gateOpen ? '#4a90b8' : '#5a646c';
  gctx.fillRect(X(360), Y(468 - (S.gateOpen ? 16 : 0)), 22 * sc, 26 * sc);

  // ダム→浄水場への川（水路）
  if (S.gateOpen) {
    gctx.strokeStyle = '#5fa8d4'; gctx.lineWidth = 13 * sc; gctx.lineCap = 'round';
    gctx.beginPath();
    gctx.moveTo(X(390), Y(487)); gctx.lineTo(X(470), Y(487)); gctx.lineTo(X(490), Y(465));
    gctx.stroke();
    gctx.strokeStyle = 'rgba(255,255,255,.55)'; gctx.lineWidth = 2.5 * sc;
    gctx.setLineDash([9 * sc, 12 * sc]);
    gctx.lineDashOffset = -(t * 60 * sc) % (21 * sc);
    gctx.beginPath();
    gctx.moveTo(X(392), Y(487)); gctx.lineTo(X(470), Y(487)); gctx.lineTo(X(488), Y(466));
    gctx.stroke();
    gctx.setLineDash([]);
  }

  // 浄水場（3つの池）
  gctx.fillStyle = '#eef7fb';
  gctx.fillRect(X(455), Y(392), (790 - 455) * sc, 18 * sc);
  gctx.fillStyle = '#2a7fb5';
  gctx.font = `700 ${Math.max(13, 22 * sc)}px sans-serif`;
  gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
  gctx.fillText('じょうすい場', X(622), Y(401));

  const pool = (x0, x1, waterCol, label) => {
    gctx.fillStyle = '#c8d4da';
    gctx.fillRect(X(x0) - 5 * sc, Y(425), (x1 - x0) * sc + 10 * sc, 75 * sc);
    gctx.fillStyle = waterCol;
    gctx.fillRect(X(x0), Y(432), (x1 - x0) * sc, 61 * sc);
    gctx.fillStyle = '#3a7a9c';
    gctx.font = `${Math.max(11, 17 * sc)}px sans-serif`;
    gctx.fillText(label, X((x0 + x1) / 2), Y(515));
  };
  // ちんでん池：にごり→上ずみがきれいに
  const cp = S.chindenProg;
  pool(465, 560, `rgba(${150 - cp * 60},${115 + cp * 40},${80 + cp * 90},.85)`, 'ちんでん池');
  if (cp > 0.3) {   // しずんだどろ
    gctx.fillStyle = '#7a6248';
    gctx.fillRect(X(465), Y(486), 95 * sc, 7 * sc * clamp(cp, 0, 1));
  }
  // ろか池：すなと小石の層
  pool(585, 680, S.rokaProg > 0.5 ? 'rgba(150,200,235,.8)' : 'rgba(130,160,175,.75)', 'ろか池');
  gctx.fillStyle = '#d9c48a';
  gctx.fillRect(X(585), Y(470), 95 * sc, 12 * sc);
  gctx.fillStyle = '#a08858';
  for (let i = 0; i < 9; i++) {
    gctx.beginPath();
    gctx.arc(X(592 + i * 10), Y(488), 2.6 * sc, 0, TAU); gctx.fill();
  }
  // 消毒池
  pool(705, 780, S.shodokuProg > 0.5 ? 'rgba(140,215,245,.9)' : 'rgba(150,200,235,.8)', '消どく');
  if (S.shodokuProg > 0.5) {
    gctx.fillStyle = `rgba(255,255,255,${0.5 + 0.4 * Math.sin(t * 4)})`;
    gctx.font = `${14 * sc}px sans-serif`;
    gctx.fillText('✨', X(742), Y(455));
  }

  // 配水池（高いタンク）＋くだ
  gctx.strokeStyle = '#8a98a4'; gctx.lineWidth = 7 * sc;
  gctx.beginPath(); gctx.moveTo(X(838), Y(GROUND)); gctx.lineTo(X(838), Y(330)); gctx.stroke();
  gctx.beginPath(); gctx.moveTo(X(882), Y(GROUND)); gctx.lineTo(X(882), Y(330)); gctx.stroke();
  gctx.fillStyle = '#c8d4da';
  gctx.fillRect(X(820), Y(270), 80 * sc, 62 * sc);
  gctx.fillStyle = '#5fa8d4';
  const tf = S.towerFill;
  gctx.fillRect(X(824), Y(328 - tf * 52), 72 * sc, tf * 52 * sc);
  gctx.fillStyle = '#3a7a9c';
  gctx.font = `${Math.max(11, 17 * sc)}px sans-serif`;
  gctx.fillText('はいすい池', X(860), Y(255));
  // 消毒→配水池のパイプ（ポンプで上へ）
  gctx.strokeStyle = '#8a98a4'; gctx.lineWidth = 6 * sc;
  gctx.beginPath();
  gctx.moveTo(X(780), Y(460)); gctx.lineTo(X(810), Y(460)); gctx.lineTo(X(810), Y(300)); gctx.lineTo(X(820), Y(300));
  gctx.stroke();
  if (S.anim.pumping) {
    gctx.strokeStyle = 'rgba(140,215,245,.9)'; gctx.lineWidth = 3 * sc;
    gctx.setLineDash([7 * sc, 9 * sc]);
    gctx.lineDashOffset = -(t * 70 * sc) % (16 * sc);
    gctx.beginPath();
    gctx.moveTo(X(780), Y(460)); gctx.lineTo(X(810), Y(460)); gctx.lineTo(X(810), Y(300)); gctx.lineTo(X(820), Y(300));
    gctx.stroke();
    gctx.setLineDash([]);
  }
  // 配水池→家のパイプ
  gctx.strokeStyle = '#8a98a4'; gctx.lineWidth = 6 * sc;
  gctx.beginPath();
  gctx.moveTo(X(882), Y(340)); gctx.lineTo(X(905), Y(340)); gctx.lineTo(X(905), Y(495));
  gctx.stroke();

  // いえ＋じゃ口
  gctx.fillStyle = '#f5e8d8';
  gctx.fillRect(X(915), Y(440), 70 * sc, 60 * sc);
  gctx.fillStyle = '#d8523c';
  gctx.beginPath();
  gctx.moveTo(X(908), Y(440)); gctx.lineTo(X(950), Y(405)); gctx.lineTo(X(992), Y(440));
  gctx.closePath(); gctx.fill();
  gctx.fillStyle = '#7a94a4';
  gctx.fillRect(X(905), Y(495), 18 * sc, 7 * sc);   // じゃ口
  if (S.tapOn) {
    gctx.strokeStyle = 'rgba(120,190,235,.9)'; gctx.lineWidth = 4.5 * sc;
    gctx.beginPath(); gctx.moveTo(X(910), Y(502)); gctx.lineTo(X(910), Y(530)); gctx.stroke();
  }
  // コップ
  gctx.strokeStyle = '#5a7f95'; gctx.lineWidth = 2.5 * sc;
  gctx.strokeRect(X(902), Y(530), 16 * sc, 18 * sc);
  if (S.cupFill > 0) {
    gctx.fillStyle = '#8fd0f0';
    gctx.fillRect(X(903.5), Y(548 - S.cupFill * 15), 13 * sc, S.cupFill * 15 * sc);
  }
  gctx.fillStyle = '#3a7a9c';
  gctx.font = `${Math.max(11, 17 * sc)}px sans-serif`;
  gctx.fillText('じゃ口', X(952), Y(548));

  // やま・ダムラベル
  gctx.fillText('みどりのダム（森）', X(160), Y(415));
  gctx.fillText('ダム', X(310), Y(392));

  // いまいる場所のリング＋シズク
  const L = LOCS[S.loc];
  if (L) {
    gctx.strokeStyle = `rgba(216,82,60,${0.55 + 0.4 * Math.sin(t * 5)})`;
    gctx.lineWidth = 4;
    gctx.setLineDash([9, 7]);
    gctx.beginPath(); gctx.ellipse(X(L.x), Y(L.y), 62 * sc, 46 * sc, 0, 0, TAU); gctx.stroke();
    gctx.setLineDash([]);
    // シズクのミニすがた
    const sy = Y(L.y - 62) + Math.sin(t * 3) * 4;
    gctx.fillStyle = '#5db4e4'; gctx.strokeStyle = '#2a7fb5'; gctx.lineWidth = 2;
    gctx.beginPath();
    gctx.moveTo(X(L.x), sy - 14 * sc);
    gctx.bezierCurveTo(X(L.x) - 11 * sc, sy + 2 * sc, X(L.x) - 10 * sc, sy + 10 * sc, X(L.x), sy + 10 * sc);
    gctx.bezierCurveTo(X(L.x) + 10 * sc, sy + 10 * sc, X(L.x) + 11 * sc, sy + 2 * sc, X(L.x), sy - 14 * sc);
    gctx.closePath(); gctx.fill(); gctx.stroke();
  }
}

// ---------- みずのむしめがね ----------
let scopeDots = [];
function drawScope(t, dt) {
  const { w, h, dpr } = fitCanvas(scopeCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);
  const R = w / 2;
  const mode = S.scopeMode;

  let grd = sctx.createRadialGradient(R, R, 0, R, R, R);
  if (mode === 'dirty') { grd.addColorStop(0, '#c9b090'); grd.addColorStop(1, '#a08a68'); }
  else if (mode === 'settled') { grd.addColorStop(0, '#cfd8c8'); grd.addColorStop(1, '#a8b8a8'); }
  else { grd.addColorStop(0, '#e0f4fc'); grd.addColorStop(1, '#b8e0f2'); }
  sctx.fillStyle = grd; sctx.fillRect(0, 0, w, h);

  const ensure = (n, gen) => { while (scopeDots.length < n) scopeDots.push(gen()); if (scopeDots.length > n) scopeDots.length = n; };
  const move = d => {
    d.vx = (d.vx || 0) + (Math.random() - 0.5) * 30 * dt * 8;
    d.vy = (d.vy || 0) + (Math.random() - 0.5) * 30 * dt * 8;
    d.vx = clamp(d.vx, -22, 22); d.vy = clamp(d.vy, -22, 22);
    d.x += d.vx * dt; d.y += d.vy * dt;
    const dx = d.x - R, dy = d.y - R, dist = Math.hypot(dx, dy);
    if (dist > R - 12) { d.x = R + dx / dist * (R - 13); d.y = R + dy / dist * (R - 13); d.vx *= -0.5; d.vy *= -0.5; }
  };
  const germ = (x, y, i) => {
    sctx.save(); sctx.translate(x, y); sctx.rotate(Math.sin(t * 2 + i) * 0.4);
    sctx.fillStyle = '#a98ac4';
    sctx.beginPath(); sctx.ellipse(0, 0, 8, 5.5, 0, 0, TAU); sctx.fill();
    sctx.strokeStyle = '#a98ac4'; sctx.lineWidth = 1.8;
    for (let k = -1; k <= 1; k++) {
      sctx.beginPath();
      sctx.moveTo(-8, k * 3);
      sctx.quadraticCurveTo(-13, k * 3 + Math.sin(t * 6 + k) * 3, -17, k * 2);
      sctx.stroke();
    }
    sctx.fillStyle = '#fff';
    sctx.beginPath(); sctx.arc(2, -1.5, 1.6, 0, TAU); sctx.fill();
    sctx.beginPath(); sctx.arc(5, -1.5, 1.6, 0, TAU); sctx.fill();
    sctx.restore();
  };

  if (mode === 'rain') {
    ensure(14, () => ({ x: Math.random() * w, y: Math.random() * h, r: 3.5 }));
    scopeDots.forEach(d => { move(d);
      sctx.fillStyle = '#7fc4e8';
      sctx.beginPath(); sctx.arc(d.x, d.y, 3.5, 0, TAU); sctx.fill();
    });
    label('きれいな あまみず');
  } else if (mode === 'dirty') {
    ensure(26, () => ({ x: Math.random() * w, y: Math.random() * h, r: Math.random() < 0.35 ? 9 + Math.random() * 5 : 3.5, leaf: Math.random() < 0.18 }));
    scopeDots.forEach((d, i) => { move(d);
      if (d.leaf) {
        sctx.fillStyle = '#5f8a4a';
        sctx.save(); sctx.translate(d.x, d.y); sctx.rotate(i);
        sctx.beginPath(); sctx.ellipse(0, 0, 8, 3.6, 0, 0, TAU); sctx.fill(); sctx.restore();
      } else {
        sctx.fillStyle = d.r > 7 ? '#6a5238' : '#8a6a48';
        sctx.beginPath(); sctx.arc(d.x, d.y, d.r, 0, TAU); sctx.fill();
      }
    });
    germ(R * 0.65, R * 0.7, 1); germ(R * 1.3, R * 1.15, 2); germ(R * 0.9, R * 1.45, 3);
    label('どろ・ごみ・きん だらけ！');
  } else if (mode === 'settled') {
    ensure(14, () => ({ x: Math.random() * w, y: Math.random() * h, r: 3 + Math.random() * 1.5 }));
    scopeDots.forEach(d => { move(d);
      sctx.fillStyle = '#9a8262';
      sctx.beginPath(); sctx.arc(d.x, d.y, d.r, 0, TAU); sctx.fill();
    });
    germ(R * 0.7, R * 0.75, 1); germ(R * 1.25, R * 1.2, 2); germ(R * 1.0, R * 0.5, 3);
    label('大きな よごれは しずんだ');
  } else if (mode === 'filtered') {
    scopeDots.length = 0;
    germ(R * 0.7, R * 0.8, 1); germ(R * 1.28, R * 1.1, 2); germ(R * 1.0, R * 1.4, 3);
    label('とうめい！ でも…きんが いる');
  } else if (mode === 'clean') {
    ensure(8, () => ({ x: Math.random() * w, y: Math.random() * h, p: Math.random() * TAU }));
    scopeDots.forEach((d, i) => {
      sctx.globalAlpha = 0.5 + 0.5 * Math.sin(t * 3 + d.p);
      sctx.fillStyle = '#fff';
      sctx.font = `${10 + (i % 3) * 4}px sans-serif`;
      sctx.textAlign = 'center';
      sctx.fillText('✦', d.x, d.y);
    });
    sctx.globalAlpha = 1;
    label('きんも いない。のめる水！');
  }

  function label(txt) {
    sctx.font = `700 ${R * 0.1}px sans-serif`;
    sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
    const ly = h - R * 0.24;
    const tw = sctx.measureText(txt).width;
    sctx.fillStyle = 'rgba(255,255,255,.85)';
    sctx.beginPath();
    sctx.roundRect(R - tw / 2 - 8, ly - R * 0.09, tw + 16, R * 0.18, R * 0.09);
    sctx.fill();
    sctx.fillStyle = '#16608f';
    sctx.fillText(txt, R, ly);
  }
}

// ---------- キラキラ ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 70); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#3a9ad4', '#7fd0f0', '#f2a93b', '#fff'][Math.floor(Math.random() * 4)],
    });
  }
}
function scopeBurst() {
  const r = $('scopeWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  S.rainT = Math.max(0, S.rainT - dt);
  const step = STEPS[FLOW[S.stepIndex]];
  if (step.tick) step.tick(dt);
  drawStage(t, dt);
  drawScope(t, dt);
  drawFx(dt);
  requestAnimationFrame(loop);
}

function updateLoc() {
  const L = LOCS[S.loc];
  $('locChip').textContent = `いまここ：${L.name}`;
  $('stateName').innerHTML = S.scopeMode === 'clean'
    ? `🚰 のめる${W.mizu}に なった！`
    : S.scopeMode === 'rain' ? `💧 ${ruby('旅', 'たび')}の はじまり`
    : `🚱 まだ のめない`;
}

// ---------- ステップ ----------
const FLOW = ['intro', 'vote', 'm_dam', 'm_chinden', 'm_roka', 'm_shodoku', 'hakase', 'ending', 'free'];

function gotoStep(i) {
  S.stepIndex = clamp(i, 0, FLOW.length - 1);
  S.phase = ''; S.anim = {};
  hideOverlay(); hideWish();
  setControls([]);
  STEPS[FLOW[S.stepIndex]].enter();
  updateLoc();
}
const nextStep = () => gotoStep(S.stepIndex + 1);

        ③ つかった${ruby('水', 'みず')}も きれいにして ${ruby('川', 'かわ')}へ。${ruby('水', 'みず')}は ぐるぐる（<span class="blankWord" data-a="めぐって">？？？</span>）いる。</p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>①「${ruby('雨', 'あめ')}の${ruby('水', 'みず')}」</b>でした！ ${ruby('海', 'うみ')}の${ruby('水', 'みず')}も、めぐりめぐって ${ruby('雨', 'あめ')}に なるから、じつは ぜんぶ つながっているんだけどね。</p>
        <p class="talk">🏠 <b>おうちミッション</b><br>① おうちの じゃ${ruby('口', 'ぐち')}が いくつ あるか かぞえよう。<br>② ${ruby('歯', 'は')}みがきの とき、${ruby('水', 'みず')}を とめる チャレンジ！ ${ruby('出', 'だ')}しっぱなしだと 30${ruby('秒', 'びょう')}で やく<b>6リットル</b>（ペットボトル3${ruby('本', 'ぼん')}）も ながれちゃう。${ruby('調査', 'ちょうさ')}ノートに けっかを かいてね。</p>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで あそぶ</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(scopeBurst, 200);
      panelEl.querySelectorAll('.blankWord').forEach(sp => {
        sp.onclick = function () {
          this.textContent = this.dataset.a;
          this.style.color = '#2a9a5a'; sYes(); scopeBurst();
        };
      });
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  free: {
    enter() {
      Object.assign(S, { gateOpen: true, chindenProg: 1, rokaProg: 1, shodokuProg: 1, towerFill: 1 });
      say(`<b>じゆうモード</b>！ ${ruby('旅', 'たび')}の ばしょを ボタンで めぐって、${ruby('友', 'とも')}だちと クイズを ${ruby('出', 'だ')}しあおう。<br>れい：「${W.josui}の じゅんばんは？」「1${ruby('日', 'にち')}に つかう ${ruby('水', 'みず')}は ${ruby('何', 'なん')}リットル？」`);
      const spots = [
        ['⛰️ 山・ダム', 'yama', 'rain'],
        ['🕳 ちんでん池', 'chinden', 'settled'],
        ['🏖 ろか池', 'roka', 'filtered'],
        ['✨ 消どく', 'shodoku', 'clean'],
        ['🚰 じゃ口', 'tap', 'clean'],
      ];
      setButtons(spots.map(([label, loc, mode]) => ({
        label, cls: 'sub',
        cb: () => { S.loc = loc; S.scopeMode = mode; scopeDots.length = 0; updateLoc(); sTap(); },
      })).concat([{ label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) }]));
      setControls([]);
    },
  },
};

// ---------- 先生バー ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

window.addEventListener('keydown', ev => {
  if (ev.key === 'Enter') {
    const b = document.querySelector('#btnRow .btn:not(.sub)') || document.querySelector('#panelBody .btn:not(.sub)');
    if (b) b.click();
  }
});

// ---------- 開始 ----------
// （URLの後ろに ?step=m_chinden などで途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
