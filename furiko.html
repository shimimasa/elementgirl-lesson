<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script>
'use strict';
/* =====================================================
   ふりこの間 — ふりこ体験（小5理科・協力型・1ファイル）
   1往復する時間（周期）はひもの長さだけで決まる。
   重さ・ふれはばは無関係（等時性）。 T = 2π√(L/g), g=9.8
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  furiko: ruby('振', 'ふ') + 'り' + ruby('子', 'こ'),
  ouhuku: '1' + ruby('往復', 'おうふく'),
  nagasa: ruby('長', 'なが') + 'さ',
  omosa: ruby('重', 'おも') + 'さ',
  furehaba: 'ふれ' + ruby('幅', 'はば'),
  toujisei: ruby('等時性', 'とうじせい'),
};

// ---------- 物理 ----------
const G = 9.8;
const periodOf = Lm => TAU * Math.sqrt(Lm / G);

// ---------- 長さ ①〜⑧（紙対応・cm） ----------
const TICK_CM = [10, 25, 40, 55, 70, 85, 100, 115];
const TICK_LABEL = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧'];

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  tickIdx: 3,
  weight: 'light',
  angleDeg: 25,
  theta: 25 * Math.PI / 180,
  swing: null,          // {L, theta0, t0, cycles, measured, onCycle}
  trace: [],
  targetIdx: -1,
  targetRound: 0,
  phase: '', pick: -1,
  sound: true,
  votePicked: new Set(),
  badges: new Set(),
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));
const sHmm = () => { tone(392, 0, 0.18, 'sine', 0.07); tone(349, 0.16, 0.3, 'sine', 0.07); };
const sFanfare = () => [523, 587, 659, 784, 880, 1046, 1318, 1568].forEach((f, i) => tone(f, i * 0.08, 0.45, 'triangle', 0.1));
const sSwing = () => { tone(440, 0, 0.15, 'triangle', 0.06); tone(330, 0.1, 0.2, 'triangle', 0.05); };

// ---------- キャンバス ----------
const stageCv = $('stage'), zoomCv = $('zoom'), fxCv = $('fx');
const gctx = stageCv.getContext('2d'), sctx = zoomCv.getContext('2d'), fctx = fxCv.getContext('2d');
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}
(function makeBgStars() {
  const layer = $('starsLayer');
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('span');
    s.className = 'bgstar';
    const size = 1 + Math.random() * 2.2;
    s.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-delay:${Math.random() * 3}s;`;
    layer.appendChild(s);
  }
})();

// ---------- 座標変換 ----------
const PAD_T = 56, PAD_B = 16, PAD_X = 14;
const MAPW = 1000, MAPH = 680;
function mapTransform(w, h) {
  const sc = Math.min((w - PAD_X * 2) / MAPW, (h - PAD_T - PAD_B) / MAPH);
  const ox = PAD_X + (w - PAD_X * 2 - MAPW * sc) / 2;
  const oy = PAD_T + (h - PAD_T - PAD_B - MAPH * sc) / 2;
  return { sc, ox, oy };
}

const PIVOT = { x: 500, y: 148 };
const PX_PER_CM = 3.3;
const RULER_X = 800;

// ---------- 歯車（かざり） ----------
function drawGear(cx, cy, r, teeth, rotDeg) {
  gctx.save();
  gctx.translate(cx, cy); gctx.rotate(rotDeg * Math.PI / 180);
  gctx.fillStyle = 'rgba(120,140,255,.10)';
  gctx.beginPath();
  for (let i = 0; i < teeth * 2; i++) {
    const a = i / (teeth * 2) * TAU;
    const rr = i % 2 === 0 ? r : r * 0.82;
    const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
    i === 0 ? gctx.moveTo(px, py) : gctx.lineTo(px, py);
  }
  gctx.closePath(); gctx.fill();
  gctx.beginPath(); gctx.arc(0, 0, r * 0.3, 0, TAU); gctx.fillStyle = 'rgba(120,140,255,.14)'; gctx.fill();
  gctx.restore();
}

// ---------- ものさし①〜⑧ ----------
function drawRuler(X, Y, sc) {
  gctx.strokeStyle = 'rgba(189,196,255,.4)'; gctx.lineWidth = 2 * sc;
  gctx.beginPath();
  gctx.moveTo(X(RULER_X), Y(PIVOT.y));
  gctx.lineTo(X(RULER_X), Y(PIVOT.y + TICK_CM[7] * PX_PER_CM + 16));
  gctx.stroke();
  TICK_CM.forEach((cm, i) => {
    const ty = PIVOT.y + cm * PX_PER_CM;
    const active = i === S.tickIdx;
    gctx.strokeStyle = active ? '#ffd66b' : 'rgba(189,196,255,.5)';
    gctx.lineWidth = (active ? 3 : 2) * sc;
    gctx.beginPath(); gctx.moveTo(X(RULER_X - 10), Y(ty)); gctx.lineTo(X(RULER_X + 10), Y(ty)); gctx.stroke();
    gctx.font = `700 ${Math.max(11, (active ? 19 : 14) * sc)}px sans-serif`;
    gctx.fillStyle = active ? '#ffe9a8' : '#8f96c8';
    gctx.textAlign = 'left'; gctx.textBaseline = 'middle';
    gctx.fillText(TICK_LABEL[i], X(RULER_X + 16), Y(ty));
  });
  const Lpx = TICK_CM[S.tickIdx] * PX_PER_CM;
  gctx.setLineDash([4, 4]); gctx.strokeStyle = 'rgba(255,214,107,.55)'; gctx.lineWidth = 1.6 * sc;
  gctx.beginPath(); gctx.moveTo(X(PIVOT.x), Y(PIVOT.y + Lpx)); gctx.lineTo(X(RULER_X), Y(PIVOT.y + Lpx)); gctx.stroke();
  gctx.setLineDash([]);
  if (S.targetIdx >= 0) {
    const ty2 = PIVOT.y + TICK_CM[S.targetIdx] * PX_PER_CM;
    gctx.font = `${22 * sc}px sans-serif`;
    gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
    gctx.fillText('🎯', X(RULER_X - 30), Y(ty2));
  }
}

// ---------- ステージ描画 ----------
function drawStage(t) {
  const { w, h, dpr } = fitCanvas(stageCv);
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gctx.clearRect(0, 0, w, h);
  const { sc, ox, oy } = mapTransform(w, h);
  const X = x => ox + x * sc, Y = y => oy + y * sc;

  gctx.fillStyle = '#0d1230';
  gctx.fillRect(X(0), Y(0), MAPW * sc, MAPH * sc);
  drawGear(X(150), Y(470), 150 * sc, 10, t * 6);
  drawGear(X(900), Y(560), 95 * sc, 8, -t * 8);
  drawGear(X(930), Y(190), 55 * sc, 6, t * 10);

  // てんじょうの はり
  gctx.fillStyle = '#4a3d2a';
  gctx.fillRect(X(360), Y(105), 280 * sc, 20 * sc);
  gctx.fillStyle = '#6a5638';
  gctx.fillRect(X(360), Y(105), 280 * sc, 6 * sc);
  gctx.strokeStyle = '#8a6a3a'; gctx.lineWidth = 4 * sc;
  gctx.beginPath(); gctx.moveTo(X(PIVOT.x), Y(125)); gctx.lineTo(X(PIVOT.x), Y(PIVOT.y)); gctx.stroke();

  drawRuler(X, Y, sc);

  // ふれはばの めやす（点線）
  const theta0 = S.swing ? S.swing.theta0 : S.angleDeg * Math.PI / 180;
  const Lpx = TICK_CM[S.tickIdx] * PX_PER_CM;
  gctx.setLineDash([5, 5]); gctx.strokeStyle = 'rgba(255,214,107,.35)'; gctx.lineWidth = 2 * sc;
  [theta0, -theta0].forEach(a => {
    const ex = PIVOT.x + Math.sin(a) * Lpx, ey = PIVOT.y + Math.cos(a) * Lpx;
    gctx.beginPath(); gctx.moveTo(X(PIVOT.x), Y(PIVOT.y)); gctx.lineTo(X(ex), Y(ey)); gctx.stroke();
  });
  gctx.setLineDash([]);

  // ふりこ本体
  const bx = PIVOT.x + Math.sin(S.theta) * Lpx, by = PIVOT.y + Math.cos(S.theta) * Lpx;
  gctx.strokeStyle = '#c9a227'; gctx.lineWidth = 3 * sc;
  gctx.beginPath(); gctx.moveTo(X(PIVOT.x), Y(PIVOT.y)); gctx.lineTo(X(bx), Y(by)); gctx.stroke();

  const bobR = (S.weight === 'heavy' ? 24 : 15) * sc;
  const bobCol = S.weight === 'heavy' ? '#e8c53a' : '#cfd6ff';
  const grd = gctx.createRadialGradient(X(bx) - bobR * 0.3, Y(by) - bobR * 0.3, bobR * 0.1, X(bx), Y(by), bobR);
  grd.addColorStop(0, '#fff'); grd.addColorStop(1, bobCol);
  gctx.fillStyle = grd;
  gctx.beginPath(); gctx.arc(X(bx), Y(by), bobR, 0, TAU); gctx.fill();
  gctx.strokeStyle = '#7a4d00'; gctx.lineWidth = 2 * sc; gctx.stroke();

  gctx.fillStyle = '#8a6a3a';
  gctx.beginPath(); gctx.arc(X(PIVOT.x), Y(PIVOT.y), 8 * sc, 0, TAU); gctx.fill();

  // ゆか
  gctx.fillStyle = 'rgba(10,14,36,.85)';
  gctx.fillRect(X(0), Y(628), 1000 * sc, 52 * sc);
  gctx.strokeStyle = 'rgba(120,140,255,.25)'; gctx.lineWidth = 2 * sc;
  gctx.beginPath(); gctx.moveTo(X(0), Y(628)); gctx.lineTo(X(1000), Y(628)); gctx.stroke();
}

// ---------- 記録計（丸窓） ----------
function drawScope(t) {
  const { w, h, dpr } = fitCanvas(zoomCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);
  const R = w / 2;

  const grd = sctx.createRadialGradient(R, R, 0, R, R, R);
  grd.addColorStop(0, '#1c2450'); grd.addColorStop(1, '#0d1030');
  sctx.fillStyle = grd; sctx.fillRect(0, 0, w, h);

  S.trace.push({ t, th: S.theta });
  const WINDOW = 6;
  while (S.trace.length && t - S.trace[0].t > WINDOW) S.trace.shift();

  sctx.save();
  sctx.beginPath(); sctx.arc(R, R, R, 0, TAU); sctx.clip();
  const cx0 = R * 0.15, cx1 = R * 1.85, cy = R, ampPx = R * 0.6;
  sctx.strokeStyle = 'rgba(189,196,255,.28)'; sctx.lineWidth = 1;
  sctx.beginPath(); sctx.moveTo(cx0, cy); sctx.lineTo(cx1, cy); sctx.stroke();
  for (let s = 0; s <= WINDOW; s++) {
    const gx = cx1 - (s / WINDOW) * (cx1 - cx0);
    sctx.strokeStyle = 'rgba(189,196,255,.14)';
    sctx.beginPath(); sctx.moveTo(gx, cy - ampPx * 1.1); sctx.lineTo(gx, cy + ampPx * 1.1); sctx.stroke();
  }
  sctx.strokeStyle = '#ffd66b'; sctx.lineWidth = 2.4; sctx.beginPath();
  S.trace.forEach((p, i) => {
    const gx = cx1 - ((t - p.t) / WINDOW) * (cx1 - cx0);
    const gy = cy - (p.th / (Math.PI / 2)) * ampPx;
    i === 0 ? sctx.moveTo(gx, gy) : sctx.lineTo(gx, gy);
  });
  sctx.stroke();
  sctx.restore();

  let label = 'ふりこを ふってね';
  if (S.swing) {
    if (S.swing.measured != null) label = `1おうふく：${S.swing.measured.toFixed(1)}びょう`;
    else label = `けいそく中… ${(t - S.swing.t0).toFixed(1)}びょう`;
  }
  sctx.font = `700 ${Math.max(11, R * 0.105)}px sans-serif`;
  sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
  const ly = h - R * 0.22;
  const tw = sctx.measureText(label).width;
  sctx.fillStyle = 'rgba(13,16,48,.88)';
  sctx.beginPath(); sctx.roundRect(R - tw / 2 - 10, ly - R * 0.1, tw + 20, R * 0.2, R * 0.1); sctx.fill();
  sctx.fillStyle = '#ffe9a8';
  sctx.fillText(label, R, ly);
}

// ---------- キラキラ（#fxは非表示のため見た目には出ないが処理は残す） ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 60); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 240;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#ffd66b', '#f2a93b', '#cfd6ff', '#fff'][Math.floor(Math.random() * 4)],
    });
  }
}
function scopeBurst() {
  const r = $('zoomWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- ふりこの物理 ----------
let simNow = performance.now() / 1000;
function startSwing(tickIdx, angleDeg, onCycle) {
  S.tickIdx = tickIdx;
  S.angleDeg = angleDeg;
  const L = TICK_CM[tickIdx] / 100;
  S.swing = { L, theta0: angleDeg * Math.PI / 180, t0: simNow, cycles: 0, measured: null, fired: false, onCycle };
  S.theta = S.swing.theta0;
  S.trace = [];
  sSwing();
}
function stopSwing() {
  S.swing = null;
  S.theta = S.angleDeg * Math.PI / 180;
}
function stepSwing(t) {
  if (!S.swing) return;
  const sw = S.swing;
  const T = periodOf(sw.L);
  const elapsed = t - sw.t0;
  S.theta = sw.theta0 * Math.cos(TAU * elapsed / T);
  const cyclesNow = Math.floor(elapsed / T);
  if (cyclesNow > sw.cycles) {
    sw.cycles = cyclesNow;
    sw.measured = T;
    if (!sw.fired) { sw.fired = true; if (sw.onCycle) sw.onCycle(T); }
  }
}

let _lastChip = '';
function updateChip() {
  const label = `${TICK_LABEL[S.tickIdx]}　${TICK_CM[S.tickIdx]}cm`;
  if (label !== _lastChip) { _lastChip = label; $('timeChip').textContent = label; }
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now; simNow = t;
  stepSwing(t);
  drawStage(t);
  drawScope(t);
  drawFx(dt);
  updateChip();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', ev => {
  if (ev.key === 'Enter') {
    const b = document.querySelector('#btnRow .btn:not(.sub)') || document.querySelector('#panelBody .btn:not(.sub)');
    if (b) b.click();
  }
});

// ---------- UIヘルパー ----------
const bubbleEl = $('bubble'), wishEl = $('wishCard'), btnRow = $('btnRow'), controlsEl = $('controls');
function say(html) {
  bubbleEl.style.animation = 'none'; void bubbleEl.offsetWidth;
  bubbleEl.style.animation = ''; bubbleEl.innerHTML = html;
}
function setWish(icon, html) {
  wishEl.style.display = 'flex';
  wishEl.querySelector('.icon').textContent = icon;
  wishEl.querySelector('.wbody').innerHTML = html;
}
function hideWish() { wishEl.style.display = 'none'; }
function setButtons(list) {
  btnRow.innerHTML = '';
  list.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn' + (b.cls ? ' ' + b.cls : '');
    el.innerHTML = b.label;
    el.onclick = () => { sTap(); b.cb(el); };
    btnRow.appendChild(el);
  });
}
function award(id) {
  if (S.badges.has(id)) return;
  S.badges.add(id);
  $('bd_' + id).classList.add('on');
}
const overlayEl = $('overlay'), panelEl = $('panelBody');
function showOverlay(html) { panelEl.innerHTML = html; overlayEl.classList.add('show'); }
function hideOverlay() { overlayEl.classList.remove('show'); }
function setControls(list) {
  controlsEl.innerHTML = '';
  list.forEach(b => {
    const el = document.createElement('button');
    el.className = 'ctl' + (b.cls ? ' ' + b.cls : ''); el.innerHTML = b.label;
    el.onclick = () => { ac(); b.cb(el); };
    controlsEl.appendChild(el);
  });
}

// ---------- ステップ ----------
const FLOW = ['intro', 'vote', 'm_nagasa', 'm_omori', 'm_haba', 'm_nerau', 'hakase', 'ending', 'free'];

function gotoStep(i) {
  S.stepIndex = clamp(i, 0, FLOW.length - 1);
  S.phase = ''; S.pick = -1; S.swing = null; S.targetIdx = -1;
  hideOverlay(); hideWish();
  setControls([]);
  STEPS[FLOW[S.stepIndex]].enter();
}
const nextStep = () => gotoStep(S.stepIndex + 1);

      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`じっけん しよう！ おもさを かえて、りょうほう ふってみて。`);
      setButtons([]);
      setControls([
        { label: '🪶 かるい おもりで ふる', cb: () => this.test('light') },
        { label: '⚙ おもい おもりで ふる', cb: () => this.test('heavy') },
      ]);
    },
    test(kind) {
      S.weight = kind;
      startSwing(3, 25, measured => {
        this.done[kind] = measured;
        $('stateName').innerHTML = `${kind === 'light' ? 'かるい' : 'おもい'}：${measured.toFixed(1)}びょう`;
        sYes();
        if (this.done.light != null && this.done.heavy != null) this.reveal();
      });
    },
    reveal() {
      S.phase = 'done';
      setControls([]);
      scopeBurst(); award('m_omori');
      say(`⚖ かるい おもりも おもい おもりも、どちらも <b>${this.done.light.toFixed(1)}びょう</b>！ おなじだった！ ✨<br><br>💡 <b>たいせつポイント</b><br>${W.ouhuku}する 時間は、${ruby('重', 'おも')}さが 変わっても <b>${ruby('変', 'か')}わらない</b>。おもさは かんけい なかったんだね！`);
      setButtons([{ label: 'つぎへ（ふれはばくらべ）', cb: nextStep }]);
    },
  },

  // --- M3：ふれはばくらべ ---
  m_haba: {
    enter() {
      Object.assign(S, { tickIdx: 3, weight: 'light', angleDeg: 15, swing: null });
      S.theta = S.angleDeg * Math.PI / 180;
      this.done = {};
      S.phase = 'predict';
      setWish('📐', `${W.nagasa}は ④の まま。こんどは <b>${W.furehaba}</b>（ふる ${ruby('角度', 'かくど')}）を 変えてみよう。大きく ふると はやいと${ruby('思', 'おも')}う？`);
      say(`よそうを 〇したら、小さく ふる場合と 大きく ふる場合を くらべよう。`);
      setButtons([
        { label: 'Ａ 大きく ふると はやい', cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ 小さく ふると はやい', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ 同じ', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
      setControls([]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      say(`じっけん しよう！ ふれはばを かえて、りょうほう ふってみて。`);
      setButtons([]);
      setControls([
        { label: '📐 小さく(15°) ふる', cb: () => this.test('small', 15) },
        { label: '📐 大きく(45°) ふる', cb: () => this.test('big', 45) },
      ]);
    },
    test(kind, deg) {
      S.weight = 'light';
      startSwing(3, deg, measured => {
        this.done[kind] = measured;
        $('stateName').innerHTML = `${kind === 'small' ? '小さく' : '大きく'}：${measured.toFixed(1)}びょう`;
        sYes();
        if (this.done.small != null && this.done.big != null) this.reveal();
      });
    },
    reveal() {
      S.phase = 'done';
      setControls([]);
      scopeBurst(); award('m_haba');
      say(`📐 小さく ふっても 大きく ふっても、どちらも <b>${this.done.small.toFixed(1)}びょう</b>！ また 同じだ！ ✨<br><br>💡 <b>たいせつポイント</b><br>${W.furehaba}を 変えても、${W.ouhuku}する 時間は <b>${ruby('変', 'か')}わらない</b>。${ruby('重', 'おも')}さも ${W.furehaba}も かんけい ない——のこるのは <b>${W.nagasa}</b>だけ！`);
      setButtons([{ label: 'つぎへ（ねらいうちチャレンジ）', cb: nextStep }]);
    },
  },

  // --- M4：ねらいうちチャレンジ ---
  m_nerau: {
    targets: [
      { idx: 1, sec: '1.0' },
      { idx: 6, sec: '2.0' },
    ],
    enter() {
      Object.assign(S, { tickIdx: 3, weight: 'light', angleDeg: 25, swing: null, targetRound: 0 });
      S.theta = S.angleDeg * Math.PI / 180;
      this.startRound(0);
    },
    startRound(r) {
      S.targetRound = r;
      const tg = this.targets[r];
      S.targetIdx = tg.idx;
      S.phase = 'aim';
      setWish('🎯', `${ruby('目標', 'もくひょう')}：<b>${tg.sec}びょう</b>に 合わせて ふってみよう！ 長さボタンで ちょうせいしてね。（ヒント：ものさしの 🎯じるし）`);
      say(`いまの 長さは <b>${TICK_LABEL[S.tickIdx]}</b>。ボタンで 長さを かえて、「ふる」で ためそう！`);
      setButtons([]);
      this.renderControls();
    },
    renderControls() {
      setControls([
        { label: '◀ みじかく', cb: () => { stopSwing(); S.tickIdx = clamp(S.tickIdx - 1, 0, 7); sTap(); this.renderControls(); } },
        { label: 'ながく ▶', cb: () => { stopSwing(); S.tickIdx = clamp(S.tickIdx + 1, 0, 7); sTap(); this.renderControls(); } },
        { label: '🎯 ふって ためす', cls: 'alt', cb: () => this.test() },
      ]);
    },
    test() {
      const idx = S.tickIdx;
      startSwing(idx, 25, measured => {
        $('stateName').innerHTML = `${TICK_LABEL[idx]}：${measured.toFixed(1)}びょう`;
        if (idx === S.targetIdx) {
          sYes(); scopeBurst();
          say(`🎯 ピッタリ！ <b>${TICK_LABEL[idx]}</b>で <b>${measured.toFixed(1)}びょう</b>！ せいかい！`);
          setControls([]);
          const isLast = S.targetRound >= this.targets.length - 1;
          setButtons([{ label: isLast ? 'つぎへ（はかせチャレンジ）' : 'つぎの もくひょうへ', cb: () => {
            if (isLast) { award('m_nerau'); nextStep(); }
            else this.startRound(S.targetRound + 1);
          } }]);
        } else {
          sHmm();
          const hint = idx < S.targetIdx ? 'もう少し ながく してみよう' : 'もう少し みじかく してみよう';
          say(`${TICK_LABEL[idx]}は <b>${measured.toFixed(1)}びょう</b>。おしい！ ${hint}。`);
          this.renderControls();
        }
      });
    },
  },

  // --- はかせチャレンジ：等時性の利用 ---
  hakase: {
    enter() {
      Object.assign(S, { tickIdx: 3, weight: 'light', angleDeg: 25, swing: null, targetIdx: -1 });
      S.theta = S.angleDeg * Math.PI / 180;
      S.phase = 'ask';
      hideWish();
      setControls([]);
      say(`さいごは <b>はかせチャレンジ</b>！<br>むかしの <b>${ruby('振', 'ふ')}り${ruby('子', 'こ')}${ruby('時計', 'とけい')}</b>や <b>メトロノーム</b>は、なぜ ${W.furiko}の しくみを つかっているんだろう？`);
      setButtons([
        { label: 'Ａ 音が きれいだから', cls: 'choice', cb: () => this.pick(0) },
        { label: 'Ｂ 時間が いつも 同じだから', cls: 'choice', cb: () => this.pick(1) },
        { label: 'Ｃ 見た目が かっこいいから', cls: 'choice', cb: () => this.pick(2) },
      ]);
    },
    pick(n) {
      S.phase = 'done';
      sYes(); scopeBurst(); award('hakase');
      const hit = n === 1 ? 'せいかい！' : 'じつは——';
      say(`${hit} こたえは <b>Ｂ 時間が いつも 同じだから</b>！<br><br>💡 <b>たいせつポイント</b><br>${W.nagasa}を ${ruby('一定', 'いってい')}に すれば、${ruby('重', 'おも')}さや ${W.furehaba}が 変わっても、${W.furiko}は <b>いつも 同じ リズム</b>で ゆれる。この せいしつを <b>${W.toujisei}</b>と いうんだ。むかしの ${ruby('時計', 'とけい')}は、この ${W.furiko}の ゆれで ${ruby('歯車', 'はぐるま')}を うごかして、${ruby('正確', 'せいかく')}に 時を きざんでいたんだよ。`);
      setButtons([{ label: 'まとめへ すすむ', cb: nextStep }]);
    },
  },

  ending: {
    enter() {
      setControls([]);
      showOverlay(`
        <h2>⭐ みならい とけい${ruby('職人', 'しょくにん')} にんてい！ ⭐</h2>
        <div class="phasesStrip">${'★'.repeat(S.badges.size)}${'☆'.repeat(Math.max(0, 5 - S.badges.size))}</div>
        <p class="talk" id="blankArea">きょうの <b>3つの ひみつ</b>、いえるかな？（タッチで こたえ）<br>
        ① ${W.furiko}が ${W.ouhuku}する 時間を きめるのは（<span class="blankWord" data-a="ひもの長さ">？？？</span>）。<br>
        ② おもりの ${W.omosa}を 変えても、時間は（<span class="blankWord" data-a="変わらない">？？？</span>）。<br>
        ③ ${W.furehaba}を 変えても、時間は（<span class="blankWord" data-a="変わらない">？？？</span>）。</p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>③ ひもの ${W.nagasa}</b>でした！ ${ruby('重', 'おも')}さや ${W.furehaba}は、じつは かんけい なかったんだね。</p>
        <p class="talk">🏠 <b>おうちミッション</b><br>おうちで <b>糸</b>と <b>おもり</b>（クリップ・けしゴムなど）で 自分だけの ${W.furiko}を 作ってみよう。${ruby('長', 'なが')}さを 変えて、${W.ouhuku}する 時間が どう変わるか たしかめてね。10${ruby('回', 'かい')} ${ruby('往復', 'おうふく')}させて 10で わると、より ${ruby('正確', 'せいかく')}に はかれるよ。<br>
        🚨 やくそく：ふりまわして 人に ぶつけない。高い所から 物を ぶら下げない。おもりは 小さくて 軽い物を つかう。</p>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで あそぶ</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(scopeBurst, 200);
      panelEl.querySelectorAll('.blankWord').forEach(sp => {
        sp.onclick = function () {
          this.textContent = this.dataset.a;
          this.style.color = '#3a8a3a'; sYes(); scopeBurst();
        };
      });
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  free: {
    enter() {
      Object.assign(S, { tickIdx: 3, weight: 'light', angleDeg: 25, swing: null, targetIdx: -1 });
      S.theta = S.angleDeg * Math.PI / 180;
      S.phase = 'free';
      say(`<b>じゆうモード</b>だよ！ 長さ・おもさ・ふれはばを じゆうに かえて、ともだちと クイズを 出しあってみよう。<br>れい：「④と⑦、どっちが はやい？」「おもさを 重くしたら 時間は？」`);
      setButtons([
        { label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) },
      ]);
      this.renderControls();
    },
    renderControls() {
      setControls([
        { label: '◀ みじかく', cb: () => { stopSwing(); S.tickIdx = clamp(S.tickIdx - 1, 0, 7); sTap(); this.renderControls(); } },
        { label: 'ながく ▶', cb: () => { stopSwing(); S.tickIdx = clamp(S.tickIdx + 1, 0, 7); sTap(); this.renderControls(); } },
        { label: S.weight === 'light' ? '🪶→⚙ おもさを かえる' : '⚙→🪶 おもさを かえる', cb: () => { stopSwing(); S.weight = S.weight === 'light' ? 'heavy' : 'light'; sTap(); this.renderControls(); } },
        { label: S.angleDeg === 25 ? '📐 大きく ふる' : '📐 小さく ふる', cb: () => { stopSwing(); S.angleDeg = S.angleDeg === 25 ? 45 : 25; S.theta = S.angleDeg * Math.PI / 180; sTap(); this.renderControls(); } },
        { label: '🎯 ふる', cls: 'alt', cb: () => startSwing(S.tickIdx, S.angleDeg, measured => { $('stateName').innerHTML = `${TICK_LABEL[S.tickIdx]}：${measured.toFixed(1)}びょう`; sYes(); }) },
      ]);
    },
  },
};

// ---------- 先生バー ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

// ---------- 開始 ----------
// （URLの後ろに ?step=m_omori などで途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
