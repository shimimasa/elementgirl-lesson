<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script>
'use strict';
/* =====================================================
   ひだまり探偵社 — 地図たんてい体験（小4社会・協力型・1ファイル）
   地図記号・八方位・座標（さくいん）の3本柱
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  chizu: ruby('地図', 'ちず'),
  kigo: ruby('記号', 'きごう'),
  hoi: ruby('方位', 'ほうい'),
  kita: ruby('北', 'きた'),
  irai: ruby('依頼', 'いらい'),
  tantei: ruby('探偵', 'たんてい'),
  jinja: ruby('神社', 'じんじゃ'),
  yubin: ruby('郵便局', 'ゆうびんきょく'),
  kaju: ruby('果樹園', 'かじゅえん'),
  tosho: ruby('図書館', 'としょかん'),
  shiyaku: ruby('市役所', 'しやくしょ'),
  gakko: ruby('学校', 'がっこう'),
  kaito: ruby('怪盗', 'かいとう'),
};

// ---------- 町のデータ ----------
const COLS = ['あ', 'い', 'う', 'え', 'お'];   // よこ（左→右）
const NROWS = 4;                               // たて 1〜4（上→下）
const CELL = 200;                              // 論理サイズ
const MAPW = 1000, MAPH = 800;
const cellId = (c, r) => COLS[c] + (r + 1);

// 地図記号のしゅるい
const TYPES = {
  ta:      { name: '田', kana: 'た' },
  hata:    { name: '畑', kana: 'はたけ' },
  kaju:    { name: '果樹園', kana: 'かじゅえん' },
  mori:    { name: '森林', kana: 'しんりん' },
  jinja:   { name: '神社', kana: 'じんじゃ' },
  tera:    { name: '寺', kana: 'てら' },
  yubin:   { name: '郵便局', kana: 'ゆうびんきょく' },
  byoin:   { name: '病院', kana: 'びょういん' },
  gakko:   { name: '学校', kana: 'がっこう' },
  tosho:   { name: '図書館', kana: 'としょかん' },
  shiyaku: { name: '市役所', kana: 'しやくしょ' },
  eki:     { name: '駅', kana: 'えき' },
  koban:   { name: '交番', kana: 'こうばん' },
  shobo:   { name: '消防署', kana: 'しょうぼうしょ' },
  ki:      { name: '一本木の広場', kana: 'いっぽんぎのひろば' },
};
// 各マスに1つずつ（列0〜4 × 行0〜3）
const TOWN = [
  ['ta', 'kaju', 'mori', 'yubin', 'mori'],
  ['hata', 'ki', 'jinja', 'byoin', 'kaju'],
  ['tosho', 'shiyaku', 'tera', 'gakko', 'hata'],
  ['ta', 'eki', 'koban', 'shobo', 'ta'],
];
const typeAt = (c, r) => TOWN[r][c];
const RIVER_X = 400;   // 川：い列とう列のさかい（西がわ＝あ・い列）
const isWest = c => c <= 1;

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  sel: null,             // {c, r}
  tapEnabled: false,
  compassEnabled: false,
  discovered: new Set(), // れんしゅうで しらべた記号
  stamps: {},            // 解決ずみ {cellId: emoji}
  highlights: [],        // [{c,r,color}] はかせ用
  phase: '', qIndex: 0,
  sound: true,
  votePicked: new Set(),
  badges: new Set(),
  pulseT: 0,
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sPick = () => tone(880, 0, 0.07, 'sine', 0.06);
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));
const sHmm = () => { tone(392, 0, 0.18, 'sine', 0.07); tone(349, 0.16, 0.3, 'sine', 0.07); };
const sFanfare = () => [523, 587, 659, 784, 880, 1046, 1318, 1568].forEach((f, i) => tone(f, i * 0.08, 0.45, 'triangle', 0.1));

// ---------- キャンバス ----------
const stageCv = $('stage'), compCv = $('compass'), fxCv = $('fx');
const gctx = stageCv.getContext('2d'), cctx = compCv.getContext('2d'), fctx = fxCv.getContext('2d');
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}

// ---------- 地図の描画 ----------
// 上部にヘッダー帯（タイトル・進捗チップ）＋列ラベルのすき間を予約する。
// これで横長の画面でも、地図や座標ラベルがタイトル・チップに重ならない。
const PAD_L = 46, PAD_R = 14, PAD_T = 60, PAD_B = 14;
function mapTransform(w, h) {
  const sc = Math.min((w - PAD_L - PAD_R) / MAPW, (h - PAD_T - PAD_B) / MAPH);
  const ox = PAD_L + (w - PAD_L - PAD_R - MAPW * sc) / 2;
  const oy = PAD_T + (h - PAD_T - PAD_B - MAPH * sc) / 2;
  return { sc, ox, oy };
}

function drawSymbol(ctx, type, x, y, u) {
  // u = 基本サイズ（論理40くらい）
  ctx.save();
  ctx.translate(x, y);
  ctx.lineWidth = u * 0.09;
  ctx.strokeStyle = '#3a2c18'; ctx.fillStyle = '#3a2c18';
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  switch (type) {
    case 'ta':  // 田：たての2本線×2
      ctx.strokeStyle = '#4a7a3a';
      ctx.beginPath();
      ctx.moveTo(-u * .3, -u * .35); ctx.lineTo(-u * .3, u * .05);
      ctx.moveTo(-u * .1, -u * .35); ctx.lineTo(-u * .1, u * .05);
      ctx.moveTo(u * .15, -u * .05); ctx.lineTo(u * .15, u * .35);
      ctx.moveTo(u * .35, -u * .05); ctx.lineTo(u * .35, u * .35);
      ctx.stroke();
      break;
    case 'hata': // 畑：Ｖ
      ctx.strokeStyle = '#7a6a2a';
      ctx.beginPath();
      ctx.moveTo(-u * .3, -u * .25); ctx.lineTo(-u * .12, u * .2); ctx.lineTo(u * .06, -u * .25);
      ctx.moveTo(u * .1, .0); ctx.lineTo(u * .24, u * .3); ctx.lineTo(u * .38, 0);
      ctx.stroke();
      break;
    case 'kaju': // 果樹園：まるい実
      ctx.strokeStyle = '#b06030'; ctx.fillStyle = '#c9803a';
      ctx.beginPath(); ctx.arc(-u * .15, u * .05, u * .2, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(u * .22, -u * .12, u * .16, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-u * .15, -u * .15); ctx.lineTo(-u * .15, -u * .3); ctx.stroke();
      break;
    case 'mori': // 森林：木2本
      ctx.strokeStyle = '#2f6a3a'; ctx.fillStyle = '#3f8a4a';
      [[-u * .18, 0], [u * .2, u * .1]].forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.moveTo(dx, dy - u * .38); ctx.lineTo(dx + u * .2, dy + u * .08); ctx.lineTo(dx - u * .2, dy + u * .08);
        ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(dx, dy + u * .08); ctx.lineTo(dx, dy + u * .22); ctx.stroke();
      });
      break;
    case 'jinja': // 神社：とりい
      ctx.strokeStyle = '#b5432e'; ctx.lineWidth = u * 0.11;
      ctx.beginPath();
      ctx.moveTo(-u * .28, -u * .3); ctx.lineTo(u * .28, -u * .3);
      ctx.moveTo(-u * .34, -u * .42); ctx.lineTo(u * .34, -u * .42);
      ctx.moveTo(-u * .22, -u * .42); ctx.lineTo(-u * .22, u * .3);
      ctx.moveTo(u * .22, -u * .42); ctx.lineTo(u * .22, u * .3);
      ctx.stroke();
      break;
    case 'tera':
      ctx.font = `700 ${u * .85}px serif`;
      ctx.fillText('卍', 0, 0);
      break;
    case 'yubin':
      ctx.beginPath(); ctx.arc(0, 0, u * .42, 0, TAU); ctx.stroke();
      ctx.font = `700 ${u * .55}px sans-serif`;
      ctx.fillText('〒', 0, u * .02);
      break;
    case 'byoin': // 病院：十字の下がひろがる形（正式な地図記号にならう）
      ctx.strokeStyle = '#c0392b'; ctx.lineWidth = u * .11;
      ctx.beginPath();
      ctx.moveTo(0, -u * .38); ctx.lineTo(0, u * .05);
      ctx.moveTo(-u * .2, -u * .2); ctx.lineTo(u * .2, -u * .2);
      ctx.moveTo(0, u * .05); ctx.lineTo(-u * .26, u * .36);
      ctx.moveTo(0, u * .05); ctx.lineTo(u * .26, u * .36);
      ctx.stroke();
      break;
    case 'gakko':
      ctx.font = `700 ${u * .8}px serif`;
      ctx.fillText('文', 0, 0);
      break;
    case 'tosho': // 図書館：ひらいた本
      ctx.beginPath();
      ctx.moveTo(-u * .38, -u * .18); ctx.lineTo(0, -u * .28); ctx.lineTo(u * .38, -u * .18);
      ctx.lineTo(u * .38, u * .2); ctx.lineTo(0, u * .1); ctx.lineTo(-u * .38, u * .2);
      ctx.closePath(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -u * .28); ctx.lineTo(0, u * .1); ctx.stroke();
      break;
    case 'shiyaku': // ◎
      ctx.beginPath(); ctx.arc(0, 0, u * .38, 0, TAU); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, u * .18, 0, TAU); ctx.stroke();
      break;
    case 'eki':
      ctx.fillStyle = '#3a2c18';
      ctx.fillRect(-u * .45, -u * .2, u * .9, u * .4);
      ctx.fillStyle = '#fff';
      ctx.font = `700 ${u * .34}px sans-serif`;
      ctx.fillText('駅', 0, u * .01);
      break;
    case 'koban': // 交番：×
      ctx.lineWidth = u * .13;
      ctx.beginPath();
      ctx.moveTo(-u * .28, -u * .28); ctx.lineTo(u * .28, u * .28);
      ctx.moveTo(u * .28, -u * .28); ctx.lineTo(-u * .28, u * .28);
      ctx.stroke();
      break;
    case 'shobo': // 消防署：さすまた
      ctx.lineWidth = u * .11;
      ctx.beginPath();
      ctx.moveTo(0, u * .35); ctx.lineTo(0, -u * .05);
      ctx.moveTo(-u * .26, -u * .35); ctx.quadraticCurveTo(-u * .26, -u * .02, 0, -u * .05);
      ctx.moveTo(u * .26, -u * .35); ctx.quadraticCurveTo(u * .26, -u * .02, 0, -u * .05);
      ctx.stroke();
      break;
    case 'ki': // 一本木：大きな木
      ctx.fillStyle = '#4a8a4a';
      ctx.beginPath(); ctx.arc(0, -u * .12, u * .3, 0, TAU); ctx.fill();
      ctx.strokeStyle = '#6a4a28'; ctx.lineWidth = u * .12;
      ctx.beginPath(); ctx.moveTo(0, u * .12); ctx.lineTo(0, u * .38); ctx.stroke();
      break;
  }
  ctx.restore();
}

const CELL_TINT = {
  ta: '#e8eed2', hata: '#efe9d0', kaju: '#f4e8d0', mori: '#dfead4', ki: '#e8eed8',
};
let paperDots = null;

function drawStage(t) {
  const { w, h, dpr } = fitCanvas(stageCv);
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gctx.clearRect(0, 0, w, h);
  const { sc, ox, oy } = mapTransform(w, h);
  const X = x => ox + x * sc, Y = y => oy + y * sc;

  // 紙のしつかん
  if (!paperDots) paperDots = Array.from({ length: 70 }, () => ({ x: Math.random(), y: Math.random(), r: .5 + Math.random() * 1.2 }));
  gctx.fillStyle = 'rgba(150,120,70,.06)';
  paperDots.forEach(d => { gctx.beginPath(); gctx.arc(d.x * w, d.y * h, d.r, 0, TAU); gctx.fill(); });

  // 地面（マスごとの色）
  for (let r = 0; r < NROWS; r++) for (let c = 0; c < 5; c++) {
    const tint = CELL_TINT[typeAt(c, r)];
    if (tint) {
      gctx.fillStyle = tint;
      gctx.fillRect(X(c * CELL) + 2, Y(r * CELL) + 2, CELL * sc - 4, CELL * sc - 4);
    }
  }

  // 川（い列とう列のさかい）
  gctx.strokeStyle = '#9cc3e4'; gctx.lineWidth = 42 * sc; gctx.lineCap = 'round';
  gctx.beginPath();
  gctx.moveTo(X(RIVER_X + 12), Y(-6));
  gctx.bezierCurveTo(X(RIVER_X - 30), Y(220), X(RIVER_X + 42), Y(480), X(RIVER_X - 4), Y(MAPH + 6));
  gctx.stroke();
  gctx.strokeStyle = '#c2dcf0'; gctx.lineWidth = 26 * sc;
  gctx.stroke();

  // 道路（よこ：2/3行のさかい、たて：う/え列のさかい）
  const road = (x1, y1, x2, y2) => {
    gctx.strokeStyle = '#bfae86'; gctx.lineWidth = 30 * sc;
    gctx.beginPath(); gctx.moveTo(X(x1), Y(y1)); gctx.lineTo(X(x2), Y(y2)); gctx.stroke();
    gctx.strokeStyle = '#fffbee'; gctx.lineWidth = 22 * sc;
    gctx.beginPath(); gctx.moveTo(X(x1), Y(y1)); gctx.lineTo(X(x2), Y(y2)); gctx.stroke();
  };
  road(-6, 400, MAPW + 6, 400);
  road(600, -6, 600, MAPH + 6);
  // 橋
  gctx.strokeStyle = '#8a7350'; gctx.lineWidth = 3;
  gctx.beginPath(); gctx.moveTo(X(370), Y(384)); gctx.lineTo(X(430), Y(384)); gctx.stroke();
  gctx.beginPath(); gctx.moveTo(X(370), Y(416)); gctx.lineTo(X(430), Y(416)); gctx.stroke();

  // 線路（4行目）＋駅は記号でかく
  gctx.strokeStyle = '#3a2c18'; gctx.lineWidth = 8 * sc;
  gctx.beginPath(); gctx.moveTo(X(-6), Y(700)); gctx.lineTo(X(MAPW + 6), Y(700)); gctx.stroke();
  gctx.strokeStyle = '#fff'; gctx.lineWidth = 5 * sc;
  gctx.setLineDash([14 * sc, 14 * sc]);
  gctx.beginPath(); gctx.moveTo(X(-6), Y(700)); gctx.lineTo(X(MAPW + 6), Y(700)); gctx.stroke();
  gctx.setLineDash([]);

  // マスの線と座標ラベル
  gctx.strokeStyle = 'rgba(150,125,80,.4)'; gctx.lineWidth = 1.2;
  for (let c = 0; c <= 5; c++) {
    gctx.beginPath(); gctx.moveTo(X(c * CELL), Y(0)); gctx.lineTo(X(c * CELL), Y(MAPH)); gctx.stroke();
  }
  for (let r = 0; r <= NROWS; r++) {
    gctx.beginPath(); gctx.moveTo(X(0), Y(r * CELL)); gctx.lineTo(X(MAPW), Y(r * CELL)); gctx.stroke();
  }
  gctx.fillStyle = '#8a5a1d';
  gctx.font = `700 ${Math.max(15, 26 * sc)}px sans-serif`;
  gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
  for (let c = 0; c < 5; c++) gctx.fillText(COLS[c], X(c * CELL + CELL / 2), oy - 18);
  for (let r = 0; r < NROWS; r++) gctx.fillText(String(r + 1), ox - 20, Y(r * CELL + CELL / 2));

  // 方位記号（左上）
  gctx.save();
  gctx.translate(ox - 22, oy - 22);
  gctx.strokeStyle = '#8a5a1d'; gctx.fillStyle = '#8a5a1d'; gctx.lineWidth = 2;
  gctx.beginPath(); gctx.moveTo(0, 8); gctx.lineTo(0, -6); gctx.stroke();
  gctx.beginPath(); gctx.moveTo(0, -12); gctx.lineTo(-4.5, -4); gctx.lineTo(4.5, -4); gctx.closePath(); gctx.fill();
  gctx.font = '700 11px sans-serif'; gctx.fillText('北', 0, 17);
  gctx.restore();

  // 記号
  const u = 62 * sc;
  for (let r = 0; r < NROWS; r++) for (let c = 0; c < 5; c++) {
    const cx = X(c * CELL + CELL / 2), cy = Y(r * CELL + CELL / 2);
    drawSymbol(gctx, typeAt(c, r), cx, cy, u);
  }

  // はかせチャレンジ用ハイライト
  S.highlights.forEach(hl => {
    const cx = X(hl.c * CELL + CELL / 2), cy = Y(hl.r * CELL + CELL / 2);
    gctx.strokeStyle = hl.color;
    gctx.lineWidth = 4;
    gctx.globalAlpha = .55 + .45 * Math.sin(t * 5);
    gctx.beginPath(); gctx.arc(cx, cy, 78 * sc, 0, TAU); gctx.stroke();
    gctx.globalAlpha = 1;
  });

  // かいけつスタンプ
  gctx.font = `${64 * sc}px sans-serif`;
  gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
  for (const cid in S.stamps) {
    const c = COLS.indexOf(cid[0]), r = +cid[1] - 1;
    gctx.fillText(S.stamps[cid], X(c * CELL + CELL / 2 + 52), Y(r * CELL + CELL / 2 - 52));
  }

  // せんたく中のマス
  if (S.sel) {
    const cx = X(S.sel.c * CELL + CELL / 2), cy = Y(S.sel.r * CELL + CELL / 2);
    gctx.strokeStyle = '#d0563c';
    gctx.lineWidth = 5;
    gctx.setLineDash([10, 8]);
    gctx.lineDashOffset = -t * 30 % 18;
    gctx.beginPath(); gctx.arc(cx, cy, 84 * sc, 0, TAU); gctx.stroke();
    gctx.setLineDash([]);
  }
}

// ---------- ほういじしん ----------
const DIRS = ['北', '北東', '東', '南東', '南', '南西', '西', '北西'];
let compFlash = null;  // {dir, t}
function drawCompass(t) {
  const { w, h, dpr } = fitCanvas(compCv);
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cctx.clearRect(0, 0, w, h);
  const R = w / 2;

  let grd = cctx.createRadialGradient(R, R, 0, R, R, R);
  grd.addColorStop(0, '#fbf5e2'); grd.addColorStop(1, '#ecdfbe');
  cctx.fillStyle = grd; cctx.fillRect(0, 0, w, h);

  // めもり
  cctx.strokeStyle = '#b09660';
  for (let i = 0; i < 16; i++) {
    const a = i * TAU / 16 - Math.PI / 2;
    const r1 = R * (i % 2 === 0 ? .78 : .84), r2 = R * .88;
    cctx.lineWidth = i % 2 === 0 ? 2.5 : 1.2;
    cctx.beginPath();
    cctx.moveTo(R + Math.cos(a) * r1, R + Math.sin(a) * r1);
    cctx.lineTo(R + Math.cos(a) * r2, R + Math.sin(a) * r2);
    cctx.stroke();
  }
  // 8方位ラベル
  cctx.textAlign = 'center'; cctx.textBaseline = 'middle';
  DIRS.forEach((d, i) => {
    const a = i * TAU / 8 - Math.PI / 2;
    const rr = R * (d.length === 1 ? .62 : .64);
    const isMain = d.length === 1;
    cctx.font = `700 ${R * (isMain ? .17 : .105)}px sans-serif`;
    cctx.fillStyle = d === '北' ? '#b5432e' : '#5a4a2e';
    if (compFlash && compFlash.dir === d) {
      cctx.save();
      cctx.fillStyle = '#d0563c';
      cctx.beginPath(); cctx.arc(R + Math.cos(a) * rr, R + Math.sin(a) * rr, R * .13, 0, TAU);
      cctx.globalAlpha = .25; cctx.fill(); cctx.restore();
      cctx.fillStyle = '#b5432e';
    }
    cctx.fillText(d, R + Math.cos(a) * rr, R + Math.sin(a) * rr);
  });
  // はり
  const sway = S.compassEnabled ? 0 : Math.sin(t * 1.2) * 0.035;
  cctx.save();
  cctx.translate(R, R);
  cctx.rotate(sway);
  cctx.fillStyle = '#c0392b';
  cctx.beginPath(); cctx.moveTo(0, -R * .45); cctx.lineTo(-R * .07, 0); cctx.lineTo(R * .07, 0); cctx.closePath(); cctx.fill();
  cctx.fillStyle = '#fff';
  cctx.strokeStyle = '#8a7350'; cctx.lineWidth = 1.5;
  cctx.beginPath(); cctx.moveTo(0, R * .45); cctx.lineTo(-R * .07, 0); cctx.lineTo(R * .07, 0); cctx.closePath(); cctx.fill(); cctx.stroke();
  cctx.fillStyle = '#4a3320';
  cctx.beginPath(); cctx.arc(0, 0, R * .05, 0, TAU); cctx.fill();
  cctx.restore();

  // 答えるモードのしるし
  if (S.compassEnabled) {
    cctx.fillStyle = '#b5432e';
    cctx.font = `700 ${R * .105}px sans-serif`;
    cctx.fillText('タッチで こたえてね！', R, h - R * .16);
  }
  if (compFlash) { compFlash.t -= 1 / 60; if (compFlash.t <= 0) compFlash = null; }
}

// ---------- キラキラ ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 70); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#d0563c', '#d9a520', '#2a7f62', '#b5432e'][Math.floor(Math.random() * 4)],
    });
  }
}
function stageBurst() {
  const r = $('stageWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  drawStage(t);
  drawCompass(t);
  drawFx(dt);
  requestAnimationFrame(loop);
}

// ---------- タッチ操作 ----------
stageCv.addEventListener('pointerdown', ev => {
  ac();
  if (!S.tapEnabled) return;
  const r = stageCv.getBoundingClientRect();
  const { sc, ox, oy } = mapTransform(r.width, r.height);
  const mx = (ev.clientX - r.left - ox) / sc, my = (ev.clientY - r.top - oy) / sc;
  if (mx < 0 || my < 0 || mx >= MAPW || my >= MAPH) return;
  const c = clamp(Math.floor(mx / CELL), 0, 4), rr = clamp(Math.floor(my / CELL), 0, NROWS - 1);
  S.sel = { c, r: rr };
  sPick();
  const ty = TYPES[typeAt(c, rr)];
  $('stateName').innerHTML = `${ruby(ty.name, ty.kana)}（${cellId(c, rr)}）`;
  // れんしゅう：しらべた記号をカウント
  if (FLOW[S.stepIndex] === 'practice' && S.phase === 'explore') {
    if (!S.discovered.has(typeAt(c, rr))) {
      S.discovered.add(typeAt(c, rr));
      tone(1046, 0, 0.15, 'sine', 0.06);
    }
    updateProg();
    if (S.discovered.size >= 6 && S.phase === 'explore') practiceComplete();
  }
});

compCv.addEventListener('pointerdown', ev => {
  ac();
  if (!S.compassEnabled) return;
  const r = compCv.getBoundingClientRect();
  const dx = ev.clientX - r.left - r.width / 2, dy = ev.clientY - r.top - r.height / 2;
  if (Math.hypot(dx, dy) < r.width * 0.12) return;
  let a = Math.atan2(dy, dx) + Math.PI / 2;   // 北=0
  if (a < 0) a += TAU;
  const idx = Math.round(a / (TAU / 8)) % 8;
  compFlash = { dir: DIRS[idx], t: 0.8 };
  sPick();
  STEPS.hakase.answer(DIRS[idx]);
});

window.addEventListener('keydown', ev => {
  if (ev.key === 'Enter') {
    const b = document.querySelector('#btnRow .btn:not(.sub)') || document.querySelector('#panelBody .btn:not(.sub)');
    if (b) b.click();
  }
});

// ---------- UIヘルパー ----------
const bubbleEl = $('bubble'), wishEl = $('wishCard'), btnRow = $('btnRow');
function say(html) {
  bubbleEl.style.animation = 'none'; void bubbleEl.offsetWidth;
  bubbleEl.style.animation = ''; bubbleEl.innerHTML = html;
}
function setWish(icon, html) {
  wishEl.style.display = 'flex';
  wishEl.querySelector('.icon').textContent = icon;
  wishEl.querySelector('.wbody').innerHTML = html;
}
function hideWish() { wishEl.style.display = 'none'; }
function setButtons(list) {
  btnRow.innerHTML = '';
  list.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn' + (b.cls ? ' ' + b.cls : '');
    el.innerHTML = b.label;
    el.onclick = () => { sTap(); b.cb(el); };
    btnRow.appendChild(el);
  });
}
function award(id) {
  if (S.badges.has(id)) return;
  S.badges.add(id);
  $('bd_' + id).classList.add('on');
}
const overlayEl = $('overlay'), panelEl = $('panelBody');
function showOverlay(html) { panelEl.innerHTML = html; overlayEl.classList.add('show'); }
function hideOverlay() { overlayEl.classList.remove('show'); }
function updateProg() {
  const p = $('progChip');
  if (FLOW[S.stepIndex] === 'practice') {
    p.style.display = 'block';
    p.textContent = `しらべた きごう：${Math.min(S.discovered.size, 6)}こ／6こ`;
  } else p.style.display = 'none';
}

// ---------- 依頼（ミッション） ----------
const MISSIONS = {
  m_cat: {
    icon: '🐈', stamp: '🐈', target: 'う1',
    wish: `うちのネコの <b>チャチャ</b>が にげちゃったの！ もくげきじょうほうは——<br>「<b>⛩（${W.jinja}）の となりの ${ruby('森', 'もり')}</b>で おひるねしてた」`,
    point: `${W.kigo}が よめると、もくげきじょうほうだけで ばしょが わかる！ ⛩は ${W.jinja}、${ruby('木', 'き')}のマークは ${ruby('森林', 'しんりん')}の${W.kigo}だよ。`,
    hint(sel) {
      const cid = cellId(sel.c, sel.r), ty = typeAt(sel.c, sel.r);
      if (cid === 'う2') return `そこは ⛩ ${W.jinja} そのもの！ さがすのは その《となり》の ${ruby('森', 'もり')}だよ。`;
      if (ty === 'mori') return `${ruby('森', 'もり')}は せいかい！ でも ⛩の となりかな？ まず ⛩を 見つけよう。`;
      return `まずは ⛩（${W.jinja}）の ${W.kigo}を ${W.chizu}から さがそう！`;
    },
  },
  m_letter: {
    icon: '💌', stamp: '💌', target: 'え1',
    wish: `あて${ruby('名', 'な')}が 雨で にじんで${ruby('読', 'よ')}めない 手紙が…。読めるのは——<br>「<b>文（${W.gakko}）から ${W.kita}へ まっすぐ</b> すすんだ ところ」`,
    point: `${W.chizu}の 上は ${W.kita}！ 「${W.kita}へ すすむ」は「${W.chizu}の 上へ すすむ」だね。とどけ先は 〒（${W.yubin}）でした。`,
    hint(sel) {
      const cid = cellId(sel.c, sel.r);
      if (cid === 'え3') return `そこが 文（${W.gakko}）だね！ 手がかりは そこから《${W.kita}へ まっすぐ》。${W.kita}は ${W.chizu}の どっち？ ほういじしんを 見て！`;
      if (cid === 'え2') return `おしい！ ${ruby('十字', 'じゅうじ')}マークの ${ruby('病院', 'びょういん')}を とおりすぎて、もっと ${W.kita}へ！`;
      if (sel.c !== 3) return `文（${W.gakko}）は 《え3》に あるよ。そこから ${W.kita}へ まっすぐ すすもう。`;
      return `${W.kita}は ${W.chizu}の《${ruby('上', 'うえ')}》！ ほういじしんで たしかめよう。`;
    },
  },
  m_treasure: {
    icon: '🎁', stamp: '🎁', target: 'い2',
    wish: `おばあちゃんの ${W.irai}じょう。「わかいころ、たからものを うめました。メモには——<br>『<b>川の 西がわ</b>』『<b>${W.kaju}の みなみ</b>』『大きな 一本木の 下』」`,
    point: `手がかりを <b>かさねる</b>と、ばしょは 1つに きまる！ 「川の西がわ」で 半分に、「${W.kaju}のみなみ」で 1マスに しぼれたね。`,
    hint(sel) {
      const cid = cellId(sel.c, sel.r);
      if (!isWest(sel.c)) return `川の《西がわ》かな？ 西は ${W.chizu}の ひだり。ほういじしんで たしかめよう！`;
      if (cid === 'い1') return `そこは ${W.kaju} そのもの！ たからは その《みなみ》だよ。みなみは どっち？`;
      return `手がかりは 2つ。「川の 西がわ」と「${W.kaju}の みなみ」——りょうほうに 合う ばしょは？`;
    },
  },
  m_thief: {
    icon: '🎩', stamp: '🎩', target: 'あ3',
    wish: `${W.kaito}ホシカゲから <b>よこくじょう</b>だ！「こんや、まぼろしの${ruby('本', 'ほん')}を いただく。ばしょは——<br>『<b>川の 西がわ</b>』『<b>◎の となり</b>』『<b>田の ${W.kita}</b>』。とけるかな？」`,
    point: `3つの 手がかりが ぜんぶ かさなるのは ${W.tosho}だけ！ ${W.kigo}と ${W.hoi}が よめれば、${W.kaito}にも まけない ${W.tantei}だ！`,
    hint(sel) {
      const cid = cellId(sel.c, sel.r);
      if (!isWest(sel.c)) return `「川の 西がわ」…ホシカゲの ヒントを もういちど たしかめよう！`;
      const adj = Math.abs(sel.c - 1) + Math.abs(sel.r - 2) === 1;   // ◎=い3
      if (!adj) return `「◎（${W.shiyaku}）の となり」も わすれずに！ ◎は 《い3》に あるよ。`;
      return `さいごの 手がかり「田の ${W.kita}」。田の ${W.kigo}は どこに ある？`;
    },
  },
};

// ---------- はかせチャレンジの問題 ----------
const HAKASE_Q = [
  { from: 'い4', to: 'え4', name: ruby('消防署', 'しょうぼうしょ'), ans: '東' },
  { from: 'い4', to: 'い1', name: ruby('果樹園', 'かじゅえん'), ans: '北' },
  { from: 'い4', to: 'あ3', name: ruby('図書館', 'としょかん'), ans: '北西' },
];

// ---------- ステップ ----------
const FLOW = ['intro', 'vote', 'practice', 'm_cat', 'm_letter', 'm_treasure', 'm_thief', 'hakase', 'ending', 'free'];

function gotoStep(i) {
  S.stepIndex = clamp(i, 0, FLOW.length - 1);
  S.phase = ''; S.sel = null; S.highlights = [];
  S.tapEnabled = false; S.compassEnabled = false;
  hideOverlay(); hideWish();
  $('stateName').innerHTML = '';
  STEPS[FLOW[S.stepIndex]].enter();
  updateProg();
}
const nextStep = () => gotoStep(S.stepIndex + 1);

const STEPS = {
  intro: {
    enter() {
      say('……');
      setButtons([]);
      showOverlay(`
        <div class="phasesStrip">🔍🗺🧭⛩🎩</div>
        <h1>ひだまり<ruby>探偵社<rt>たんていしゃ</rt></ruby></h1>
        <div class="sub">〜 ${W.chizu}が よめる みならい${W.tantei}、ぼしゅう${ruby('中', 'ちゅう')} 〜</div>
        <p class="talk">はじめまして！ ひだまり${ruby('町', 'ちょう')}の ${W.tantei}、しょちょうの <b>ミミ</b>よ。<br>
        この${ruby('町', 'まち')}の じけんは、ぜんぶ <b>${W.chizu}</b>が といてくれる。<br>
        きょうは 4つの ${W.irai}を いっしょに かいけつして、きみたちも <b>みならい${W.tantei}</b>に なろう！</p>
        <button class="btn" id="startBtn">たんていしゃに はいる</button>
        <div class="foot">先生へ：F11キーで全画面表示になります。地図はタッチ（クリック）で操作します。</div>
      `);
      $('startBtn').onclick = () => { ac(); sTap(); nextStep(); };
    },
  },

  vote: {
    enter() {
      showOverlay(`
        <h2>🗺 よそうタイム</h2>
        <p class="talk">${W.chizu}には、たてものの ${ruby('絵', 'え')}や しゃしんじゃなくて、<br>
        文・〒・◎ みたいな <b>${W.kigo}</b>が かいてあるよね。<b>どうしてだと ${ruby('思', 'おも')}う？</b></p>
        <div class="voteCards">
          <div class="vcard" data-v="0"><span class="vicon">📦</span><b>①</b> ちいさくても たくさん かけて、だれが${ruby('見', 'み')}ても わかるから</div>
          <div class="vcard" data-v="1"><span class="vicon">😮‍💨</span><b>②</b> ${ruby('絵', 'え')}を かくのが めんどうだから</div>
          <div class="vcard" data-v="2"><span class="vicon">🕵️</span><b>③</b> ひみつの あんごうに するため</div>
        </div>
        <div class="sub">思うものに タッチ（いくつでも）。じけんメモ（シート）にも 〇を つけてね。</div>
        <button class="btn" id="voteGo">よし、${ruby('町', 'まち')}へ しゅつどう！</button>
      `);
      panelEl.querySelectorAll('.vcard').forEach(c => {
        c.onclick = () => { sTap(); c.classList.toggle('picked');
          const v = +c.dataset.v;
          S.votePicked.has(v) ? S.votePicked.delete(v) : S.votePicked.add(v);
        };
      });
      $('voteGo').onclick = () => { sTap(); nextStep(); };
    },
  },

  practice: {
    enter() {
      S.tapEnabled = true; S.phase = 'explore'; S.discovered = new Set();
      say(`まずは ${ruby('町', 'まち')}たんけん！ ${W.chizu}の ${W.kigo}を タッチすると、${ruby('名前', 'なまえ')}が わかるよ。<br>ちがう ${W.kigo}を <b>6こ</b> しらべてみよう。「あ1」みたいな <b>ばんち</b>も いっしょに よんでみてね！`);
      setButtons([]);
      updateProg();
    },
  },

  m_cat: { enter() { missionEnter('m_cat'); } },
  m_letter: { enter() { missionEnter('m_letter'); } },
  m_treasure: { enter() { missionEnter('m_treasure'); } },
  m_thief: { enter() { missionEnter('m_thief'); } },

  hakase: {
    enter() {
      S.qIndex = 0; S.phase = 'ask';
      hideWish();
      say(`さいごは <b>はかせチャレンジ</b>！ こんどは ${ruby('駅', 'えき')}から${ruby('見', 'み')}た ${W.hoi}を こたえてもらうよ。<br>${ruby('全', 'ぜん')}3もん。じゅんびは いい？`);
      setButtons([{ label: 'ちょうせんする！', cb: () => STEPS.hakase.ask() }]);
    },
    ask() {
      const q = HAKASE_Q[S.qIndex];
      S.phase = 'answering';
      S.compassEnabled = true;
      const fc = COLS.indexOf(q.from[0]), fr = +q.from[1] - 1;
      const tc = COLS.indexOf(q.to[0]), tr = +q.to[1] - 1;
      S.highlights = [{ c: fc, r: fr, color: '#2a6fb0' }, { c: tc, r: tr, color: '#d9a520' }];
      say(`だい${S.qIndex + 1}もん！ ${ruby('駅', 'えき')}（${q.from}・${ruby('青', 'あお')}いわく）から ${ruby('見', 'み')}て、<b>${q.name}（${q.to}・${ruby('金', 'きん')}のわく）</b>は どの ${W.hoi}？<br>シートに かいたら、<b>ほういじしんを タッチ</b>して こたえてね！`);
      setButtons([]);
    },
    answer(dir) {
      if (S.phase !== 'answering') return;
      const q = HAKASE_Q[S.qIndex];
      if (dir === q.ans) {
        S.phase = 'ok'; S.compassEnabled = false;
        sYes();
        S.qIndex++;
        if (S.qIndex >= HAKASE_Q.length) {
          S.highlights = [];
          award('hakase'); stageBurst();
          say(`✨ ${ruby('全問', 'ぜんもん')} せいかい！ ✨<br><br>💡 <b>たいせつポイント</b><br>${W.hoi}は 8つに わけられる（八${W.hoi}）。${W.chizu}の ${ruby('上', 'うえ')}が ${W.kita}だから、ほういじしんと ${W.chizu}を あわせれば、どこから${ruby('見', 'み')}ても ${W.hoi}が わかるんだ！`);
          setButtons([{ label: 'まとめへ すすむ', cb: nextStep }]);
        } else {
          say(`せいかい！ 「${q.ans}」だね。つぎの もんだいに いくよ！`);
          setButtons([{ label: `だい${S.qIndex + 1}もんへ！`, cb: () => STEPS.hakase.ask() }]);
        }
      } else {
        sHmm();
        say(`うーん、「${dir}」かな？ ${ruby('駅', 'えき')}から ${ruby('見', 'み')}て、${ruby('金', 'きん')}のわくは ${ruby('上', 'うえ')}？${ruby('下', 'した')}？ ${ruby('右', 'みぎ')}？${ruby('左', 'ひだり')}？<br>${W.chizu}の ${ruby('上', 'うえ')}＝${W.kita} を ヒントに、もういちど！`);
      }
    },
  },

  ending: {
    enter() {
      showOverlay(`
        <h2>⭐ みならい${W.tantei} にんてい！ ⭐</h2>
        <div class="phasesStrip">${'★'.repeat(S.badges.size)}${'☆'.repeat(Math.max(0, 5 - S.badges.size))}</div>
        <p class="talk" id="blankArea">きょうの <b>3つの ひみつ</b>、いえるかな？（タッチで こたえ）<br>
        ① ${W.chizu}の ${W.kigo}は、ちいさくても（<span class="blankWord" data-a="だれが見ても">？？？</span>）わかる くふう。<br>
        ② ${W.chizu}の ${ruby('上', 'うえ')}は、ふつう（<span class="blankWord" data-a="北">？？？</span>）。<br>
        ③ 「い4」みたいに よこと たてで ばしょを あらわすのが（<span class="blankWord" data-a="さくいん">？？？</span>）の よみ${ruby('方', 'かた')}。${ruby('地図帳', 'ちずちょう')}にも あるよ！</p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>①</b>！ ${W.kigo}の おかげで、ちいさな ${W.chizu}にも ${ruby('町', 'まち')}ぜんぶが 入るし、どこのだれが ${ruby('見', 'み')}ても おなじように よめるんだ。</p>
        <p class="talk">🏠 <b>おうちミッション</b><br>きょうつかった ${W.kigo}は、<b>ほんものの ${W.chizu}</b>にも のってるよ。${ruby('教科書', 'きょうかしょ')}や ${ruby('地図帳', 'ちずちょう')}で、きょうの ${W.kigo}を <b>3つ</b> ${ruby('見', 'み')}つけて、じけんメモの さいごのコーナーに かこう！</p>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで あそぶ</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(stageBurst, 200);
      panelEl.querySelectorAll('.blankWord').forEach(sp => {
        sp.onclick = function () {
          this.textContent = this.dataset.a;
          this.style.color = '#2a7f62'; sYes(); stageBurst();
        };
      });
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  free: {
    enter() {
      S.tapEnabled = true;
      say(`<b>じゆうモード</b>！ ${W.chizu}を タッチして、${ruby('友', 'とも')}だちと ${ruby('問題', 'もんだい')}を 出しあおう。<br>れい：「◎から ${ruby('北東', 'ほくとう')}に あるのは？」「⛩は なんばんち？」`);
      setButtons([
        { label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) },
      ]);
    },
  },
};

// ---------- 依頼の共通処理 ----------
function missionEnter(id) {
  const M = MISSIONS[id];
  S.phase = 'predict';
  S.tapEnabled = false;
  setWish(M.icon, M.wish);
  say(`${W.irai}じょうが とどいたよ。${ruby('答', 'こた')}えの ばしょは どこだろう？<br>じけんメモに 「い3」みたいな <b>ばんち</b>で よそうを かこう！`);
  setButtons([{ label: 'みんな よそうできた！', cb: () => missionOperate(id) }]);
}
function missionOperate(id) {
  S.phase = 'operate';
  S.tapEnabled = true;
  say(`だいひょうさん、${W.chizu}の 「ここだ！」と${ruby('思', 'おも')}う マスを タッチして。<br>みんなは 手がかりを ${ruby('声', 'こえ')}に${ruby('出', 'だ')}して かくにんしよう！`);
  setButtons([{ label: '🔍 ここだ！', cb: () => missionCheck(id) }]);
}
function missionCheck(id) {
  const M = MISSIONS[id];
  if (!S.sel) { sHmm(); say(`まだ どこも えらんでないよ！ ${W.chizu}を タッチしてから 「ここだ！」を おしてね。`); return; }
  const cid = cellId(S.sel.c, S.sel.r);
  if (cid === M.target) {
    S.phase = 'done';
    S.tapEnabled = false;
    S.stamps[M.target] = M.stamp;
    sYes(); stageBurst(); award(id);
    const ty = TYPES[typeAt(S.sel.c, S.sel.r)];
    say(`🎉 じけん かいけつ！ ${ruby('答', 'こた')}えは <b>${cid}（${ruby(ty.name, ty.kana)}）</b>！<br><br>💡 <b>たいせつポイント</b><br>${M.point}`);
    setButtons([{ label: 'つぎの いらいへ', cb: nextStep }]);
  } else {
    sHmm();
    say(`うーん、《${cid}》じゃ ないみたい…。<br>${M.hint(S.sel)}<br><span style="font-size:.85em">そうさの ${ruby('人', 'ひと')}を こうたいしても いいよ。</span>`);
  }
}

// ---------- れんしゅう完了 ----------
function practiceComplete() {
  S.phase = 'done';
  sYes(); stageBurst();
  say(`りっぱな たんけんだった！ ${W.kigo}が よめれば、${W.chizu}は 「よめる ${ruby('絵', 'え')}」に かわる。<br>ちょうど そこへ…… ${W.irai}じょうが とどいたみたい！`);
  setButtons([{ label: '📜 いらいじょうを 見る', cb: nextStep }]);
  updateProg();
}

// ---------- 先生バー ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

// ---------- 開始 ----------
// （URLの後ろに ?step=m_cat などを付けると途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
