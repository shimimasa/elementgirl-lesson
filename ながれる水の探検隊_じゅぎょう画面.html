<!DOCTYPE html>
<html lang="ja">
<head>

<style>
  * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    background: linear-gradient(180deg, #eaf5e4 0%, #dbeed2 60%, #cde6c2 100%);
    color: #2d4a2a;
    font-family: "BIZ UDPGothic", "Hiragino Maru Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    display: flex; flex-direction: column;
  }
  rt { font-size: 0.45em; letter-spacing: 0; }

  /* ---------- ヘッダー ---------- */
  header {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 1.2vw;
    padding: .6vh 1.4vw .3vh;
  }
  #logo {

  }
  #logo small { font-size: .55em; color: #5f8259; font-weight: 400; margin-left: .6em; }
  #badges { display: flex; gap: .5vw; margin-left: auto; }
  .badge {
    width: clamp(30px, 3.2vw, 44px); height: clamp(30px, 3.2vw, 44px);
    display: grid; place-items: center; border-radius: 50%;
    background: #ddeed4; border: 2px solid #a5c898;
    font-size: clamp(16px, 1.8vw, 26px); color: #a5c898;

  .badge.on {

    border-color: #d9a520; color: #7a4d00;
    box-shadow: 0 0 14px rgba(217, 165, 32, .7);

  }
  @keyframes pop { 0% { transform: scale(.3); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }

  /* ---------- メインレイアウト ---------- */
  main {
    position: relative; z-index: 1;
    flex: 1; display: flex; gap: 1.1vw;
    padding: .4vh 1.2vw 1.2vh; min-height: 0;
  }
  #stageWrap {
    flex: 1.5; position: relative; min-width: 0;

  #stage { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; }
  #stageTitle {

  .ctl {
    font-family: inherit; font-size: clamp(13px, 1.4vw, 20px); font-weight: 700;
    padding: .42em .8em; border-radius: 14px; border: 2px solid #6ab86a; cursor: pointer;
    background: linear-gradient(180deg, #4aa85c, #2a8544); color: #fff;

  .ctl:hover { transform: translateY(-2px); }

  .ctl:disabled { opacity: .3; cursor: default; transform: none; }

  #side { flex: 1; display: flex; flex-direction: column; gap: .7vh; min-width: 280px; padding-bottom: 32px; }
  #scopeWrap {
    position: relative; width: min(100%, 25vh); aspect-ratio: 1;

  #scope { position: absolute; inset: 0; width: 100%; height: 100%; }

  #stateName {

  /* ---------- ミッションカード ---------- */
  #missionCard {
    flex: 1; min-height: 0; display: flex; flex-direction: column; gap: .6vh;

  #catRow { display: flex; gap: .7vw; align-items: flex-start; }

  #catBox .catname { font-size: clamp(11px, 1vw, 14px); color: #5f8259; }
  .mascot { width: 100%; animation: floaty 3.6s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .mascot .eyes { transform-box: fill-box; transform-origin: center; animation: blink 4.5s infinite; }

  #bubble {

  .panel {

  .voteCards { display: flex; gap: 1vw; justify-content: center; flex-wrap: wrap; margin: 1.5vh 0; }
  .vcard {
    width: clamp(170px, 24vw, 250px); cursor: pointer;

  }
  #blankArea span.blankWord {

  /* ---------- エフェクト・先生バー ---------- */
  #fx { position: fixed; inset: 0; z-index: 70; pointer-events: none; }
  #teacherBar {

  }

</style>

<header>
  <div id="logo">🏞 ながれる<ruby>水<rt>みず</rt></ruby>の<ruby>探検隊<rt>たんけんたい</rt></ruby><small>— <ruby>流<rt>なが</rt></ruby>れる<ruby>水<rt>みず</rt></ruby>のはたらき たいけん —</small></div>

<script>
'use strict';
/* =====================================================
   ながれる水の探検隊 — 流れる水のはたらき（小5理科・協力型・1ファイル）
   けずる（しん食）・はこぶ（運ぱん）・つもらせる（たい積）
   カーブの外＝しん食／内＝たい積。増水で3つの力が強まる→防災へ
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const lerp = (a, b, t) => a + (b - a) * t;
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  kawa: ruby('川', 'かわ'),
  mizu: ruby('水', 'みず'),
  ishi: ruby('石', 'いし'),
  shinshoku: 'しん' + ruby('食', 'しょく'),
  unpan: ruby('運', 'うん') + 'ぱん',
  taiseki: 'たい' + ruby('積', 'せき'),
  joryu: ruby('上流', 'じょうりゅう'),
  churyu: ruby('中流', 'ちゅうりゅう'),
  karyu: ruby('下流', 'かりゅう'),
  umi: ruby('海', 'うみ'),
  ooame: ruby('大雨', 'おおあめ'),
  nagare: ruby('流', 'なが') + 'れ',
};

// ---------- 川のかたち（空から見た図・論理1000×700） ----------
const RIVER = [
  [175, 55], [225, 130], [300, 190], [395, 220], [500, 235],
  [590, 270], [640, 340], [615, 415], [530, 450], [475, 505],
  [520, 560], [610, 595], [700, 620],
];
function riverPoint(t) {
  const n = RIVER.length - 1;
  const f = clamp(t, 0, 1) * n;
  const i = Math.min(Math.floor(f), n - 1);
  const u = f - i;
  return {
    x: lerp(RIVER[i][0], RIVER[i + 1][0], u),
    y: lerp(RIVER[i][1], RIVER[i + 1][1], u),
  };
}
const LOCS = {
  up:    { name: '上流', kana: 'じょうりゅう', x: 250, y: 155 },
  mid:   { name: '中流', kana: 'ちゅうりゅう', x: 500, y: 235 },
  curve: { name: 'カーブ', kana: 'かーぶ', x: 625, y: 380 },
  down:  { name: '下流・河口', kana: 'かりゅう・かこう', x: 640, y: 600 },
};

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  loc: 'up',
  flowT: 0,          // 水を流している残り時間
  strong: false,     // 水を増やしたか
  erosion: 0,        // 上流のけずれ 0..1
  stonePos: -1,      // 石ころの旅の位置 0..1（-1=非表示）
  stoneRound: 0,     // 石の丸み 0..1
  deposit: 0,        // 河口のたい積 0..1
  curveProg: 0,      // カーブのしん食・たい積 0..1
  flood: 0,          // 増水 0..1
  rainT: 0,
  scopeMode: 'up',   // up / mid / down / rolling / flood
  phase: '', pick: -1,
  sound: true,
  votePicked: new Set(),
  badges: new Set(),
  anim: {},
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));
const sHmm = () => { tone(392, 0, 0.18, 'sine', 0.07); tone(349, 0.16, 0.3, 'sine', 0.07); };
const sFanfare = () => [523, 587, 659, 784, 880, 1046, 1318, 1568].forEach((f, i) => tone(f, i * 0.08, 0.45, 'triangle', 0.1));
const sFlow = () => { tone(300, 0, 0.25, 'sine', 0.05); tone(360, 0.1, 0.25, 'sine', 0.05); };
const sKnock = () => tone(180 + Math.random() * 60, 0, 0.08, 'square', 0.04);

// ---------- キャンバス ----------
const stageCv = $('stage'), scopeCv = $('scope'), fxCv = $('fx');
const gctx = stageCv.getContext('2d'), sctx = scopeCv.getContext('2d'), fctx = fxCv.getContext('2d');
function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}

// ---------- 探検マップの描画 ----------
const PAD_T = 54, PAD_B = 60, PAD_X = 10;
const MAPW = 1000, MAPH = 700;
function mapTransform(w, h) {
  const sc = Math.min((w - PAD_X * 2) / MAPW, (h - PAD_T - PAD_B) / MAPH);
  const ox = PAD_X + (w - PAD_X * 2 - MAPW * sc) / 2;
  const oy = PAD_T + (h - PAD_T - PAD_B - MAPH * sc) / 2;
  return { sc, ox, oy };
}
let sediments = [];   // 運ばれる土のつぶ
let debris = [];      // 増水時のながれもの
function drawStage(t, dt) {
  const { w, h, dpr } = fitCanvas(stageCv);
  gctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  gctx.clearRect(0, 0, w, h);
  const { sc, ox, oy } = mapTransform(w, h);
  const X = x => ox + x * sc, Y = y => oy + y * sc;

  // 海（右下）
  gctx.fillStyle = '#79b8dc';
  gctx.beginPath();
  gctx.moveTo(X(560), Y(700));
  gctx.quadraticCurveTo(X(600), Y(620), X(700), Y(585));
  gctx.quadraticCurveTo(X(830), Y(545), X(1000), Y(530));
  gctx.lineTo(X(1000), Y(700));
  gctx.closePath(); gctx.fill();
  // なみ
  gctx.strokeStyle = 'rgba(255,255,255,.5)'; gctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    gctx.beginPath();
    for (let x = 640 + i * 60; x <= 980; x += 14) {
      const yy = 610 + i * 26 - (x - 640) * 0.08 + Math.sin(t * 2 + x * 0.05 + i) * 2.5;
      x === 640 + i * 60 ? gctx.moveTo(X(x), Y(yy)) : gctx.lineTo(X(x), Y(yy));
    }
    gctx.stroke();
  }
  // すなはま
  gctx.strokeStyle = '#e8d8a8'; gctx.lineWidth = 9 * sc;
  gctx.beginPath();
  gctx.moveTo(X(560), Y(696));
  gctx.quadraticCurveTo(X(600), Y(620), X(700), Y(585));
  gctx.quadraticCurveTo(X(830), Y(545), X(1000), Y(532));
  gctx.stroke();

  // 山（上流のおく）
  const mt = (px, py, wdt, col) => {
    gctx.fillStyle = col;
    gctx.beginPath();
    gctx.moveTo(X(px - wdt / 2), Y(py + wdt * 0.62));
    gctx.lineTo(X(px), Y(py));
    gctx.lineTo(X(px + wdt / 2), Y(py + wdt * 0.62));
    gctx.closePath(); gctx.fill();
  };
  mt(90, 30, 190, '#6a9a5c');
  mt(215, 12, 170, '#7aa868');
  mt(330, 55, 150, '#88b476');
  // 木
  gctx.fillStyle = '#3f7a3c';
  [[60, 180], [120, 230], [330, 160], [390, 120], [80, 300], [180, 280], [420, 300], [250, 330], [850, 300], [900, 380], [790, 240], [150, 420], [250, 480], [90, 520], [330, 560], [820, 460]].forEach(([tx, ty]) => {
    gctx.beginPath();
    gctx.moveTo(X(tx), Y(ty - 20)); gctx.lineTo(X(tx + 9), Y(ty)); gctx.lineTo(X(tx - 9), Y(ty));
    gctx.closePath(); gctx.fill();
  });

  // ---- 川 ----
  const flooding = S.flood;
  const wUp = 13 * (1 + flooding * 0.7), wDown = 40 * (1 + flooding * 0.5);
  const waterCol = flooding > 0.3 ? `rgb(${lerp(95, 150, flooding)},${lerp(168, 125, flooding)},${lerp(212, 80, flooding)})` : '#5fa8d4';
  const n = RIVER.length - 1;
  // 上流のけずれ（V字のみぞ：くらい線）
  if (S.erosion > 0.02) {
    gctx.strokeStyle = `rgba(90,75,55,${S.erosion * 0.55})`;
    gctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) {
      gctx.lineWidth = (wUp + 14 + S.erosion * 10) * sc;
      gctx.beginPath();
      gctx.moveTo(X(RIVER[i][0]), Y(RIVER[i][1]));
      gctx.lineTo(X(RIVER[i + 1][0]), Y(RIVER[i + 1][1]));
      gctx.stroke();
    }
  }
  // きし→水
  for (const pass of [0, 1]) {
    for (let i = 0; i < n; i++) {
      const tw1 = lerp(wUp, wDown, i / n), tw2 = lerp(wUp, wDown, (i + 1) / n);
      gctx.strokeStyle = pass === 0 ? '#8aa878' : waterCol;
      gctx.lineWidth = ((tw1 + tw2) / 2 + (pass === 0 ? 7 : 0)) * sc;
      gctx.lineCap = 'round'; gctx.lineJoin = 'round';
      gctx.beginPath();
      gctx.moveTo(X(RIVER[i][0]), Y(RIVER[i][1]));
      gctx.lineTo(X(RIVER[i + 1][0]), Y(RIVER[i + 1][1]));
      gctx.stroke();
    }
  }
  // ながれのすじ
  const flowSpeed = 40 * (1 + (S.flowT > 0 ? 1 : 0) + flooding * 2.5 + (S.strong ? 0.8 : 0));
  gctx.strokeStyle = flooding > 0.3 ? 'rgba(255,240,210,.55)' : 'rgba(255,255,255,.55)';
  gctx.lineWidth = 2.5 * sc;
  gctx.setLineDash([10 * sc, 16 * sc]);
  gctx.lineDashOffset = -(t * flowSpeed * sc) % (26 * sc);
  gctx.beginPath();
  RIVER.forEach((p, i) => i === 0 ? gctx.moveTo(X(p[0]), Y(p[1])) : gctx.lineTo(X(p[0]), Y(p[1])));
  gctx.stroke();
  gctx.setLineDash([]);

  // カーブのしん食・たい積
  if (S.curveProg > 0.02) {
    const cp = S.curveProg;
    // そとがわ（右）＝けずれ
    gctx.strokeStyle = `rgba(120,85,55,${cp * 0.85})`;
    gctx.lineWidth = 5 * sc; gctx.setLineDash([7 * sc, 5 * sc]);
    gctx.beginPath();
    gctx.moveTo(X(672), Y(310));
    gctx.quadraticCurveTo(X(692) + cp * 8 * sc, Y(378), X(650), Y(448));
    gctx.stroke();
    gctx.setLineDash([]);
    gctx.fillStyle = `rgba(120,85,55,${cp * 0.7})`;
    [[678, 340], [685, 385], [668, 425]].forEach(([bx, by], i) => {
      gctx.beginPath(); gctx.arc(X(bx + cp * 6), Y(by), (3 + i) * sc * cp, 0, TAU); gctx.fill();
    });
    // うちがわ（左）＝すなのたい積
    gctx.fillStyle = `rgba(232,216,168,${cp * 0.95})`;
    gctx.beginPath();
    gctx.ellipse(X(585), Y(388), 26 * sc * cp, 44 * sc * cp, 0.5, 0, TAU);
    gctx.fill();
  }
  // 河口のたい積（すなの三角地帯）
  if (S.deposit > 0.02) {
    const dp = S.deposit;
    gctx.fillStyle = `rgba(232,216,168,${0.55 + dp * 0.4})`;
    gctx.beginPath();
    gctx.moveTo(X(690), Y(608));
    gctx.lineTo(X(690 + 65 * dp), Y(608 + 45 * dp));
    gctx.quadraticCurveTo(X(720), Y(665 + 15 * dp), X(650 - 30 * dp), Y(648 + 20 * dp));
    gctx.closePath(); gctx.fill();
  }

  // 土のつぶ（けずれて流れる）
  if ((S.flowT > 0 && (S.phase === 'flow' || S.phase === 'deposit' || S.phase === 'curve')) || flooding > 0.3) {
    if (Math.random() < dt * (14 + flooding * 26)) sediments.push({ t: Math.random() * 0.15, sp: 0.09 + Math.random() * 0.05 + flooding * 0.1 });
  }
  sediments = sediments.filter(sd => sd.t < 1);
  sediments.forEach(sd => {
    sd.t += sd.sp * dt * (1 + flooding);
    const p = riverPoint(sd.t);
    gctx.fillStyle = 'rgba(150,120,80,.8)';
    gctx.beginPath(); gctx.arc(X(p.x + Math.sin(sd.t * 60) * 6), Y(p.y), 2.4 * sc, 0, TAU); gctx.fill();
  });
  // 増水時のながれもの（えだ）
  if (flooding > 0.4) {
    if (Math.random() < dt * 5) debris.push({ t: 0.02, sp: 0.18 + Math.random() * 0.08, a: Math.random() * TAU });
    debris = debris.filter(d => d.t < 1);
    debris.forEach(d => {
      d.t += d.sp * dt; d.a += dt * 6;
      const p = riverPoint(d.t);
      gctx.save();
      gctx.translate(X(p.x), Y(p.y)); gctx.rotate(d.a);
      gctx.strokeStyle = '#6a4a28'; gctx.lineWidth = 3 * sc;
      gctx.beginPath(); gctx.moveTo(-8 * sc, 0); gctx.lineTo(8 * sc, 0); gctx.stroke();
      gctx.restore();
    });
  } else debris = [];

  // 大雨
  if (S.rainT > 0) {
    gctx.strokeStyle = 'rgba(80,120,180,.5)'; gctx.lineWidth = 1.8 * sc;
    for (let i = 0; i < 40; i++) {
      const rx = (i * 173 + (t * 500) % 97) % 1000, ry = ((i * 89 + t * 620) % 660);
      gctx.beginPath();
      gctx.moveTo(X(rx), Y(ry)); gctx.lineTo(X(rx - 3), Y(ry + 16));
      gctx.stroke();
    }
  }

  // 石ころの旅（M2）
  if (S.stonePos >= 0) {
    const p = riverPoint(S.stonePos);
    const r = lerp(9, 5.5, S.stoneRound) * sc;
    gctx.save();
    gctx.translate(X(p.x), Y(p.y));
    gctx.rotate(t * 4);
    drawStonePoly(gctx, 0, 0, r, S.stoneRound, 7);
    gctx.restore();
  }

  // ラベル
  gctx.textAlign = 'center'; gctx.textBaseline = 'middle';
  gctx.fillStyle = '#2d5a2a';
  gctx.font = `700 ${Math.max(13, 22 * sc)}px sans-serif`;
  gctx.fillText('上流', X(165), Y(165));
  gctx.fillText('中流', X(575), Y(150));
  gctx.fillText('下流', X(455), Y(555));
  gctx.fillStyle = '#1a5e8a';
  gctx.fillText('海', X(880), Y(640));
  // ながれのむき
  gctx.fillStyle = '#4a7a42';
  gctx.font = `${Math.max(11, 17 * sc)}px sans-serif`;
  gctx.fillText('▲ 山（水の はじまり）', X(200), Y(28));

  // いまいる場所のリング＋スイのミニすがた
  const L = LOCS[S.loc];
  if (L) {
    gctx.strokeStyle = `rgba(216,120,40,${0.6 + 0.35 * Math.sin(t * 5)})`;
    gctx.lineWidth = 4;
    gctx.setLineDash([9, 7]);
    gctx.beginPath(); gctx.ellipse(X(L.x), Y(L.y), 62 * sc, 48 * sc, 0, 0, TAU); gctx.stroke();
    gctx.setLineDash([]);
    const sy = Y(L.y) - 60 * sc + Math.sin(t * 3) * 4;
    gctx.fillStyle = '#8a6a48';
    gctx.beginPath(); gctx.arc(X(L.x), sy, 11 * sc, 0, TAU); gctx.fill();
    gctx.beginPath(); gctx.arc(X(L.x) - 8 * sc, sy - 8 * sc, 3.5 * sc, 0, TAU); gctx.fill();
    gctx.beginPath(); gctx.arc(X(L.x) + 8 * sc, sy - 8 * sc, 3.5 * sc, 0, TAU); gctx.fill();
    gctx.fillStyle = '#cfa87a';
    gctx.beginPath(); gctx.ellipse(X(L.x), sy + 3 * sc, 6 * sc, 4.5 * sc, 0, 0, TAU); gctx.fill();
    gctx.fillStyle = '#2c2015';
    gctx.beginPath(); gctx.arc(X(L.x) - 4 * sc, sy - 2 * sc, 1.7 * sc, 0, TAU); gctx.fill();
    gctx.beginPath(); gctx.arc(X(L.x) + 4 * sc, sy - 2 * sc, 1.7 * sc, 0, TAU); gctx.fill();
  }
}

// 石のかたち（roundness 0=ゴツゴツ → 1=まんまる）
function jag(seed, i) { return 0.14 + 0.36 * Math.abs(Math.sin(seed * 89.7 + i * 13.3)); }
function drawStonePoly(ctx, x, y, R, roundness, seed) {
  const N = 9;
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const a = i / N * TAU;
    const r = R * (1 - jag(seed, i % N) * (1 - roundness));
    const px = x + Math.cos(a) * r, py = y + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = '#9a948a'; ctx.fill();
  ctx.strokeStyle = '#6a645a'; ctx.lineWidth = Math.max(1.2, R * 0.08); ctx.stroke();
}

// ---------- 石のむしめがね ----------
let chipParts = [];
function drawScope(t, dt) {
  const { w, h, dpr } = fitCanvas(scopeCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);
  const R = w / 2;
  const mode = S.scopeMode;

  let grd = sctx.createRadialGradient(R, R, 0, R, R, R);
  if (mode === 'flood') { grd.addColorStop(0, '#b09468'); grd.addColorStop(1, '#8a6f48'); }
  else { grd.addColorStop(0, '#dceef8'); grd.addColorStop(1, '#b8d8e8'); }
  sctx.fillStyle = grd; sctx.fillRect(0, 0, w, h);

  if (mode === 'up') {
    drawStonePoly(sctx, R * 0.62, R * 0.85, R * 0.3, 0.04, 3);
    drawStonePoly(sctx, R * 1.34, R * 1.02, R * 0.24, 0.08, 8);
    drawStonePoly(sctx, R * 0.95, R * 1.42, R * 0.27, 0.02, 5);
    label('ゴツゴツ・大きい');
  } else if (mode === 'mid') {
    drawStonePoly(sctx, R * 0.62, R * 0.85, R * 0.2, 0.5, 3);
    drawStonePoly(sctx, R * 1.3, R * 0.95, R * 0.17, 0.55, 8);
    drawStonePoly(sctx, R * 0.95, R * 1.35, R * 0.18, 0.5, 5);
    drawStonePoly(sctx, R * 1.35, R * 1.4, R * 0.13, 0.6, 11);
    label('すこし 丸くなった');
  } else if (mode === 'down') {
    sctx.fillStyle = '#e0d0a0';
    for (let i = 0; i < 40; i++) {
      const a = i * 2.4, rr = R * 0.75 * Math.sqrt((i % 10) / 10);
      sctx.beginPath();
      sctx.arc(R + Math.cos(a) * rr, R * 1.25 + Math.sin(a) * rr * 0.5, 2.2, 0, TAU);
      sctx.fill();
    }
    drawStonePoly(sctx, R * 0.7, R * 0.8, R * 0.13, 0.95, 3);
    drawStonePoly(sctx, R * 1.25, R * 0.9, R * 0.11, 0.97, 8);
    drawStonePoly(sctx, R * 0.95, R * 1.1, R * 0.12, 0.96, 5);
    drawStonePoly(sctx, R * 1.3, R * 1.25, R * 0.09, 0.98, 11);
    label('丸い・小さい・すなも');
  } else if (mode === 'rolling') {
    // ころがる石（丸くなっていく）
    sctx.save();
    sctx.translate(R, R * 0.95);
    sctx.rotate(t * 3);
    drawStonePoly(sctx, 0, 0, R * 0.34, S.stoneRound, 7);
    sctx.restore();
    // かけら
    chipParts = chipParts.filter(c => c.life > 0);
    chipParts.forEach(c => {
      c.life -= dt * 1.5; c.x += c.vx * dt; c.y += c.vy * dt;
      sctx.globalAlpha = Math.max(0, c.life);
      drawStonePoly(sctx, c.x, c.y, 4, 0.2, c.seed);
      sctx.globalAlpha = 1;
    });
    label(S.stoneRound < 0.3 ? 'ゴツゴツの石' : S.stoneRound < 0.75 ? '角が とれてきた！' : '丸く 小さくなった！');
  } else if (mode === 'flood') {
    for (let i = 0; i < 5; i++) {
      const xx = ((i * 137 + t * 260) % (w + 60)) - 30;
      drawStonePoly(sctx, xx, R * (0.6 + (i % 3) * 0.35), R * (0.1 + (i % 2) * 0.06), 0.4, i + 2);
    }
    sctx.strokeStyle = '#5a3f22'; sctx.lineWidth = 4;
    for (let i = 0; i < 3; i++) {
      const xx = ((i * 211 + t * 330) % (w + 80)) - 40;
      sctx.save();
      sctx.translate(xx, R * (0.75 + i * 0.28)); sctx.rotate(t * 5 + i);
      sctx.beginPath(); sctx.moveTo(-12, 0); sctx.lineTo(12, 0); sctx.stroke();
      sctx.restore();
    }
    label('石も えだも ながされる！');
  }

  function label(txt) {
    sctx.font = `700 ${R * 0.1}px sans-serif`;
    sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
    const ly = h - R * 0.24;
    const tw = sctx.measureText(txt).width;
    sctx.fillStyle = 'rgba(255,255,255,.85)';
    sctx.beginPath();
    sctx.roundRect(R - tw / 2 - 8, ly - R * 0.09, tw + 16, R * 0.18, R * 0.09);
    sctx.fill();
    sctx.fillStyle = '#4a5f2a';
    sctx.fillText(txt, R, ly);
  }
}

// ---------- キラキラ ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 70); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#3a9a52', '#7fd0f0', '#f2a93b', '#fff'][Math.floor(Math.random() * 4)],
    });
  }
}
function scopeBurst() {
  const r = $('scopeWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  S.flowT = Math.max(0, S.flowT - dt);
  S.rainT = Math.max(0, S.rainT - dt);
  const step = STEPS[FLOW[S.stepIndex]];
  if (step.tick) step.tick(dt);
  drawStage(t, dt);
  drawScope(t, dt);
  drawFx(dt);
  requestAnimationFrame(loop);
}

// ---------- UIヘルパー ----------
const bubbleEl = $('bubble'), wishEl = $('wishCard'), btnRow = $('btnRow');
function say(html) {
  bubbleEl.style.animation = 'none'; void bubbleEl.offsetWidth;
  bubbleEl.style.animation = ''; bubbleEl.innerHTML = html;
}
function setWish(icon, html) {
  wishEl.style.display = 'flex';
  wishEl.querySelector('.icon').textContent = icon;
  wishEl.querySelector('.wbody').innerHTML = html;
}
function hideWish() { wishEl.style.display = 'none'; }
function setButtons(list) {
  btnRow.innerHTML = '';
  list.forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn' + (b.cls ? ' ' + b.cls : '');
    el.innerHTML = b.label;
    el.onclick = () => { sTap(); b.cb(el); };
    btnRow.appendChild(el);
  });
}
function award(id) {
  if (S.badges.has(id)) return;
  S.badges.add(id);
  $('bd_' + id).classList.add('on');
}
const overlayEl = $('overlay'), panelEl = $('panelBody');
function showOverlay(html) { panelEl.innerHTML = html; overlayEl.classList.add('show'); }
function hideOverlay() { overlayEl.classList.remove('show'); }
const controlsEl = $('controls');
function setControls(list) {
  controlsEl.innerHTML = '';
  list.forEach(b => {
    const el = document.createElement('button');
    el.className = 'ctl' + (b.cls ? ' ' + b.cls : ''); el.innerHTML = b.label;
    el.onclick = () => { ac(); b.cb(el); };
    controlsEl.appendChild(el);
  });
}
function updateLoc() {
  const L = LOCS[S.loc];
  $('locChip').textContent = `いまここ：${L.name}（${L.kana}）`;
  $('stateName').innerHTML = ({
    up: `⛰ ${W.joryu} 〜${W.nagare}が ${ruby('急', 'きゅう')}〜`,
    mid: `🏞 ${W.churyu} 〜${W.ishi}ころの${ruby('旅', 'たび')}〜`,
    curve: `🌀 カーブ 〜そと？うち？〜`,
    down: `🌊 ${W.karyu} 〜${W.nagare}が ゆるやか〜`,
  })[S.loc] || '';
}

// ---------- ステップ ----------
const FLOW = ['intro', 'vote', 'm_kezuru', 'm_hakobu', 'm_tsumoru', 'm_curve', 'hakase', 'ending', 'free'];

function gotoStep(i) {
  S.stepIndex = clamp(i, 0, FLOW.length - 1);
  S.phase = ''; S.anim = {}; S.flowT = 0; S.strong = false;
  hideOverlay(); hideWish();
  setControls([]);
  STEPS[FLOW[S.stepIndex]].enter();
  updateLoc();
}
const nextStep = () => gotoStep(S.stepIndex + 1);

const STEPS = {
  intro: {
    enter() {
      Object.assign(S, { loc: 'up', scopeMode: 'up', erosion: 0, stonePos: -1, stoneRound: 0, deposit: 0, curveProg: 0, flood: 0 });
      say('……');
      setButtons([]);
      showOverlay(`
        <div class="phasesStrip">⛰️🏞🌀🌊🦦</div>
        <h1>ながれる${ruby('水', 'みず')}の${ruby('探検隊', 'たんけんたい')}</h1>
        <div class="sub">〜 ${W.kawa}が 大地を つくる ひみつを さぐる、みならい${ruby('隊員', 'たいいん')} ぼしゅう${ruby('中', 'ちゅう')} 〜</div>

$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

window.addEventListener('keydown', ev => {
  if (ev.key === 'Enter') {
    const b = document.querySelector('#btnRow .btn:not(.sub)') || document.querySelector('#panelBody .btn:not(.sub)');
    if (b) b.click();
  }
});

// ---------- 開始 ----------
// （URLの後ろに ?step=m_hakobu などで途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
