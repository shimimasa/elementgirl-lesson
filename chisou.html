<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script>
'use strict';
/* =====================================================
   ちそう発掘隊 — 大地のつくり・地層（小6理科・協力型・1ファイル）
   れき・すな・どろが水の底に粒の大きさで分かれて積もる→層が重なる
   →下ほど古い→化石が過去を教える→火山灰は角ばった粒（空から降った）
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const lerp = (a, b, t) => a + (b - a) * t;
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

const W = {
  chiso: ruby('地層', 'ちそう'),
  tsubu: 'つぶ',
  reki: 'れき',
  suna: 'すな',
  doro: 'どろ',
  umi: ruby('海', 'うみ'),
  kawa: ruby('川', 'かわ'),
  kaseki: ruby('化石', 'かせき'),
  kazanbai: ruby('火山灰', 'かざんばい'),
  funka: ruby('噴火', 'ふんか'),
  soko: ruby('底', 'そこ'),
  furui: ruby('古', 'ふる') + 'い',
  kako: ruby('河口', 'かこう'),
};

// ---------- 素材の色（うみ→がけで統一） ----------
const MAT = {
  reki: { col: '#b09468', name: 'れきの層', kana: '2mmより大きい 小石' },
  suna: { col: '#d9c48a', name: 'すなの層', kana: 'ザラザラの つぶ' },
  doro: { col: '#b8a488', name: 'どろの層', kana: 'とても細かい つぶ' },
  kazanbai: { col: '#a8a4a0', name: '火山灰の層', kana: 'かくばった つぶ' },
};

// ---------- がけの層（上①→下⑥） ----------
const LAYERS = [
  { no: 1, type: 'doro' },
  { no: 2, type: 'suna', fossil: 'ammo' },
  { no: 3, type: 'kazanbai' },
  { no: 4, type: 'doro', fossil: 'ha' },
  { no: 5, type: 'suna', fossil: 'kai' },
  { no: 6, type: 'reki' },
];
const FOSSILS = {
  kai: { name: '貝の化石', kana: 'かい', x: 560 },
  ha: { name: '木の葉の化石', kana: 'このは', x: 380 },
  ammo: { name: 'アンモナイトの化石', kana: 'あんもないと', x: 680 },
};
const CLIFF_TOP = 185, LAYER_H = 64;   // がけ論理座標
const layerY = i => CLIFF_TOP + i * LAYER_H;

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  view: 'sea',          // sea / cliff
  particles2: [],       // 沈む土のつぶ
  repeats: 0,           // 積もった回数 0..3
  fillProg: 0,          // いま流している層の進み 0..1
  flowing: false,
  drain: 0,             // なん万年トランジション 0..1
  yearT: 0,
  selLayer: -1,
  dug: new Set(),
  scopeMode: 'mix',
  tapEnabled: false,
  phase: '', pick: -1,
  sound: true,
  votePicked: new Set(),
  badges: new Set(),
  anim: {},
};

// ---------- 音 ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();

function drawStage(t, dt) {

// ---------- つぶのむしめがね ----------
function drawScope(t, dt) {
  const { w, h, dpr } = fitCanvas(scopeCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);
  const R = w / 2;

  let grd = sctx.createRadialGradient(R, R, 0, R, R, R);

    sctx.fillStyle = col; sctx.strokeStyle = shadeCol(col, 0.65); sctx.lineWidth = 1.6;
    sctx.beginPath(); sctx.ellipse(x, y, r, r * 0.85, 0.3, 0, TAU); sctx.fill(); sctx.stroke();
  };

    sctx.fillStyle = col; sctx.strokeStyle = shadeCol(col, 0.6); sctx.lineWidth = 1.6;
    sctx.beginPath();
    for (let i = 0; i <= 7; i++) {
      const a = i / 7 * TAU;
      const rr = r * (0.65 + 0.35 * Math.abs(Math.sin(seed * 7 + i * 2.3)));
      const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
      i === 0 ? sctx.moveTo(px, py) : sctx.lineTo(px, py);
    }
    sctx.closePath(); sctx.fill(); sctx.stroke();
  };

  const hash = (i, s) => {
    const v = Math.sin(i * 12.9898 + s * 78.233) * 43758.5453;
    return v - Math.floor(v);
  };
  if (mode === 'mix') {
    roundStone(R * 0.6, R * 0.75, R * 0.22, MAT.reki.col);
    roundStone(R * 1.3, R * 0.9, R * 0.09, MAT.suna.col);
    roundStone(R * 1.15, R * 0.65, R * 0.08, MAT.suna.col);
    for (let i = 0; i < 26; i++) {
      sctx.fillStyle = MAT.doro.col;
      sctx.beginPath();
      sctx.arc(R * 0.45 + hash(i, 1) * R * 1.1, R * 1.05 + hash(i, 2) * R * 0.5, 2.2, 0, TAU);
      sctx.fill();
    }
    label('まざった 土');
  } else if (mode === 'reki') {
    roundStone(R * 0.7, R * 0.85, R * 0.26, MAT.reki.col);
    roundStone(R * 1.3, R * 0.95, R * 0.2, shadeCol(MAT.reki.col, 0.9));
    roundStone(R * 0.98, R * 1.32, R * 0.22, shadeCol(MAT.reki.col, 1.05));
    label('れき：大きくて丸い');
  } else if (mode === 'suna') {
    for (let i = 0; i < 40; i++) {
      roundStone(R * 0.4 + hash(i, 3) * R * 1.2, R * 0.4 + hash(i, 4) * R * 1.2, R * 0.05, i % 3 ? MAT.suna.col : shadeCol(MAT.suna.col, 0.85));
    }
    label('すな：小さな つぶ');
  } else if (mode === 'doro') {
    for (let i = 0; i < 130; i++) {
      sctx.fillStyle = i % 4 ? MAT.doro.col : shadeCol(MAT.doro.col, 0.85);
      sctx.beginPath();
      sctx.arc(R * 0.3 + hash(i, 5) * R * 1.4, R * 0.3 + hash(i, 6) * R * 1.4, 1.6, 0, TAU);
      sctx.fill();
    }
    label('どろ：とても細かい');
  } else if (mode === 'kazanbai') {
    for (let i = 0; i < 14; i++) {
      jaggedStone(R * 0.45 + hash(i, 7) * R * 1.1, R * 0.45 + hash(i, 8) * R * 1.1, R * 0.1, '#9a9694', i);
    }
    label('かくばってる！');
  } else if (mode === 'kai' || mode === 'ha' || mode === 'ammo') {
    sctx.fillStyle = '#8a7a5e';
    sctx.beginPath(); sctx.ellipse(R, R, R * 0.66, R * 0.55, 0.15, 0, TAU); sctx.fill();
    drawFossil(sctx, mode, R, R * 0.98, R * 0.34);
    label(FOSSILS[mode].name.replace(/<[^>]+>/g, ''));
  }

  function label(txt) {
    sctx.font = `700 ${R * 0.098}px sans-serif`;
    sctx.textAlign = 'center'; sctx.textBaseline = 'middle';
    const ly = h - R * 0.24;
    const tw = sctx.measureText(txt).width;
    sctx.fillStyle = 'rgba(255,255,255,.88)';
    sctx.beginPath();
    sctx.roundRect(R - tw / 2 - 8, ly - R * 0.09, tw + 16, R * 0.18, R * 0.09);
    sctx.fill();
    sctx.fillStyle = '#6e4e28';
    sctx.fillText(txt, R, ly);
  }
}

    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: ['#c07a30', '#e8c53a', '#8fb573', '#fff'][Math.floor(Math.random() * 4)],
    });
  }
}
function scopeBurst() {
  const r = $('scopeWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // 土のつぶ（うみビュー）
  if (S.flowing) {
    if (Math.random() < dt * 30) {
      const kind = Math.random();
      const p = kind < 0.34
        ? { type: 0, r: 4.5, col: MAT.reki.col, vy: 120, drag: 3.2 }
        : kind < 0.67
          ? { type: 1, r: 2.8, col: MAT.suna.col, vy: 55, drag: 1.2 }
          : { type: 2, r: 1.8, col: MAT.doro.col, vy: 22, drag: 0.25 };
      p.x = 175 + Math.random() * 20; p.y = 270 + Math.random() * 20;
      p.vx = 90 + Math.random() * 60;
      S.particles2.push(p);
    }
    S.fillProg = clamp(S.fillProg + dt / 4.5, 0, 1);
    if (S.fillProg >= 1) {
      S.flowing = false;
      S.repeats++;
      S.particles2 = [];
      const step = STEPS[FLOW[S.stepIndex]];
      if (step.onLayerDone) step.onLayerDone();
    }
  }
  S.particles2 = S.particles2.filter(p => p.y < seabedY(p.x) - S.repeats * 14 - 4);
  S.particles2.forEach(p => {
    p.x += p.vx * dt;
    p.vx = Math.max(p.type === 2 ? 55 : 8, p.vx - p.drag * dt * 60);
    p.y += p.vy * dt;
  });

  // なん万年トランジション
  if (S.anim.draining) {
    S.yearT += dt;
    S.drain = clamp((S.yearT - 0.6) / 3, 0, 1);
    if (S.yearT > 4.2) {
      S.anim.draining = false;
      S.view = 'cliff';
      burst(window.innerWidth / 2, window.innerHeight / 2, 90);
      const step = STEPS[FLOW[S.stepIndex]];
      if (step.onCliff) step.onCliff();
    }
  }

  drawStage(t, dt);
  drawScope(t, dt);
  drawFx(dt);
  requestAnimationFrame(loop);
}

// ---------- タッチ（がけの層・化石） ----------
stageCv.addEventListener('pointerdown', ev => {
  ac();
  if (!S.tapEnabled || S.view !== 'cliff') return;
  const r = stageCv.getBoundingClientRect();
  const { sc, ox, oy } = mapTransform(r.width, r.height);
  const mx = (ev.clientX - r.left - ox) / sc, my = (ev.clientY - r.top - oy) / sc;
  if (mx < CLIFF_X0 - 30 || mx > CLIFF_X1 + 30) return;
  const li = Math.floor((my - CLIFF_TOP) / LAYER_H);
  if (li < 0 || li > 5) return;

  // 化石さがし中：ちかくをタップしたらほり出す
  if (S.phase === 'dig') {
    for (const fid in FOSSILS) {
      if (S.dug.has(fid)) continue;
      const F = FOSSILS[fid];
      const fli = LAYERS.findIndex(L => L.fossil === fid);
      const fy = layerY(fli) + LAYER_H / 2;
      if (Math.abs(mx - F.x) < 55 && Math.abs(my - fy) < 45) {
        S.dug.add(fid);
        sDig(); sDig();
        S.scopeMode = fid;
        burst(ev.clientX, ev.clientY, 40);
        $('stateName').innerHTML = `⛏ ${FOSSILS[fid].name}を ほり出した！`;
        STEPS[FLOW[S.stepIndex]].onDig && STEPS[FLOW[S.stepIndex]].onDig(fid);
        return;
      }
    }
  }

  // 層をえらぶ
  S.selLayer = li;
  sTap();
  const L = LAYERS[li];
  S.scopeMode = L.type;
  $('stateName').innerHTML = `${'①②③④⑤⑥'[li]} ${MAT[L.type].name}`;
  const step = STEPS[FLOW[S.stepIndex]];
  if (step.onLayerTap) step.onLayerTap(li, L);
});

        } else {
          sHmm();
          say(`${'①②③④⑤⑥'[li]}かの？ ${ruby('思', 'おも')}い${ruby('出', 'だ')}すんじゃ——${ruby('土', 'つち')}は ${ruby('前', 'まえ')}の${ruby('層', 'そう')}の <b>${ruby('上', 'うえ')}</b>に つもったろう？ ということは、${ruby('古', 'ふる')}い${ruby('層', 'そう')}は どこに おいやられる？`);
        }
      } else if (S.phase === 'newest') {
        if (li === 0) {
          S.phase = 'done'; S.tapEnabled = false;
          sYes(); scopeBurst(); award('m_yomu');
          say(`✨ その${ruby('通', 'とお')}り！ いちばん${ruby('上', 'うえ')}の <b>①</b>が いちばん ${ruby('新', 'あたら')}しい！ ✨<br><br>💡 <b>たいせつポイント</b><br>${W.chiso}は <b>${ruby('下', 'した')}から ${ruby('順', 'じゅん')}に</b> できていく。だから ${ruby('下', 'した')}ほど ${W.furui}、${ruby('上', 'うえ')}ほど ${ruby('新', 'あたら')}しい。${W.chiso}を ${ruby('下', 'した')}から よめば、${ruby('大地', 'だいち')}の${ruby('歴史', 'れきし')}が ${ruby('順番', 'じゅんばん')}に わかるんじゃ！`);
          setButtons([{ label: 'さいごの なぞへ！', cb: nextStep }]);
        } else {
          sHmm();
          say(`おっと、${ruby('新', 'あたら')}しいのは さいごに つもった${ruby('層', 'そう')}——つまり いちばん <b>${ruby('上', 'うえ')}</b>じゃよ。`);
        }
      }
    },
  },

  // --- はかせチャレンジ：火山灰の層 ---
  hakase: {
    enter() {
      Object.assign(S, { view: 'cliff', scopeMode: 'suna', drain: 1, dug: new Set(['kai', 'ha', 'ammo']), selLayer: 2 });
      updateLoc();
      S.phase = 'ask';
      hideWish();
      say(`さいごは <b>はかせチャレンジ</b>じゃ！<br>③の${ruby('層', 'そう')}だけ、${ruby('色', 'いろ')}が はいいろで ようすが ちがう。この${ruby('層', 'そう')}の ${ruby('正体', 'しょうたい')}は なんじゃと${ruby('思', 'おも')}う？ シートに 〇！`);
      setButtons([
        { label: `Ａ ${ruby('火山', 'かざん')}の はい（火山灰）`, cls: 'choice', cb: el => this.pick(0, el) },
        { label: 'Ｂ 海の すなの 一種', cls: 'choice', cb: el => this.pick(1, el) },
        { label: 'Ｃ コンクリート', cls: 'choice', cb: el => this.pick(2, el) },
      ]);
    },
    pick(n, el) {
      btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
      el.classList.add('picked');
      S.pick = n;
      say(`ふむ。それでは ${ruby('決定的', 'けっていてき')}な しょうこを ${ruby('見', 'み')}せよう。<b>🔍ボタン</b>で ③の${ruby('層', 'そう')}の ${W.tsubu}を ${ruby('拡大', 'かくだい')}じゃ！`);
      setControls([{ label: '🔍 ③の層の つぶを しらべる', cb: () => this.reveal() }]);
      setButtons([]);
    },
    reveal() {
      S.phase = 'done';
      S.scopeMode = 'kazanbai';
      setControls([]);
      const hit = S.pick === 0 ? 'よそう どおり！' : 'おどろいたかの！';
      sYes(); scopeBurst(); award('hakase');
      say(`${ruby('見', 'み')}よ、${W.tsubu}が <b>かくばっておる</b>！ こたえは <b>Ａ ${W.kazanbai}</b>じゃ。${hit}<br><br>💡 <b>たいせつポイント</b><br>${ruby('川', 'かわ')}を ${ruby('旅', 'たび')}した すなの${W.tsubu}は、ころがって <b>${ruby('丸', 'まる')}く</b>なる（${ruby('前', 'まえ')}の${ruby('授業', 'じゅぎょう')}の ${ruby('石', 'いし')}と おなじ！）。じゃが この${W.tsubu}は <b>かくばったまま</b>——つまり ${ruby('水', 'みず')}を ${ruby('通', 'とお')}らず、<b>${ruby('空', 'そら')}から ふってきた</b>。${ruby('大昔', 'おおむかし')}、ちかくで ${ruby('火山', 'かざん')}の <b>${W.funka}</b>が あった しょうこ なんじゃ！`);
      setButtons([{ label: 'まとめへ すすむ', cb: nextStep }]);
    },
  },

  ending: {
    enter() {
      showOverlay(`
        <h2>⭐ みならい ちそう${ruby('発掘隊', 'はっくつたい')} にんてい！ ⭐</h2>
        <div class="phasesStrip">${'★'.repeat(S.badges.size)}${'☆'.repeat(Math.max(0, 5 - S.badges.size))}</div>
        <p class="talk" id="blankArea">きょうの <b>3つの ひみつ</b>、いえるかな？（タッチで こたえ）<br>
        ① ${W.chiso}は（<span class="blankWord" data-a="水">？？？</span>）の${W.soko}に、${W.tsubu}の${ruby('大', 'おお')}きさで 分かれた${ruby('土', 'つち')}が つもって できる。<br>
        ② ${ruby('下', 'した')}の${ruby('層', 'そう')}ほど（<span class="blankWord" data-a="古い">？？？</span>）。<br>
        ③ ${ruby('山', 'やま')}のがけから ${ruby('貝', 'かい')}の${W.kaseki}が ${ruby('出', 'で')}たら、そこは${ruby('大昔', 'おおむかし')}（<span class="blankWord" data-a="海">？？？</span>）だった。</p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>②「${ruby('水', 'みず')}の${W.soko}に ${ruby('土', 'つち')}が つもって できた」</b>でした！ しまもようは、なん${ruby('万年', 'まんねん')}ぶんの「つもった きろく」だったんだね。</p>
        <p class="talk">🏠 <b>おうちミッション</b><br>${ruby('近', 'ちか')}くの がけ・${ruby('切', 'き')}り${ruby('通', 'どお')}し・${ruby('工事現場', 'こうじげんば')}の あとで、<b>しま${ruby('模様', 'もよう')}</b>を さがしてみよう。${ruby('見', 'み')}つけたら「${ruby('下', 'した')}ほど ${ruby('古', 'ふる')}い」を ${ruby('思', 'おも')}い${ruby('出', 'だ')}してね。まえの${ruby('授業', 'じゅぎょう')}の「${ruby('丸', 'まる')}い${ruby('石', 'いし')}」も セットで さがすと はかせ${ruby('級', 'きゅう')}！<br>
        🚨 やくそく：がけには ${ruby('近', 'ちか')}よらない・のぼらない。${ruby('工事現場', 'こうじげんば')}に ${ruby('入', 'はい')}らない。${ruby('大人', 'おとな')}と いっしょに、はなれた ところから ${ruby('見', 'み')}るだけ。</p>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで あそぶ</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(scopeBurst, 200);
      panelEl.querySelectorAll('.blankWord').forEach(sp => {
        sp.onclick = function () {
          this.textContent = this.dataset.a;
          this.style.color = '#3a8a3a'; sYes(); scopeBurst();
        };
      });
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  free: {
    enter() {
      Object.assign(S, { view: 'cliff', drain: 1, dug: new Set(['kai', 'ha', 'ammo']) });
      updateLoc();
      S.tapEnabled = true; S.phase = 'free';
      say(`<b>じゆうモード</b>じゃ！ がけの${ruby('層', 'そう')}や ${W.kaseki}を タッチして しらべながら、${ruby('友', 'とも')}だちと クイズを ${ruby('出', 'だ')}しあうのじゃ。<br>れい：「④と⑤、${ruby('古', 'ふる')}いのは どっち？」「${W.kazanbai}の ${W.tsubu}の ${ruby('形', 'かたち')}は？」`);
      setButtons([
        { label: '🌊 うみの じっけん場に もどる', cls: 'sub', cb: () => {
          Object.assign(S, { view: 'sea', drain: 0, repeats: 0, fillProg: 0, scopeMode: 'mix' });
          updateLoc(); sTap();
          setControls([{ label: '🪣 土を ながす', cb: () => { if (!S.flowing) { S.flowing = true; S.fillProg = 0; sFlow(); } } }]);
        } },
        { label: '⛰ がけに もどる', cls: 'sub', cb: () => {
          Object.assign(S, { view: 'cliff', drain: 1 });
          updateLoc(); sTap(); setControls([]);
        } },
        { label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) },
      ]);
    },
    onLayerDone() { S.repeats = Math.min(S.repeats, 3); },
  },
};

// ---------- 先生バー ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };

// ---------- 開始 ----------
// （URLの後ろに ?step=m_kaseki などで途中から始められます）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
</body>
</html>
