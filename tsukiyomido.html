<script>
/* === 施設PC/古ブラウザ対策 安全スクリプト（2026-07-23／ES5で記述） ===
   ・JSエラーを画面に赤字表示 → 「白画面で原因不明」を防ぐ
   ・ctx.roundRect ポリフィル（Edge/Chrome 99未満で無く白画面になる対策） */
(function () {
  function showErr(msg) {
    try {
      var d = document.getElementById('__err');
      if (!d) {
        d = document.createElement('div');
        d.id = '__err';
        d.style.cssText = 'position:fixed;left:0;top:0;right:0;bottom:0;z-index:99999;background:#101426;color:#ffdada;font:14px/1.7 monospace;padding:18px;overflow:auto;white-space:pre-wrap';
        (document.body || document.documentElement).appendChild(d);
      }
      d.appendChild(document.createTextNode('⚠ ' + msg + '\n'));
    } catch (e) {}
  }
  window.addEventListener('error', function (e) {
    showErr((e && e.message ? e.message : 'error') + '  @line ' + (e && e.lineno ? e.lineno : '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Promise: ' + (e && e.reason ? e.reason : ''));
  });
  try {
    var P = window.CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
    if (P && !P.roundRect) {
      P.roundRect = function (x, y, w, h, r) {
        var a;
        if (typeof r === 'number') { a = [r, r, r, r]; }
        else if (r && r.length) {
          if (r.length === 1) { a = [r[0], r[0], r[0], r[0]]; }
          else if (r.length === 2) { a = [r[0], r[1], r[0], r[1]]; }
          else if (r.length === 3) { a = [r[0], r[1], r[2], r[1]]; }
          else { a = [r[0], r[1], r[2], r[3]]; }
        } else { a = [0, 0, 0, 0]; }
        var m = Math.min(Math.abs(w), Math.abs(h)) / 2;
        var tl = Math.min(a[0], m), tr = Math.min(a[1], m), br = Math.min(a[2], m), bl = Math.min(a[3], m);
        this.moveTo(x + tl, y);
        this.arcTo(x + w, y, x + w, y + h, tr);
        this.arcTo(x + w, y + h, x, y + h, br);
        this.arcTo(x, y + h, x, y, bl);
        this.arcTo(x, y, x + w, y, tl);
        this.closePath();
        return this;
      };
    }
  } catch (e) {}
})();
</script>

<script type="text/javascript">
'use strict';
/* =====================================================
   月よみ堂 — 月の満ち欠け体験（小4〜6・協力型・1ファイル）
   ===================================================== */

// ---------- ユーティリティ ----------
const $ = id => document.getElementById(id);
const TAU = Math.PI * 2;
const wrapPi = x => { while (x > Math.PI) x -= TAU; while (x < -Math.PI) x += TAU; return x; };
const deg = d => d * Math.PI / 180;
const ruby = (k, f) => `<ruby>${k}<rt>${f}</rt></ruby>`;

// よく使う ふりがな付きことば
const W = {
  tsuki: ruby('月', 'つき'),
  taiyo: ruby('太陽', 'たいよう'),
  chikyu: ruby('地球', 'ちきゅう'),
  mangetsu: ruby('満月', 'まんげつ'),
  shingetsu: ruby('新月', 'しんげつ'),
  hangetsu: ruby('半月', 'はんげつ'),
  mikazuki: ruby('三日月', 'みかづき'),
  katachi: ruby('形', 'かたち'),
  hikari: ruby('光', 'ひかり'),
};

// ---------- 状態 ----------
const S = {
  stepIndex: 0,
  moonA: Math.PI / 4,       // 月の角度（canvas座標系・④ふくらんだ月の位置から開始）
  targetA: Math.PI / 4,
  raysOn: true,
  sound: true,
  dragEnabled: false,
  dragging: false,
  sweep: 0,                 // れんしゅう用：動かした合計角度
  practiceDone: false,
  missionPhase: '',         // predict / operate / done
  cyclePhase: '',           // ask / anim1 / pause / anim2 / done
  cycleChoice: -1,
  cycleProgress: 0,         // 満月からの累積角度(rad)
  votePicked: new Set(),
  badges: new Set(),
};

// ---------- 太陽との角度（離角） ----------
// canvas角 a：①新月= π、⑤満月= 0。elong: 0=新月 〜 π=満月
const elong = a => Math.abs(wrapPi(a - Math.PI));
const isWaxing = a => Math.sin(a) > 0;   // 画面下半分＝これからふくらむ月

function phaseInfo(a) {
  const e = elong(a), ed = e * 180 / Math.PI;
  if (ed < 12)  return { name: W.shingetsu, plain: 'しんげつ' };
  if (ed < 62)  return { name: W.mikazuki + 'がた（ほそい' + W.tsuki + '）', plain: 'みかづきがた' };
  if (ed < 112) return { name: W.hangetsu, plain: 'はんげつ' };
  if (ed < 160) return { name: 'ふくらんだ' + W.tsuki, plain: 'ふくらんだつき' };
  return { name: W.mangetsu, plain: 'まんげつ' };
}

// ---------- 音（WebAudio・外部ファイルなし） ----------
let AC = null;
function ac() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, delay, dur, type, vol) {
  const c = ac(); if (!c || !S.sound) return;
  const t0 = c.currentTime + delay;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.12, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sTap = () => tone(660, 0, 0.09, 'triangle', 0.07);
const sYes = () => [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.09, 0.5, 'triangle', 0.11));

function fitCanvas(cv) {
  const r = cv.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.round(r.width * dpr)), h = Math.max(1, Math.round(r.height * dpr));
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  return { w: r.width, h: r.height, dpr };
}

// ---------- 月の形の描画（そらの窓用） ----------
// e: 離角(0=新月〜π=満月), litRight: 右側が光るか
function drawPhase(ctx, cx, cy, R, e, litRight) {
  // 月の暗い面
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU);
  ctx.fillStyle = '#2c3358'; ctx.fill();
  // クレーター（うっすら）
  ctx.clip();
  ctx.globalAlpha = 0.13; ctx.fillStyle = '#111629';
  [[-.3, -.25, .18], [.25, .1, .13], [-.05, .38, .11], [.4, -.35, .09]].forEach(([dx, dy, dr]) => {
    ctx.beginPath(); ctx.arc(cx + dx * R, cy + dy * R, dr * R, 0, TAU); ctx.fill();
  });
  ctx.restore();

  const f = (1 - Math.cos(e)) / 2;  // 光って見える割合
  if (f > 0.004) {
    const k = Math.cos(e);          // ターミネーターのふくらみ
    const rx = Math.abs(k) * R;
    ctx.save();
    ctx.beginPath();
    if (litRight) {
      ctx.arc(cx, cy, R, -Math.PI / 2, Math.PI / 2, false);        // 右の外周（上→下）
      if (k > 0) ctx.ellipse(cx, cy, Math.max(rx, .01), R, 0, Math.PI / 2, -Math.PI / 2, true);   // 三日月がた：右にふくらむ
      else       ctx.ellipse(cx, cy, Math.max(rx, .01), R, 0, Math.PI / 2, 3 * Math.PI / 2, false); // ふくらんだ月：左にふくらむ
    } else {
      ctx.arc(cx, cy, R, Math.PI / 2, 3 * Math.PI / 2, false);     // 左の外周（下→上）
      if (k > 0) ctx.ellipse(cx, cy, Math.max(rx, .01), R, 0, 3 * Math.PI / 2, Math.PI / 2, true);  // 左にふくらむ
      else       ctx.ellipse(cx, cy, Math.max(rx, .01), R, 0, 3 * Math.PI / 2, Math.PI / 2, false); // 右にふくらむ
    }
    ctx.closePath();
    ctx.shadowColor = 'rgba(255,240,200,.8)'; ctx.shadowBlur = R * 0.5 * Math.max(f, 0.25);
    ctx.fillStyle = '#f6eecf'; ctx.fill();
    ctx.shadowBlur = 0;
    // 光る面にもうっすらクレーター
    ctx.clip();
    ctx.globalAlpha = 0.1; ctx.fillStyle = '#c9b98a';
    [[-.3, -.25, .18], [.25, .1, .13], [-.05, .38, .11]].forEach(([dx, dy, dr]) => {
      ctx.beginPath(); ctx.arc(cx + dx * R, cy + dy * R, dr * R, 0, TAU); ctx.fill();
    });
    ctx.restore();
  } else {
    // 新月：そこに「いる」ことが分かるように、ふちだけ見せる
    ctx.save();
    ctx.globalAlpha = 0.3; ctx.strokeStyle = '#8f9ad6'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
    ctx.restore();
  }
}

// ---------- 水晶盤の描画 ----------
const POS_CHARS = ['①', '②', '③', '④', '⑤', '⑥', '⑦', '⑧'];
const posAngle = i => Math.PI - i * Math.PI / 4;   // ①=π(新月) → ⑤=0(満月)

function drawCrystal(t) {
  const { w, h, dpr } = fitCanvas(crystal);
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cctx.clearRect(0, 0, w, h);
  const m = Math.min(w, h), cx = w / 2, cy = h / 2;
  const Ro = m * 0.345, earthR = m * 0.068, moonR = m * 0.042;

  // 星
  if (!crystalStars) crystalStars = makeStars(45, w, h);
  crystalStars.forEach(s => {
    cctx.globalAlpha = 0.25 + 0.5 * (0.5 + 0.5 * Math.sin(t * s.sp + s.p));
    cctx.fillStyle = '#cfd6ff';
    cctx.beginPath(); cctx.arc(s.x, s.y, s.r, 0, TAU); cctx.fill();
  });
  cctx.globalAlpha = 1;

  // 太陽（左はし）
  const sunX = m * 0.01, sunY = cy;
  let grd = cctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, m * 0.16);
  grd.addColorStop(0, 'rgba(255,230,150,.95)');
  grd.addColorStop(0.5, 'rgba(255,200,90,.35)');
  grd.addColorStop(1, 'rgba(255,200,90,0)');
  cctx.fillStyle = grd;
  cctx.beginPath(); cctx.arc(sunX, sunY, m * 0.16, 0, TAU); cctx.fill();
  cctx.fillStyle = '#ffdf8a';
  cctx.beginPath(); cctx.arc(sunX, sunY, m * 0.075, 0, TAU); cctx.fill();
  cctx.fillStyle = '#ffe9a8'; cctx.font = `700 ${m * 0.034}px sans-serif`;
  cctx.textAlign = 'left'; cctx.textBaseline = 'middle';
  cctx.fillText('たいよう', m * 0.02, cy + m * 0.115);

  // ひかりのすじ（平行光線）
  if (S.raysOn) {
    cctx.save();
    cctx.strokeStyle = 'rgba(255,214,107,.16)'; cctx.lineWidth = 2;
    cctx.setLineDash([13, 17]);
    cctx.lineDashOffset = -(t * 45) % 30;
    const n = 8;
    for (let i = 0; i < n; i++) {
      const y = cy + (i - (n - 1) / 2) * (h * 0.105);
      cctx.beginPath(); cctx.moveTo(m * 0.1, y); cctx.lineTo(w, y); cctx.stroke();
    }
    cctx.restore();
  }

  // 軌道
  cctx.save();
  cctx.strokeStyle = 'rgba(143,154,214,.45)'; cctx.lineWidth = 1.6;
  cctx.setLineDash([6, 10]);
  cctx.beginPath(); cctx.arc(cx, cy, Ro, 0, TAU); cctx.stroke();
  cctx.restore();

  // ①〜⑧の目もり
  const pulse = (S.missionPhase === 'predict') ? (0.55 + 0.45 * Math.sin(t * 4)) : 0.75;
  cctx.font = `${m * 0.043}px sans-serif`; cctx.textAlign = 'center'; cctx.textBaseline = 'middle';
  for (let i = 0; i < 8; i++) {
    const a = posAngle(i);
    const px = cx + Math.cos(a) * Ro * 1.17, py = cy + Math.sin(a) * Ro * 1.17;
    cctx.globalAlpha = pulse;
    cctx.fillStyle = (S.missionPhase === 'predict') ? '#ffe9a8' : '#aab3ff';
    cctx.fillText(POS_CHARS[i], px, py);
    cctx.globalAlpha = 0.55;
    cctx.fillStyle = '#8f9ad6';
    const dx = cx + Math.cos(a) * Ro, dy = cy + Math.sin(a) * Ro;
    cctx.beginPath(); cctx.arc(dx, dy, 2.4, 0, TAU); cctx.fill();
  }
  cctx.globalAlpha = 1;

  // 地球
  grd = cctx.createRadialGradient(cx - earthR * 0.4, cy - earthR * 0.4, earthR * 0.2, cx, cy, earthR);
  grd.addColorStop(0, '#6fb1ef'); grd.addColorStop(1, '#2f5fb0');
  cctx.fillStyle = grd;
  cctx.beginPath(); cctx.arc(cx, cy, earthR, 0, TAU); cctx.fill();
  cctx.save();
  cctx.beginPath(); cctx.arc(cx, cy, earthR, 0, TAU); cctx.clip();
  cctx.fillStyle = '#4fae6e';
  cctx.beginPath(); cctx.ellipse(cx - earthR * 0.35, cy - earthR * 0.3, earthR * 0.42, earthR * 0.28, 0.5, 0, TAU); cctx.fill();
  cctx.beginPath(); cctx.ellipse(cx + earthR * 0.3, cy + earthR * 0.4, earthR * 0.35, earthR * 0.22, -0.4, 0, TAU); cctx.fill();
  // 夜のがわ（太陽と反対がわ＝右）
  cctx.fillStyle = 'rgba(10,14,36,.45)';
  cctx.fillRect(cx, cy - earthR, earthR, earthR * 2);
  cctx.restore();
  cctx.fillStyle = '#cfd6ff'; cctx.font = `700 ${m * 0.032}px sans-serif`; cctx.textAlign = 'center';
  cctx.fillText('ちきゅう', cx, cy + earthR + m * 0.032);

  // 月（光る半分はいつも太陽がわ＝左）
  const mx = cx + Math.cos(S.moonA) * Ro, my = cy + Math.sin(S.moonA) * Ro;
  if (S.dragEnabled) {
    cctx.save();
    cctx.strokeStyle = `rgba(255,214,107,${0.5 + 0.3 * Math.sin(t * 5)})`;
    cctx.lineWidth = 3;
    cctx.beginPath(); cctx.arc(mx, my, moonR + 7, 0, TAU); cctx.stroke();
    cctx.restore();
  }
  cctx.fillStyle = '#3a4166';
  cctx.beginPath(); cctx.arc(mx, my, moonR, 0, TAU); cctx.fill();
  cctx.fillStyle = '#f6eecf';
  cctx.beginPath(); cctx.arc(mx, my, moonR, Math.PI / 2, 3 * Math.PI / 2, false); cctx.fill();
  cctx.strokeStyle = 'rgba(246,238,207,.5)'; cctx.lineWidth = 1;
  cctx.beginPath(); cctx.arc(mx, my, moonR, 0, TAU); cctx.stroke();
  cctx.fillStyle = '#ffe9a8'; cctx.font = `700 ${m * 0.03}px sans-serif`;
  cctx.fillText('つき', mx, my - moonR - m * 0.024);
}

// ---------- そらの窓の描画 ----------
function drawSky(t) {
  const { w, h, dpr } = fitCanvas(skyCv);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, h);

  let grd = sctx.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, '#0a0e28'); grd.addColorStop(0.7, '#1a2150'); grd.addColorStop(1, '#2a2c60');
  sctx.fillStyle = grd; sctx.fillRect(0, 0, w, h);

  if (!skyStars) skyStars = makeStars(40, w, h);
  skyStars.forEach(s => {
    sctx.globalAlpha = 0.3 + 0.55 * (0.5 + 0.5 * Math.sin(t * s.sp + s.p));
    sctx.fillStyle = '#e8ecff';
    sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, TAU); sctx.fill();
  });
  sctx.globalAlpha = 1;

  // 月
  drawPhase(sctx, w / 2, h * 0.42, w * 0.26, elong(S.moonA), isWaxing(S.moonA));

  // おかの silhouette と 小さな塔
  sctx.fillStyle = '#191537';
  sctx.beginPath();
  sctx.moveTo(0, h);
  sctx.quadraticCurveTo(w * 0.25, h * 0.78, w * 0.55, h * 0.9);
  sctx.quadraticCurveTo(w * 0.8, h * 0.98, w, h * 0.88);
  sctx.lineTo(w, h); sctx.closePath(); sctx.fill();
  // 塔
  sctx.fillStyle = '#191537';
  sctx.fillRect(w * 0.72, h * 0.68, w * 0.07, h * 0.24);
  sctx.beginPath();
  sctx.moveTo(w * 0.705, h * 0.68); sctx.lineTo(w * 0.755, h * 0.58); sctx.lineTo(w * 0.805, h * 0.68);
  sctx.closePath(); sctx.fill();
  sctx.fillStyle = `rgba(255,214,107,${0.75 + 0.25 * Math.sin(t * 2.2)})`;
  sctx.fillRect(w * 0.74, h * 0.76, w * 0.028, h * 0.035);
}

// ---------- キラキラ エフェクト ----------
let particles = [];
function burst(x, y, n) {
  for (let i = 0; i < (n || 70); i++) {
    const a = Math.random() * TAU, sp = 60 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
      life: 1, size: 2 + Math.random() * 4,
      col: Math.random() < 0.6 ? '#ffd66b' : (Math.random() < 0.5 ? '#fff' : '#b9a8ff'),
    });
  }
}
function skyBurst() {
  const r = $('skyWrap').getBoundingClientRect();
  burst(r.left + r.width / 2, r.top + r.height / 2);
}
function drawFx(dt) {
  const { w, h, dpr } = fitCanvas(fxCv);
  fctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fctx.clearRect(0, 0, w, h);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.life -= dt * 0.7; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 140 * dt;
    fctx.globalAlpha = Math.max(0, p.life);
    fctx.fillStyle = p.col;
    fctx.save();
    fctx.translate(p.x, p.y); fctx.rotate(p.life * 5);
    const s = p.size;
    fctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = i * TAU / 5 - Math.PI / 2;
      fctx.lineTo(Math.cos(a1) * s, Math.sin(a1) * s);
      const a2 = a1 + TAU / 10;
      fctx.lineTo(Math.cos(a2) * s * 0.45, Math.sin(a2) * s * 0.45);
    }
    fctx.closePath(); fctx.fill();
    fctx.restore();
  });
  fctx.globalAlpha = 1;
}

// ---------- メインループ ----------
let lastT = performance.now();
function loop(now) {
  const t = now / 1000, dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // 月の位置をなめらかに
  if (!S.cyclePhase.startsWith('anim')) {
    const d = wrapPi(S.targetA - S.moonA);
    if (Math.abs(d) > 0.0005) {
      const step = d * 0.22;
      S.moonA = S.moonA + step;
      if (S.stepIndex === FLOW.indexOf('practice') && !S.practiceDone) {
        S.sweep += Math.abs(step);
        if (S.sweep > deg(310)) practiceComplete();
      }
    }
  } else {
    // はかせチャレンジ：時間をすすめる
    const speed = S.cyclePhase === 'anim1' ? 0.45 : 0.85;
    S.cycleProgress += speed * dt;
    S.moonA = -S.cycleProgress;        // 満月(0)から visual-CCW（角度マイナス方向）
    S.targetA = S.moonA;
    const day = S.cycleProgress / TAU * 29.53;
    $('dayChip').textContent = day >= 29.4 ? '満月から やく29.5日' : `満月から ${Math.floor(day)}日`;
    if (S.cyclePhase === 'anim1' && S.cycleProgress >= Math.PI / 2) cyclePause();
    if (S.cyclePhase === 'anim2' && S.cycleProgress >= TAU) cycleEnd();
  }

  drawCrystal(t);
  drawSky(t);
  drawFx(dt);

  // 月の名前ラベル
  const info = phaseInfo(S.moonA);
  if (phaseNameEl.dataset.plain !== info.plain) {
    phaseNameEl.dataset.plain = info.plain;
    phaseNameEl.innerHTML = info.name;
  }
  requestAnimationFrame(loop);
}
const phaseNameEl = $('phaseName');

// ---------- ドラッグ・タッチ操作 ----------
function pointerToAngle(ev) {
  const r = crystal.getBoundingClientRect();
  const x = ev.clientX - r.left - r.width / 2;
  const y = ev.clientY - r.top - r.height / 2;
  return Math.atan2(y, x);
}
crystal.addEventListener('pointerdown', ev => {
  ac();
  if (!S.dragEnabled) return;
  S.dragging = true;
  crystal.setPointerCapture(ev.pointerId);
  S.targetA = pointerToAngle(ev);
});
crystal.addEventListener('pointermove', ev => {
  if (!S.dragging || !S.dragEnabled) return;
  S.targetA = pointerToAngle(ev);
});
crystal.addEventListener('pointerup', () => { S.dragging = false; });
crystal.addEventListener('pointercancel', () => { S.dragging = false; });

// キーボードでも動かせる（マウスが苦手な子・発表用リモコン対応）
window.addEventListener('keydown', ev => {
  if (ev.key === 'ArrowLeft' && S.dragEnabled) { S.targetA = S.targetA - deg(5); ev.preventDefault(); }
  if (ev.key === 'ArrowRight' && S.dragEnabled) { S.targetA = S.targetA + deg(5); ev.preventDefault(); }
  if (ev.key === 'Enter') {
    const b = document.querySelector('#btnRow .btn:not(.sub)') || document.querySelector('#panelBody .btn:not(.sub)');
    if (b) b.click();
  }
});

        <div class="sub">〜 ${W.tsuki}を あやつる みならい${ruby('月', 'つき')}よみ、ぼしゅう${ruby('中', 'ちゅう')} 〜</div>

        この おみせの <b>まほうの${ruby('水晶盤', 'すいしょうばん')}</b>は、ほんものの ${W.tsuki}を うごかせるの。<br>
        こんやは お${ruby('客', 'きゃく')}さまの おねがいを かなえながら、${W.tsuki}の ひみつを いっしょに といていこう！</p>
        <button class="btn" id="startBtn">おみせに はいる</button>
        <div class="foot">先生へ：F11キーで全画面表示になります。マウス・タッチ・矢印キーで操作できます。</div>
      `);
      $('startBtn').onclick = () => { ac(); sTap(); nextStep(); };
    },
  },

  // --- よそうタイム（誤概念の表出） ---
  vote: {
    enter() {
      S.dragEnabled = false;
      showOverlay(`
        <h2>🌙 よそうタイム</h2>
        <p class="talk">${W.tsuki}は ${ruby('日', 'ひ')}によって ${W.katachi}が かわって 見えるよね。<br><b>どうしてだと ${ruby('思', 'おも')}う？</b></p>
        <div class="voteCards">
          <div class="vcard" data-v="0"><span class="vicon">☁️</span><b>①</b> くもが ${W.tsuki}を かくしている から</div>
          <div class="vcard" data-v="1"><span class="vicon">🌗</span><b>②</b> ${W.tsuki}そのものの ${W.katachi}が かわっている から</div>
          <div class="vcard" data-v="2"><span class="vicon">👀</span><b>③</b> ${W.tsuki}の <b>見えかた</b>が かわっている から</div>
        </div>
        <div class="sub">思うものに タッチ（いくつでも）。きろくシートにも 〇を つけてね。</div>
        <button class="btn" id="voteGo">よし、たしかめに いこう！</button>
      `);
      panelEl.querySelectorAll('.vcard').forEach(c => {
        c.onclick = () => { sTap(); c.classList.toggle('picked');
          const v = +c.dataset.v;
          S.votePicked.has(v) ? S.votePicked.delete(v) : S.votePicked.add(v);
        };
      });
      $('voteGo').onclick = () => { ac(); sTap(); nextStep(); };
    },
  },

  // --- れんしゅう：月を1周させる ---
  practice: {
    enter() {
      S.dragEnabled = true; S.sweep = 0; S.practiceDone = false;
      say(`まずは れんしゅう！ ${ruby('水晶盤', 'すいしょうばん')}を さわって、${W.tsuki}を <b>ぐるっと 1しゅう</b> おさんぽ させてみて。<br>「そらの${ruby('窓', 'まど')}」の ${W.tsuki}が どう かわるか、みんなで よーく 見ててね！`);
      setButtons([]);
    },
  },

  // --- ミッション×4 ---
  m_full: { enter() { missionEnter('m_full'); } },
  m_new: { enter() { missionEnter('m_new'); } },
  m_half: { enter() { missionEnter('m_half'); } },
  m_crescent: { enter() { missionEnter('m_crescent'); } },

  // --- はかせチャレンジ：満ち欠けのじゅんばん ---
  cycle: {
    enter() {
      S.dragEnabled = false;
      S.cyclePhase = 'ask'; S.cycleChoice = -1; S.cycleProgress = 0;
      S.targetA = 0;  // 満月の位置へ
      hideWish();
      say(`さいごは <b>はかせチャレンジ</b>！ いま ${W.tsuki}は ${W.mangetsu}。<br>この つぎの${ruby('日', 'ひ')}から、${W.tsuki}は <b>どう かわっていく</b>と ${ruby('思', 'おも')}う？ シートにも 〇を つけてね。`);
      setButtons([
        { label: `Ａ すこしずつ ほそくなる`, cls: 'choice', cb: el => cycleChoose(0, el) },
        { label: `Ｂ もっと ふくらんでいく`, cls: 'choice', cb: el => cycleChoose(1, el) },
        { label: `Ｃ ${ruby('日', 'ひ')}によって バラバラに かわる`, cls: 'choice', cb: el => cycleChoose(2, el) },
      ]);
    },
  },

  // --- まとめ ---
  ending: {
    enter() {
      S.dragEnabled = false;
      const age = realMoonAge();
      const info = realMoonInfo(age);
      showOverlay(`
        <h2>⭐ みならい${ruby('月', 'つき')}よみ にんてい！ ⭐</h2>
        <div class="phasesStrip">${'★'.repeat(S.badges.size)}${'☆'.repeat(Math.max(0, 5 - S.badges.size))}</div>
        <p class="talk">きょうの <b>たいせつな ひみつ</b>、もう いえるかな？<br>
        ${W.tsuki}の ${W.katachi}が かわって 見えるのは、${W.tsuki}と ${W.taiyo}の 「<span id="blankWord">？？？</span>」 が かわるから。
        <span style="font-size:.8em;color:#8a86a0">（タッチすると こたえが 出るよ）</span></p>
        <p class="talk">さいしょの よそうタイム、こたえは <b>③「${W.tsuki}の 見えかたが かわっている から」</b>！ ${W.tsuki}じしんは いつも まんまるの ボールなんだね。</p>
        <div id="endMoonBox">
          <canvas id="endMoon" width="110" height="110"></canvas>
          <div style="text-align:left">
            <div class="emnote">ちなみに……こんやの ほんものの ${W.tsuki}は だいたい こんな${W.katachi}！</div>
            <div class="emname">${info.name}</div>
            <div class="emnote">こんや そらを 見上げて たしかめてみてね。<br>きろくシートの「こんやの${W.tsuki}」コーナーも わすれずに！</div>
          </div>
        </div>
        <div style="display:flex;gap:1vw;justify-content:center;flex-wrap:wrap;margin-top:1.5vh">
          <button class="btn" id="freeBtn">じゆうモードで あそぶ</button>
          <button class="btn sub" id="againBtn">はじめから もういちど</button>
        </div>
      `);
      sFanfare();
      setTimeout(skyBurst, 200);
      $('blankWord').onclick = function () {
        this.innerHTML = `いち（${ruby('位置', 'いち')}）`;
        this.style.color = '#7ee787'; sYes(); skyBurst();
      };
      const cv = $('endMoon');
      drawPhase(cv.getContext('2d'), 55, 55, 40, info.e, info.litRight);
      $('freeBtn').onclick = () => { sTap(); gotoStep(FLOW.indexOf('free')); };
      $('againBtn').onclick = () => { location.reload(); };
    },
  },

  // --- じゆうモード（早い子・発展） ---
  free: {
    enter() {
      S.dragEnabled = true;
      say(`<b>じゆうモード</b>！ こんどは みんなが ${ruby('問題', 'もんだい')}を 出す${ruby('番', 'ばん')}。<br>「${W.mangetsu}に してみて！」「26${ruby('日', 'にち')}めの ${W.tsuki}は どんな${W.katachi}？」など、${ruby('友', 'とも')}だちと クイズを 出しあってみよう！`);
      setButtons([
        { label: 'まとめに もどる', cls: 'sub', cb: () => gotoStep(FLOW.indexOf('ending')) },
      ]);
    },
  },
};

// ---------- ミッション共通処理 ----------
function missionEnter(id) {
  const M = MISSIONS[id];
  S.missionPhase = 'predict';
  S.dragEnabled = false;
  setWish(M.icon, M.wish);
  say(`おねがいカードが とどいたよ。${W.tsuki}を <b>①〜⑧の どこ</b>に おけば いいかな？<br>きろくシートの ばんごうに 〇を つけて、よそうしよう！`);
  setButtons([{ label: 'みんな よそうできた！', cb: () => missionOperate(id) }]);
}
function missionOperate(id) {
  S.missionPhase = 'operate';
  S.dragEnabled = true;
  say(`だいひょうさん、${ruby('水晶盤', 'すいしょうばん')}の ${W.tsuki}を うごかして！<br>みんなは 「そらの${ruby('窓', 'まど')}」を 見ながら <b>こえで おうえん</b>してね。（もっと${ruby('下', 'した')}！ もうちょっと！）`);
  setButtons([{ label: 'これで どう？', cb: () => missionCheck(id) }]);
}
function missionCheck(id) {
  const M = MISSIONS[id];
  if (M.check(S.moonA)) {
    S.missionPhase = 'done';
    S.dragEnabled = false;
    sYes(); skyBurst(); award(id);
    say(`✨ できたー！ おねがい かんりょう！ ✨<br><br>💡 <b>たいせつポイント</b><br>${M.point}`);
    setButtons([{ label: 'つぎの おねがいへ', cb: nextStep }]);
  } else {
    sHmm();
    const e = elong(S.moonA);
    let target;
    if (id === 'm_full') target = Math.PI;
    else if (id === 'm_new') target = 0;
    else if (id === 'm_half') target = Math.PI / 2;
    else target = deg(40);
    const hint = (e < target)
      ? `もうすこし ${W.taiyo}から <b>とおい ばしょ</b>に おいてみたら どうかな？`
      : `もうすこし ${W.taiyo}に <b>ちかい ばしょ</b>かも しれないよ？`;
    say(`うーん、おしい！ いまは「${phaseInfo(S.moonA).name}」だね。<br>${hint} そうさの ${ruby('人', 'ひと')}を こうたいしても いいよ。`);
  }
}

// ---------- れんしゅう完了 ----------
function practiceComplete() {
  S.practiceDone = true;
  sYes(); skyBurst();
  say(`その ちょうし！ ${W.tsuki}の ${W.katachi}、くるくる かわったね。<br>${W.tsuki}の <b>ばしょ</b>と ${W.katachi}、なにか かんけいが ありそう……？<br>それじゃあ、お${ruby('客', 'きゃく')}さまの おねがいを かなえに いこう！`);
  setButtons([{ label: 'おねがいカードを 見る', cb: nextStep }]);
}

// ---------- はかせチャレンジ ----------
function cycleChoose(n, el) {
  S.cycleChoice = n;
  btnRow.querySelectorAll('.choice').forEach(b => b.classList.remove('picked'));
  el.classList.add('picked');
  say(`「${['Ａ すこしずつ ほそくなる', 'Ｂ もっと ふくらんでいく', 'Ｃ バラバラに かわる'][n]}」だね。<br>それじゃあ、まほうで <b>じかんを すすめて</b> たしかめよう！`);
  setButtons([{ label: '▶ じかんを すすめる！', cb: cycleStart }]);
}
function cycleStart() {
  S.cyclePhase = 'anim1';
  S.cycleProgress = 0;
  $('dayChip').style.display = 'block';
  say(`いくよ〜！ 「そらの${ruby('窓', 'まど')}」の ${W.tsuki}に ちゅうもく……！`);
  setButtons([]);
}
function cyclePause() {
  S.cyclePhase = 'pause';
  award('cycle');
  const praise = S.cycleChoice === 0 ? 'よそう どおり！ すごい！' : 'じっけんで はっけん できたね！';
  sYes();
  say(`ストップ！ ${W.mangetsu}から 1しゅうかんで、${W.tsuki}は <b>すこしずつ ほそく</b> なっていったね。<br>こたえは <b>Ａ</b>！ ${praise}<br><br>このまま つづけたら、いつ ${W.mangetsu}に もどるかな？`);
  setButtons([{ label: '▶ つづきを 見る', cb: () => {
    S.cyclePhase = 'anim2';
    say(`${W.shingetsu}を こえて…… ${W.tsuki}が また ふくらんでいくよ……！`);
    setButtons([]);
  } }]);
}
function cycleEnd() {
  S.cyclePhase = 'done';
  S.moonA = 0; S.targetA = 0;
  sYes(); skyBurst();
  say(`${W.mangetsu}に もどった！ ${W.mangetsu}から つぎの ${W.mangetsu}まで <b>やく1か${ruby('月', 'げつ')}（29.5${ruby('日', 'にち')}）</b>。<br>だから ${W.tsuki}の ${W.katachi}は、まいにち すこしずつ、<b>きまった じゅんばん</b>で かわるんだね！`);
  setButtons([{ label: 'まとめへ すすむ', cb: nextStep }]);
}

// ---------- こんやの本物の月 ----------
function realMoonAge() {
  const jd = Date.now() / 86400000 + 2440587.5;
  let age = (jd - 2451550.26) % 29.530588853;
  if (age < 0) age += 29.530588853;
  return age;
}
function realMoonInfo(age) {
  const half = 29.530588853 / 2;
  const e = (age < half ? age / half : (29.530588853 - age) / half) * Math.PI;
  const litRight = age < half;
  const ed = e * 180 / Math.PI;
  let name;
  if (ed < 12) name = W.shingetsu;
  else if (ed < 62) name = 'ほそい' + W.tsuki + '（' + W.mikazuki + 'がた）';
  else if (ed < 112) name = W.hangetsu;
  else if (ed < 160) name = 'ふくらんだ' + W.tsuki;
  else name = W.mangetsu;
  return { e, litRight, name };
}

// ---------- 先生バー・そのほか ----------
$('tbPrev').onclick = () => gotoStep(S.stepIndex - 1);
$('tbNext').onclick = () => gotoStep(S.stepIndex + 1);
$('tbReset').onclick = () => { if (confirm('さいしょから やりなおしますか？')) location.reload(); };
$('tbSound').onclick = function () { S.sound = !S.sound; this.textContent = S.sound ? '🔊' : '🔇'; };
$('rayToggle').onclick = function () {
  S.raysOn = !S.raysOn; sTap();
  $('rayState').textContent = S.raysOn ? 'ON' : 'OFF';
};

// ---------- 開始 ----------
// （URLの後ろに ?step=m_full などを付けると途中から始められます。授業が中断した時の復帰用）
const qsStep = new URLSearchParams(location.search).get('step');
gotoStep(Math.max(0, FLOW.indexOf(qsStep)));
requestAnimationFrame(loop);
</script>
